name: M365 Mass File Deletion
id: M365_Mass_File_Deletion
version: 1
schema_version: "1.0"
date: "2026-07-02"
author: SOCFortress LLC
status: production
type: aggregation
description: >
  Detects a user recycling (deleting) a very large number of files from SharePoint
  or OneDrive within a short time window. This is the high-confidence, high-volume
  tier of file-deletion detection: while a handful of deletions is routine, deleting
  dozens of files in minutes strongly indicates deliberate data destruction by a
  departing insider, an attacker wiping a compromised account, or the removal phase
  of a ransomware-style operation. Automated OneDrive sync-engine deletions and the
  SharePoint system account are excluded so that only interactive, user-driven
  deletions are counted.
  MITRE ATT&CK: T1485 (Data Destruction), T1070 (Indicator Removal).
data_source:
  - Office 365 Management Activity API
  - "Workload: SharePoint / OneDrive"
workload: SharePoint
how_to_implement: >
  Requires the Office 365 audit log ingestion pipeline feeding Graylog via the
  O365 Management Activity API, with SharePoint/OneDrive auditing enabled so
  FileRecycled operations (RecordType 6, SharePointFileOperation) are recorded.
  Note the operation is FileRecycled (a user sending a file to the recycle bin),
  not FileDeleted, which in practice is generated by the automated
  SPFileExpirationJob system process clearing cache files and is not a user
  action. This detection shares its base query with the lower-threshold
  "Suspicious File Deletion" rule; it uses a substantially higher threshold to act
  as a high-confidence mass-destruction alert. It excludes the SharePoint system
  account (SHAREPOINT\system) and the OneDrive/SkyDrive sync engine (matched on
  UserAgent), then counts user-driven recycle events per user over the window.
  O365 CreationTime arrives with a malformed timezone offset (+0000) and is
  replaced at ingest, so windowing keys off Graylog's own timestamp.
known_false_positives: >
  Large-scale legitimate cleanup can still occur (mass clearing of Microsoft Teams
  chat files, bulk removal of old OneDrive content, offboarding data handovers,
  and migrations). The threshold is set high to minimize this, but very active
  power users may still trigger it; tune per tenant and consider excluding known
  bulk-maintenance or service accounts.
references:
  - https://attack.mitre.org/techniques/T1485/
  - https://attack.mitre.org/techniques/T1070/
response:
  message: >
    Mass file deletion: $data_office365_UserId$ recycled a large number of files
    from SharePoint/OneDrive within the aggregation window from
    $data_office365_ClientIP$ ($data_office365_ClientIP_country_code$).
    High-confidence data destruction or account compromise. MITRE ATT&CK: T1485
  risk_score: 80
  severity: high
  risk_objects:
    - field: data_office365_UserId
      type: user
      score: 80
  threat_objects:
    - field: data_office365_ClientIP
      type: ip_address
    - field: data_office365_ObjectId
      type: file_name
tags:
  analytic_story:
    - Office 365 Data Destruction
    - Insider Threat
  asset_type: Cloud Identity
  mitre_attack_id:
    - T1485
    - T1070
  custom_tags:
    - o365
    - sharepoint
    - onedrive
    - file_deletion
    - data_destruction
    - mass_deletion
    - aggregation
  product:
    - Office 365
  security_domain: cloud
graylog:
  query: data_office365_Operation:"FileRecycled" AND NOT data_office365_UserId:"SHAREPOINT\\system" AND NOT data_office365_UserAgent:/.*([oO]ne[dD]rive|[sS]ky[dD]rive[sS]ync).*/
aggregation:
  enabled: true
  function: count
  field: null
  group_by:
    - data_office365_UserId
  window: 10m
  threshold: 50
  condition: ">"
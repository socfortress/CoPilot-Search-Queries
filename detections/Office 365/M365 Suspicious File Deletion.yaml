name: M365 Suspicious File Deletion
id: M365_Suspicious_File_Deletion
version: 1
schema_version: "1.0"
date: "2026-07-02"
author: SOCFortress LLC
status: production
type: aggregation
description: >
  Detects a user recycling (deleting) an unusually high number of files from
  SharePoint or OneDrive within a short time window. A burst of file deletions by
  a single user can indicate a malicious insider destroying data before departure,
  an attacker on a compromised account wiping files, or the cleanup phase of a
  ransomware-style operation. Automated OneDrive sync-engine deletions and the
  SharePoint system account are excluded so that only interactive, user-driven
  deletions are counted.
  MITRE ATT&CK: T1485 (Data Destruction), T1070 (Indicator Removal).
data_source:
  - Office 365 Management Activity API
  - "Workload: SharePoint / OneDrive"
workload: SharePoint
how_to_implement: >
  Requires the Office 365 audit log ingestion pipeline feeding Graylog via the
  O365 Management Activity API, with SharePoint/OneDrive auditing enabled so
  FileRecycled operations (RecordType 6, SharePointFileOperation) are recorded.
  Note the operation is FileRecycled (a user sending a file to the recycle bin),
  not FileDeleted, which in practice is generated by the automated
  SPFileExpirationJob system process clearing cache files and is not a user
  action. This is an aggregation detection: the base graylog.query isolates
  user-driven recycle events and excludes the SharePoint system account
  (SHAREPOINT\system) and the OneDrive/SkyDrive sync engine (matched on
  UserAgent), then the aggregation block counts them per user over the window.
  O365 CreationTime arrives with a malformed timezone offset (+0000) and is
  replaced at ingest, so windowing keys off Graylog's own timestamp.
known_false_positives: >
  Legitimate bulk cleanup by users runs high in normal environments, especially
  clearing Microsoft Teams chat files and old OneDrive content via the browser,
  so a low threshold will surface routine cleanup as well as malicious deletion.
  The threshold is intentionally sensitive and should be raised per tenant after
  observing real deletion volume. Migrations, offboarding handovers, and
  power-user housekeeping are common benign causes.
references:
  - https://attack.mitre.org/techniques/T1485/
  - https://attack.mitre.org/techniques/T1070/
response:
  message: >
    Suspicious file deletion: $data_office365_UserId$ recycled multiple files from
    SharePoint/OneDrive within the aggregation window from $data_office365_ClientIP$
    ($data_office365_ClientIP_country_code$). Review for data destruction or
    account compromise. MITRE ATT&CK: T1485
  risk_score: 65
  severity: high
  risk_objects:
    - field: data_office365_UserId
      type: user
      score: 65
  threat_objects:
    - field: data_office365_ClientIP
      type: ip_address
    - field: data_office365_ObjectId
      type: file_name
tags:
  analytic_story:
    - Office 365 Data Destruction
    - Insider Threat
  asset_type: Cloud Identity
  mitre_attack_id:
    - T1485
    - T1070
  custom_tags:
    - o365
    - sharepoint
    - onedrive
    - file_deletion
    - data_destruction
    - aggregation
  product:
    - Office 365
  security_domain: cloud
graylog:
  query: data_office365_Operation:"FileRecycled" AND NOT data_office365_UserId:"SHAREPOINT\\system" AND NOT data_office365_UserAgent:/.*([oO]ne[dD]rive|[sS]ky[dD]rive[sS]ync).*/
aggregation:
  enabled: true
  function: count
  field: null
  group_by:
    - data_office365_UserId
  window: 10m
  threshold: 5
  condition: ">"
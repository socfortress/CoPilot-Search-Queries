name: HTTP Scripting Tool User Agent
id: 04430b4e-5ca8-4e88-98b5-d6bcf54f8393
version: 1
schema_version: "1.0"
date: "2026-05-12"
author: SOCFortress LLC
status: production
type: Anomaly

description: >
  This analytic identifies HTTP requests originating from non-browser
  user agents associated with scripting languages, automation tools,
  vulnerability scanners, web application security testing frameworks,
  and other suspicious clients. The detection inspects Nginx web access
  logs (web-accesslog decoder) for any request whose full log line
  contains one of a curated list of known tool-related substrings,
  matching against the canonical SOCFortress/Splunk scripting_tools_user_agents
  lookup table. The list spans multiple categories: scripting languages
  and HTTP client libraries (curl, libcurl, wget, python, ruby, perl,
  lwp::, php, guzzle, zend, java, golang, go-http-*, node, powershell,
  httpie), web crawlers and headless browser markers (bot, crawler,
  spider, scraper, headless), vulnerability scanners and DAST tools
  (nmap, nikto, openvas, netsparker, acunetix-style scanners, paros,
  arachni, masscan, n-stealth, nsauditor, springenwerk, vega, webshag,
  webvulnscan, l9explore, lkxscan, owasp amass, shadowspray, argus),
  directory and content brute-forcing tools (dirbuster, dirb/,
  gobuster, ffuf "fuzz faster u fool", feroxbuster, wfuzz, httrack,
  scrapy), SQL injection tools (sqlmap, havij, absinthe, bsqlbf,
  mysqloit, pangolin, sql power injector, sqlninja), credential brute
  forcers (hydra, medusa decoy UA), specialized scanners and bots
  (datacha0s, domino hunter, dotdotpwn, gootkit auto-rooter,
  grendel-scan, morfeus, zmeu, brutus, bfac, cgichk), and suspicious
  semantic markers in the UA itself (test, debug, poc, demo, hack,
  exploit, injection, scanner, scan/). Requests with an empty user
  agent (the literal "-" placeholder in nginx combined log format) are
  also flagged. This is a known T1071.001 (Application Layer Protocol:
  Web Protocols) technique observed in HTTP Request Smuggling, web
  reconnaissance, vulnerability fingerprinting, and active exploitation
  workflows. If confirmed malicious, this activity could indicate
  active reconnaissance, vulnerability scanning, exploitation attempts,
  brute-force authentication, web shell deployment, or automated
  exfiltration against the targeted web application.

data_source:
  - Nginx Access


    description: "Target agent/host name (web server)"
    type: string
    required: false
    example: "socfortress-lab-agent"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-05-12 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-05-12 23:59:59.999"

how_to_implement: >
  This detection requires Nginx access logs to be collected by a Wazuh
  agent and parsed by the web-accesslog decoder, then forwarded to the
  Wazuh Indexer. Ensure the Wazuh agent is configured to monitor the
  Nginx access log file (typically /var/log/nginx/access.log) and that
  the standard SOCFortress decoder set is in use. The detection matches
  user agent substrings within the full_log field (which contains the
  raw nginx combined log line including the quoted user-agent at the
  end). The substring list is intentionally broad to mirror the
  published Splunk scripting_tools_user_agents lookup table; this
  produces high recall at the cost of some false positives in
  environments with legitimate automation traffic. For higher fidelity,
  consider segmenting customers/applications: web servers that should
  ONLY serve browser traffic can use this detection at production
  severity, while application servers that legitimately receive API
  client traffic (curl, python-requests, postman, Go services, mobile
  app SDKs) should rely on tuned variants that exclude approved tool
  user agents. Pair this detection with rate-based analytics to
  prioritize high-volume scanning activity over isolated requests.

known_false_positives: >
  False positives are expected in environments with legitimate
  automation traffic, monitoring probes, API clients, mobile
  application SDKs, search engine bots (Googlebot, Bingbot), uptime
  monitoring services, or developer tooling. Common benign matches
  include curl-based health checks, python-requests from CI/CD
  pipelines, Java HTTP clients from internal services, Go-http-client
  from microservices, and node/PHP-based application traffic. The
  Splunk source rule explicitly notes that activity may be part of
  diagnostics or testing; filter as needed by allow-listing specific
  source IPs (internal CI runners, monitoring infrastructure),
  destination URLs (health check endpoints), or approved tool
  signatures (Postman with a known API key, internal microservice
  Go-http-client versions).


response:
  message: >
    A known HTTP scripting tool, vulnerability scanner, or suspicious
    user agent was observed accessing web server $agent_name$ from
    source IP $data_srcip$. HTTP method: $data_protocol$. Requested
    URL: $data_url$. HTTP response status: $data_id$. Raw log:
    $full_log$. This activity is associated with web reconnaissance,
    vulnerability fingerprinting, brute-force attempts, or active
    exploitation; investigate the source IP for additional malicious
    activity, correlate with subsequent requests from the same source,
    review web server logs for follow-on exploitation attempts, and
    consider blocking the source IP at the perimeter if the activity
    is not part of authorized testing or monitoring.
  risk_score: 40
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 30
    - field: data_srcip
      type: ip_address
      score: 30
  threat_objects:
    - field: data_srcip
      type: ip_address
    - field: data_url
      type: url
    - field: full_log
      type: http_request


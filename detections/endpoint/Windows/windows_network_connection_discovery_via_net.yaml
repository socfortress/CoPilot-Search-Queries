name: Windows Network Connection Discovery Via Net
id: Windows-Network-Connection-Discovery-Via-Net
version: 3
schema_version: 1
date: '2025-05-02'
author: SOCFortress LLC
status: production
type: Hunting
description: >
  Detects execution of net.exe with command-line arguments used to list or display
  information about network connections (net use, net view, etc.). Adversaries use
  this built-in utility during network reconnaissance to gather situational awareness,
  map Active Directory, and identify critical assets for lateral movement or data
  exfiltration. Associated with Active Directory Discovery, Azorult, Prestige
  Ransomware, and Windows Post-Exploitation tradecraft.
  MITRE ATT&CK: T1049 (System Network Connections Discovery).

data_source:
  - Sysmon EventID 1 (ProcessCreate)

search:
  query:
    bool:
      must:
        - term:
            agent_name: "AGENT_NAME"
        - term:
            agent_labels_customer: "CUSTOMER_CODE"
        - term:
            data_win_system_eventID: "1"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_image: "*\\net.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\net1.exe"
            minimum_should_match: 1
        - wildcard:
            data_win_eventdata_commandLine: "*use*"
        - range:
            timestamp:
              gte: "START_TIME"
              lte: "END_TIME"

parameters:
  - name: AGENT_NAME
    default: "DESKTOP-AM0HLGE"
  - name: CUSTOMER_CODE
    default: "lab"
  - name: START_TIME
    default: "now-24h"
  - name: END_TIME
    default: "now"

how_to_implement: >
  Requires Sysmon EventID 1 (ProcessCreate) flowing to the Wazuh Indexer.
  Fields data_win_eventdata_image and data_win_eventdata_commandLine are
  confirmed working across all EventID 1 detections in this environment.
  Field-validated based on established EventID 1 detection patterns.

known_false_positives: >
  Administrators or power users may use net use for legitimate network drive
  mapping or connection management. Filter by parent process or user context
  as needed.

references:
  - https://attack.mitre.org/techniques/T1049/

response:
  message: >
    Network connection discovery via net.exe detected on $agent_name$ by $data_win_eventdata_user$.
    Parent: $data_win_eventdata_parentImage$.
    Command: $data_win_eventdata_commandLine$.
    MITRE ATT&CK: T1049
  risk_score: 15
  severity: low
  risk_objects:
    - field: agent_name
      type: system
      score: 15
    - field: data_win_eventdata_user
      type: user
      score: 15
  threat_objects:
    - field: data_win_eventdata_parentImage
      type: parent_process_name
    - field: data_win_eventdata_image
      type: process_name

tags:
  analytic_story:
    - Active Directory Discovery
    - Azorult
    - Windows Post-Exploitation
    - Prestige Ransomware
  asset_type: Endpoint
  mitre_attack_id:
    - T1049
  custom_tags:
    - net_use
    - network_discovery
    - reconnaissance
    - active_directory
    - living_off_the_land
  product:
    - Wazuh
  security_domain: endpoint
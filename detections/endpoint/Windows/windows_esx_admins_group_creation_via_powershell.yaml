name: Windows ESX Admins Group Creation via PowerShell
id: f48a5557-be06-4b96-b8e8-be563e387620
version: 1
schema_version: "1.0"
date: "2026-03-30"
author: SOCFortress LLC
status: production
type: TTP
description: >
  Detects attempts to create an "ESX Admins" group using PowerShell commands
  including New-ADGroup or New-LocalGroup. This activity may indicate an attempt
  to exploit the VMware ESXi Active Directory Integration Authentication Bypass
  vulnerability (CVE-2024-37085). Attackers recreate the 'ESX Admins' group
  after its deletion from Active Directory to gain full administrative access
  to ESXi hosts. This technique has been used by ransomware operators for
  mass encryption of ESXi hypervisors.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*ESX Admins*"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*New-ADGroup*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*New-LocalGroup*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_path
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-30 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-30 23:59:59.999"

how_to_implement: >
  Requires PowerShell Script Block Logging enabled on endpoints.
  Enable via Group Policy: Computer Configuration → Administrative Templates
  → Windows Components → Windows PowerShell → Turn on PowerShell Script Block
  Logging.

known_false_positives: >
  Legitimate administrators might create an "ESX Admins" group for valid
  reasons. Verify that the group creation is authorized and part of normal
  administrative tasks. Consider the context of the action, such as the user
  performing it and any related activities.

references:
  - https://attack.mitre.org/techniques/T1136/001/
  - https://attack.mitre.org/techniques/T1136/002/
  - https://support.broadcom.com/web/ecx/support-content-notification/-/external/content/SecurityAdvisories/0/24505
  - https://www.microsoft.com/en-us/security/blog/2024/07/29/ransomware-operators-exploit-esxi-hypervisor-vulnerability-for-mass-encryption/

response:
  message: >
    PowerShell command to create ESX Admins group detected on $agent_name$
    by $data_win_eventdata_user$.
    Script: $data_win_eventdata_scriptBlockText$.
    MITRE ATT&CK: T1136.001, T1136.002
  risk_score: 56
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 56
    - field: data_win_eventdata_user
      type: user
      score: 56
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: script_block

tags:
  analytic_story:
    - VMware ESXi AD Integration Authentication Bypass CVE-2024-37085
  asset_type: Endpoint
  mitre_attack_id:
    - T1136.001
    - T1136.002
  custom_tags:
    - esx_admins
    - vmware_esxi
    - cve_2024_37085
    - group_creation
    - ransomware
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*ESX Admins.*/ AND (data_win_eventdata_scriptBlockText:/.*New-ADGroup.*/ OR data_win_eventdata_scriptBlockText:/.*New-LocalGroup.*/)
  analytic_story:
    - DHS Report TA18-074A
    - Volt Typhoon
    - China-Nexus Threat Activity
    - AsyncRAT
    - HAFNIUM Group
    - Salt Typhoon
    - XWorm
    - DarkCrystal RAT
    - 0bj3ctivity Stealer
    - APT37 Rustonotto and FadeStealer
    - BlankGrabber Stealer
    - MuddyWater
    - Malicious PowerShell
    - Suspicious Command-Line Executions
    - Compromised Windows Host
  asset_type: Endpoint
  mitre_attack_id:
    - T1059.001
  custom_tags:
    - powershell
    - execution_policy_bypass
    - powershell_abuse
    - malicious_powershell
    - lolbin
    - defense_evasion
    - script_execution
    - command_line_abuse
    - policy_bypass
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"1" AND (data_win_eventdata_image:/.*[Pp][Oo][Ww][Ee][Rr][Ss][Hh][Ee][Ll][Ll]\.exe/ OR data_win_eventdata_image:/.*[Pp][Ww][Ss][Hh]\.exe/ OR data_win_eventdata_originalFileName:/[Pp][Oo][Ww][Ee][Rr][Ss][Hh][Ee][Ll][Ll]\.EXE/ OR data_win_eventdata_originalFileName:/[Pp][Ww][Ss][Hh]\.dll/) AND data_win_eventdata_commandLine:/.* \-[Ee][Xx].*/ AND data_win_eventdata_commandLine:/.* [Bb][Yy][Pp][Aa][Ss][Ss] .*/
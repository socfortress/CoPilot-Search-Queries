name: Windows Chromium Browser with Custom User Data Directory
id: 4f546cf4-15aa-4368-80f7-940e92bc551e
version: 3
schema_version: 1
date: '2025-12-16'
author: SOCFortress LLC
status: production
type: Anomaly
description: >
  Detects Chromium-based browsers (Chrome, Edge, Brave, Opera, Vivaldi) launched
  with both --user-data-dir and --disable-gpu or --disable-3d-apis flags. While
  --user-data-dir alone is legitimate for multi-profile support, the combination
  with GPU-disabling flags indicates a headless-like stealth execution pattern
  used by infostealers. StealC, LokiBot, and Malicious Inno Setup loaders abuse
  this pattern to run Chrome in an isolated environment for credential harvesting,
  phishing delivery, or evasion of user session artifacts.
  MITRE ATT&CK: T1497 (Virtualization/Sandbox Evasion).

data_source:
  - Sysmon EventID 1 (ProcessCreate)

search:
  query:
    bool:
      must:
        - term:
            agent_name: "AGENT_NAME"
        - term:
            agent_labels_customer: "CUSTOMER_CODE"
        - term:
            data_win_system_eventID: "1"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_image: "*\\chrome.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\msedge.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\brave.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\opera.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\vivaldi.exe"
            minimum_should_match: 1
        - wildcard:
            data_win_eventdata_commandLine: "*--user-data-dir*"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_commandLine: "*--disable-gpu*"
              - wildcard:
                  data_win_eventdata_commandLine: "*--disable-3d-apis*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "START_TIME"
              lte: "END_TIME"

parameters:
  - name: AGENT_NAME
    default: "DESKTOP-AM0HLGE"
  - name: CUSTOMER_CODE
    default: "lab"
  - name: START_TIME
    default: "now-24h"
  - name: END_TIME
    default: "now"

how_to_implement: >
  Requires Sysmon EventID 1 (ProcessCreate) flowing to the Wazuh Indexer.
  Validated on DESKTOP-AM0HLGE with Chrome launched via PowerShell using
  --user-data-dir=C:\Windows\Temp\fake_profile --disable-gpu. Chrome
  self-spawns child processes inheriting the same flags — filter on
  data_win_eventdata_parentImage to focus on non-browser parent launches.
  Confirmed field names: data_win_eventdata_image, data_win_eventdata_commandLine,
  data_win_eventdata_parentImage, data_win_eventdata_user.

known_false_positives: >
  Automated testing frameworks (Selenium, Playwright) and some IT admin
  scripts may use this flag combination legitimately. Chrome also self-spawns
  child processes with the same flags generating multiple hits per launch.
  Filter on data_win_eventdata_parentImage for known automation tool paths.
  Executions from powershell.exe, cmd.exe, or unknown binaries pointing to
  non-standard user-data-dir paths (temp, appdata) should be prioritized.

references:
  - https://chromium.googlesource.com/chromium/src/+/main/docs/user_data_dir.md
  - https://attack.mitre.org/techniques/T1497/

response:
  message: >
    Chromium browser launched with custom user data directory and GPU-disabling
    flags on $agent_name$.
    Command line: $data_win_eventdata_commandLine$.
    Parent process: $data_win_eventdata_parentImage$.
    User: $data_win_eventdata_user$.
    Possible infostealer (StealC, LokiBot) abusing Chrome for stealth credential
    harvesting. MITRE ATT&CK: T1497
  risk_score: 40
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 40
    - field: data_win_eventdata_user
      type: user
      score: 40
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name
    - field: data_win_eventdata_parentImage
      type: parent_process_name

tags:
  analytic_story:
    - StealC Stealer
    - Malicious Inno Setup Loader
    - Lokibot
  asset_type: Endpoint
  mitre_attack_id:
    - T1497
  custom_tags:
    - chrome
    - user_data_dir
    - disable_gpu
    - infostealer
    - stealc
    - lokibot
    - sandbox_evasion
  product:
    - Wazuh
  security_domain: endpoint
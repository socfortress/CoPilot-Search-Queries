graylog:
  query: data_win_system_eventID:"1" AND (data_win_eventdata_parentImage:/.*\\\\[Mm][Mm][Cc]\.exe/ OR data_win_eventdata_parentImage:/.*\\\\[Ss][Ee][Rr][Vv][Ii][Cc][Ee][Ss]\.exe/ OR data_win_eventdata_parentImage:/.*\\\\[Ww][Mm][Ii][Pp][Rr][Vv][Ss][Ee]\.exe/ OR data_win_eventdata_parentImage:/.*\\\\[Ww][Ss][Mm][Pp][Rr][Oo][Vv][Hh][Oo][Ss][Tt]\.exe/ OR (data_win_eventdata_parentImage:/.*\\\\[Ss][Vv][Cc][Hh][Oo][Ss][Tt]\.exe/ AND NOT data_win_eventdata_parentCommandLine:/.*\-[Kk] [Nn][Ee][Tt][Ss][Vv][Cc][Ss].*/ AND NOT data_win_eventdata_parentCommandLine:/.*\-[Ss] [Ss][Cc][Hh][Ee][Dd][Uu][Ll][Ee].*/)) AND (data_win_eventdata_image:/.*\\\\[Pp][Oo][Ww][Ee][Rr][Ss][Hh][Ee][Ll][Ll]\.exe/ OR data_win_eventdata_image:/.*\\\\[Pp][Ww][Ss][Hh]\.exe/ OR (data_win_eventdata_image:/.*\\\\[Cc][Mm][Dd]\.exe/ AND (data_win_eventdata_commandLine:/.*[Pp][Oo][Ww][Ee][Rr][Ss][Hh][Ee][Ll][Ll].*/ OR data_win_eventdata_commandLine:/.*[Pp][Ww][Ss][Hh].*/))) AND NOT data_win_eventdata_commandLine:/.*[Cc]\:\\\\[Ww][Ii][Nn][Dd][Oo][Ww][Ss]\\\\[Cc][Cc][Mm]\\\\.*/
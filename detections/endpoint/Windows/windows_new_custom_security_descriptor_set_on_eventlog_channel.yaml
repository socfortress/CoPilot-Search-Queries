name: Windows New Custom Security Descriptor Set On EventLog Channel
id: Windows-New-Custom-Security-Descriptor-Set-On-EventLog-Channel
version: 4
schema_version: 1
date: '2025-05-02'
author: SOCFortress LLC
status: production
type: Anomaly
description: >
  Detects suspicious modifications to the EventLog security descriptor registry
  value (CustomSD) under HKLM\System\CurrentControlSet\Services\Eventlog\<Channel>.
  Attackers modify this legacy registry value to restrict access permissions on
  event log channels, blinding security products and preventing log ingestion.
  This technique has near-zero legitimate use cases and is associated with
  LockBit Ransomware and SDDL Tampering defense evasion tradecraft.
  MITRE ATT&CK: T1562.002 (Impair Defenses: Disable Windows Event Logging).

data_source:
  - Sysmon EventID 13 (RegistryEvent Value Set)

search:
  query:
    bool:
      must:
        - term:
            agent_name: "AGENT_NAME"
        - term:
            agent_labels_customer: "CUSTOMER_CODE"
        - term:
            data_win_system_eventID: "13"
        - wildcard:
            data_win_eventdata_targetObject: "*\\Services\\Eventlog\\*"
        - wildcard:
            data_win_eventdata_targetObject: "*CustomSD*"
        - range:
            timestamp:
              gte: "START_TIME"
              lte: "END_TIME"

parameters:
  - name: AGENT_NAME
    default: "DESKTOP-AM0HLGE"
  - name: CUSTOMER_CODE
    default: "lab"
  - name: START_TIME
    default: "now-24h"
  - name: END_TIME
    default: "now"

how_to_implement: >
  Requires Sysmon EventID 13 (RegistryEvent Value Set) flowing to the Wazuh Indexer.
  Fields data_win_eventdata_targetObject and data_win_eventdata_details are
  confirmed working across all EventID 13 detections in this environment.
  Field-validated based on established EventID 13 detection patterns.
  Setting the CustomSD value is considered a legacy option with no common
  legitimate use — any hit should be treated as high priority.

known_false_positives: >
  None identified. Setting the CustomSD value on EventLog channels is a legacy
  option and is not expected in normal operations.

references:
  - https://learn.microsoft.com/en-us/troubleshoot/windows-server/group-policy/set-event-log-security-locally-or-via-group-policy
  - https://attack.mitre.org/techniques/T1562/002/

response:
  message: >
    EventLog channel security descriptor (CustomSD) modified on $agent_name$ by $data_win_eventdata_user$.
    Registry path: $data_win_eventdata_targetObject$.
    Value set: $data_win_eventdata_details$.
    MITRE ATT&CK: T1562.002
  risk_score: 64
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 64
    - field: data_win_eventdata_user
      type: user
      score: 64
  threat_objects:
    - field: data_win_eventdata_targetObject
      type: registry_path

tags:
  analytic_story:
    - LockBit Ransomware
    - Defense Evasion or Unauthorized Access Via SDDL Tampering
  asset_type: Endpoint
  mitre_attack_id:
    - T1562.002
  custom_tags:
    - eventlog_tampering
    - customsd
    - sddl
    - defense_evasion
    - registry
  product:
    - Wazuh
  security_domain: endpoint
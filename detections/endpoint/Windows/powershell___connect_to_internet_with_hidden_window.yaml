  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"1" AND (data_win_eventdata_image:/.*\\\\[Pp][Oo][Ww][Ee][Rr][Ss][Hh][Ee][Ll][Ll]\.exe/ OR data_win_eventdata_image:/.*\\\\[Pp][Ww][Ss][Hh]\.exe/ OR data_win_eventdata_originalFileName:/[Pp][Oo][Ww][Ee][Rr][Ss][Hh][Ee][Ll][Ll]\.EXE/ OR data_win_eventdata_originalFileName:/[Pp][Ww][Ss][Hh]\.dll/) AND (data_win_eventdata_commandLine:/.* [\-\/][Ww][Ii]?[Nn]?[Dd]?[Oo]?[Ww]?[Ss]?[Tt]?[Yy]?[Ll]?[Ee]? [Hh][Ii][Dd][Dd][Ee][Nn].*/ OR data_win_eventdata_commandLine:/.* [\-\/][Ww][Ii]?[Nn]?[Dd]?[Oo]?[Ww]?[Ss]?[Tt]?[Yy]?[Ll]?[Ee]? [Mm][Ii][Nn][Ii][Mm][Ii][Zz][Ee][Dd].*/ OR data_win_eventdata_commandLine:/.* [\-\/][Ww][Ii]?[Nn]?[Dd]?[Oo]?[Ww]?[Ss]?[Tt]?[Yy]?[Ll]?[Ee]? [Mm][Aa][Xx][Ii][Mm][Ii][Zz][Ee][Dd].*/)
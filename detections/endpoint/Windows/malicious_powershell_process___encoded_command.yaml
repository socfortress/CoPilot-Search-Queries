graylog:
  query: data_win_system_eventID:"1" AND (data_win_eventdata_image:/.*[Pp][Oo][Ww][Ee][Rr][Ss][Hh][Ee][Ll][Ll]\.exe/ OR data_win_eventdata_image:/.*[Pp][Ww][Ss][Hh]\.exe/ OR data_win_eventdata_originalFileName:/[Pp][Oo][Ww][Ee][Rr][Ss][Hh][Ee][Ll][Ll]\.EXE/ OR data_win_eventdata_originalFileName:/[Pp][Ww][Ss][Hh]\.dll/) AND data_win_eventdata_commandLine:/.*[ \/\-]\-?([Ee][Cc]|[Ee][Nn]|[Ee][Nn][Cc]|[Ee][Nn][Cc][Oo]|[Ee][Nn][Cc][Oo][Dd]|[Ee][Nn][Cc][Oo][Dd][Ee]|[Ee][Nn][Cc][Oo][Dd][Ee][Dd]|[Ee][Nn][Cc][Oo][Dd][Ee][Dd][Cc]|[Ee][Nn][Cc][Oo][Dd][Ee][Dd][Cc][Oo]|[Ee][Nn][Cc][Oo][Dd][Ee][Dd][Cc][Oo][Mm]|[Ee][Nn][Cc][Oo][Dd][Ee][Dd][Cc][Oo][Mm][Mm]|[Ee][Nn][Cc][Oo][Dd][Ee][Dd][Cc][Oo][Mm][Mm][Aa]|[Ee][Nn][Cc][Oo][Dd][Ee][Dd][Cc][Oo][Mm][Mm][Aa][Nn]|[Ee][Nn][Cc][Oo][Dd][Ee][Dd][Cc][Oo][Mm][Mm][Aa][Nn][Dd]) +[A-Za-z0-9+\/=]{5,}.*/ AND NOT data_win_eventdata_commandLine:/.*[Ee]nter\-[Pp][Ss][Ss]ession.*/
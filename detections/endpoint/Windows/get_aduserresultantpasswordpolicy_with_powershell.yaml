name: Get ADUserResultantPasswordPolicy with Powershell
id: 8b5ef342-065a-11ec-b0fc-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-27"
author: SOCFortress LLC
status: production
type: TTP

description: >
  This analytic detects the execution of powershell.exe, pwsh.exe, or
  cmd.exe with the Get-ADUserResultantPasswordPolicy cmdlet referenced
  in the command line. Sysmon EventID 1 is used to match process
  creation events where the image or OriginalFileName is one of the
  PowerShell or Command Prompt binaries AND the command line contains
  Get-ADUserResultantPasswordPolicy. This cmdlet is part of the
  ActiveDirectory PowerShell module and returns the effective (resultant)
  password policy applied to a specific user account, taking into
  account both the default domain policy and any Fine-Grained Password
  Policies (FGPP) that may apply. This activity is significant because
  it indicates targeted enumeration of per-user password policy
  settings - useful for adversaries during the discovery phase to
  identify accounts with weak password requirements (long expiration,
  no lockout, no complexity) that are best suited for password
  spraying or brute-force attacks. This is a known T1201 (Password
  Policy Discovery) technique documented in CISA AA23-347A. If
  confirmed malicious, this could allow attackers to understand
  per-account password policies, identify the most attackable accounts,
  and tune their credential attacks to evade lockout protections.

data_source:
  - Sysmon EventID 1

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "1"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_image: "*cmd.exe"
              - wildcard:
                  data_win_eventdata_image: "*powershell*.exe"
              - wildcard:
                  data_win_eventdata_image: "*pwsh.exe"
              - term:
                  data_win_eventdata_originalFileName: "Cmd.Exe"
              - term:
                  data_win_eventdata_originalFileName: "PowerShell.EXE"
              - term:
                  data_win_eventdata_originalFileName: "pwsh.dll"
            minimum_should_match: 1
        - wildcard:
            data_win_eventdata_commandLine:
              value: "*Get-ADUserResultantPasswordPolicy*"
              case_insensitive: true
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_eventdata_image
    - data_win_eventdata_originalFileName
    - data_win_eventdata_commandLine
    - data_win_eventdata_parentImage
    - data_win_eventdata_parentCommandLine
    - data_win_eventdata_user
    - data_win_eventdata_processId
    - data_win_eventdata_processGuid
    - data_win_eventdata_parentProcessId
    - data_win_eventdata_parentProcessGuid
    - data_win_eventdata_hashes
    - data_win_eventdata_integrityLevel
    - data_win_eventdata_currentDirectory

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-27 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-27 23:59:59.999"

how_to_implement: >
  This detection requires Sysmon EventID 1 (Process Creation) logs to be forwarded
  from Windows endpoints to Wazuh Indexer. Ensure Sysmon is deployed with a
  configuration that captures Image, OriginalFileName, and CommandLine fields
  (SwiftOnSecurity or Olaf Hartong Sysmon modular config recommended). The
  detection matches Windows shells (PowerShell or Command Prompt) by Image
  path or PE OriginalFileName, combined with the
  Get-ADUserResultantPasswordPolicy cmdlet name in the command line.
  Case-insensitive matching is used on the cmdlet name to handle
  PowerShell's flexible casing. The ES DSL uses case_insensitive
  wildcard option (OpenSearch 2.x / Elasticsearch 7.10+); Graylog
  equivalent uses character classes. For deeper coverage, also enable
  PowerShell Script Block Logging (EventID 4104) and correlate against
  the same cmdlet name in script blocks.

known_false_positives: >
  System administrators, helpdesk staff, or domain admins may
  legitimately use Get-ADUserResultantPasswordPolicy for AD audit,
  Fine-Grained Password Policy troubleshooting, or compliance
  reporting. Review the parent process lineage (legitimate admin
  session vs. unexpected parent), user context (admin account vs.
  standard user vs. service account), and timing to distinguish
  authorized administrative activity from reconnaissance. Concurrent
  use of multiple AD discovery cmdlets and password policy queries on
  a single host within a short window should be treated as
  high-priority regardless of user context.

references:
  - https://attack.mitre.org/techniques/T1201/
  - https://github.com/S1ckB0y1337/Active-Directory-Exploitation-Cheat-Sheet
  - https://docs.microsoft.com/en-us/powershell/module/activedirectory/get-aduserresultantpasswordpolicy
  - https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-347a

response:
  message: >
    PowerShell Get-ADUserResultantPasswordPolicy reconnaissance was
    identified on endpoint $agent_name$ by user
    $data_win_eventdata_user$. Process image: $data_win_eventdata_image$.
    Parent process: $data_win_eventdata_parentImage$. Command line:
    $data_win_eventdata_commandLine$. This is consistent with targeted
    per-user password policy discovery commonly preceding tuned
    password spraying or brute-force attacks; investigate parent
    process lineage and concurrent AD discovery activity.
  risk_score: 56
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 50
    - field: data_win_eventdata_user
      type: user
      score: 50
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name
    - field: data_win_eventdata_parentImage
      type: parent_process_name
    - field: data_win_eventdata_commandLine
      type: command_line

tags:
  analytic_story:
    - Active Directory Discovery
    - CISA AA23-347A
    - Active Directory Reconnaissance
    - Password Policy Discovery
  asset_type: Endpoint
  mitre_attack_id:
    - T1201
  custom_tags:
    - powershell
    - active_directory
    - password_policy_discovery
    - ad_enumeration
    - reconnaissance
    - password_spraying_precursor
    - fgpp
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"1" AND (data_win_eventdata_image:/.*[Cc][Mm][Dd]\.exe.*/ OR data_win_eventdata_image:/.*[Pp][Oo][Ww][Ee][Rr][Ss][Hh][Ee][Ll][Ll].*\.exe.*/ OR data_win_eventdata_image:/.*[Pp][Ww][Ss][Hh]\.exe.*/ OR data_win_eventdata_originalFileName:"Cmd.Exe" OR data_win_eventdata_originalFileName:"PowerShell.EXE" OR data_win_eventdata_originalFileName:"pwsh.dll") AND data_win_eventdata_commandLine:/.*[Gg][Ee][Tt]\-[Aa][Dd][Uu][Ss][Ee][Rr][Rr][Ee][Ss][Uu][Ll][Tt][Aa][Nn][Tt][Pp][Aa][Ss][Ss][Ww][Oo][Rr][Dd][Pp][Oo][Ll][Ii][Cc][Yy].*/
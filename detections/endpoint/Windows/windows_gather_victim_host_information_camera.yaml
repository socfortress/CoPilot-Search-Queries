name: Windows Gather Victim Host Information Camera
id: e4df4676-ea41-4397-b160-3ee0140dc332
version: 1
schema_version: "1.0"
date: "2026-03-30"
author: SOCFortress LLC
status: production
type: Anomaly
description: >
  Detects PowerShell scripts that enumerate camera devices on the targeted host
  using Win32_PnPEntity WMI queries filtering by PNPClass for Image or Camera
  devices. This activity is commonly observed in DCRat (Dark Crystal RAT) malware
  which collects camera data to send to its C2 server. Detecting this behavior
  may indicate an attempt to gather sensitive visual information from the host,
  potentially leading to privacy breaches or further exploitation.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Win32_PnPEntity*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*SELECT*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*WHERE*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*PNPClass*"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Image*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Camera*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_path
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-30 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-30 23:59:59.999"

how_to_implement: >
  Requires PowerShell Script Block Logging enabled on endpoints.
  Enable via Group Policy: Computer Configuration → Administrative Templates
  → Windows Components → Windows PowerShell → Turn on PowerShell Script Block
  Logging.

known_false_positives: >
  Administrators may execute this PowerShell command to get hardware information
  related to cameras on endpoints for legitimate inventory or troubleshooting
  purposes. Review the user context and frequency to determine legitimacy.

references:
  - https://attack.mitre.org/techniques/T1592/001/
  - https://cert.gov.ua/article/405538
  - https://malpedia.caad.fkie.fraunhofer.de/details/win.dcrat
  - https://www.mandiant.com/resources/analyzing-dark-crystal-rat-backdoor

response:
  message: >
    PowerShell camera enumeration via Win32_PnPEntity detected on $agent_name$
    by $data_win_eventdata_user$.
    Script: $data_win_eventdata_scriptBlockText$.
    MITRE ATT&CK: T1592.001
  risk_score: 42
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 42
    - field: data_win_eventdata_user
      type: user
      score: 42
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: script_block

tags:
  analytic_story:
    - DarkCrystal RAT
  asset_type: Endpoint
  mitre_attack_id:
    - T1592.001
  custom_tags:
    - dcrat
    - camera_enumeration
    - wmi
    - win32_pnpentity
    - hardware_discovery
    - rat
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Win32_PnPEntity.*/ AND data_win_eventdata_scriptBlockText:/.*SELECT.*/ AND data_win_eventdata_scriptBlockText:/.*WHERE.*/ AND data_win_eventdata_scriptBlockText:/.*PNPClass.*/ AND (data_win_eventdata_scriptBlockText:/.*Image.*/ OR data_win_eventdata_scriptBlockText:/.*Camera.*/)
name: Windows Disable Change Password Through Registry
id: 0df33e1a-9ef6-11ec-a1ad-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-07"
author: SOCFortress LLC
status: production
type: Anomaly

description: >
  The following analytic detects a suspicious registry modification that disables the Change Password
  feature on a Windows host. It identifies changes to the registry path
  "*\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System\DisableChangePassword" with a value
  of "0x00000001". This activity is significant as it can prevent users from changing their passwords,
  a tactic often used by ransomware to maintain control over compromised systems. If confirmed malicious,
  this could hinder user response to an attack, allowing the attacker to persist and potentially escalate
  their access within the network.

data_source:
  - Sysmon EventID 13

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "13"
        - wildcard:
            data_win_eventdata_targetObject: "*DisableChangePassword"
        - term:
            data_win_eventdata_details: "DWORD (0x00000001)"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - data_win_eventdata_targetObject
    - data_win_eventdata_details
    - data_win_eventdata_image
    - data_win_eventdata_user
    - agent_name

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "YYYY-MM-DD 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "YYYY-MM-DD 23:59:59.999"

how_to_implement: >
  To successfully implement this search, you need to be ingesting logs with the registry value name,
  registry path, and registry value data from your endpoints. Sysmon EventID 13 captures registry
  modifications (SetValue operations). Ensure that Sysmon is configured to log registry operations
  and that these logs are properly ingested into Elasticsearch with complete registry path and value
  information. The detection specifically looks for modifications to the DisableChangePassword registry
  value being set to 0x00000001 (enabled/true), which blocks users from changing their passwords.

known_false_positives: >
  This Windows feature may be legitimately implemented by administrators to prevent normal users from
  changing passwords on critical hosts or servers. In such scenarios, a filter is necessary to minimize
  false positives. Organizations using Group Policy to enforce password policies may also trigger this
  detection when policies are applied. Whitelist administrative accounts and approved management tools
  that legitimately modify this registry setting.

references:
  - https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom_heartbleed.thdobah

response:
  message: >
    Registry modification detected on $agent_name$. Process $data_win_eventdata_image$
    by user $data_win_eventdata_user$ modified DisableChangePassword registry key to value
    $data_win_eventdata_details$. This may indicate ransomware or malicious activity attempting to
    prevent password changes.
  risk_score: 50
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 50
    - field: data_win_eventdata_user
      type: user
      score: 50
  threat_objects:
    - field: data_win_eventdata_image
      type: process

tags:
  analytic_story:
    - Ransomware
    - Defense Evasion
    - Windows Policy Abuse
  asset_type: Endpoint
  mitre_attack_id:
    - T1112
  custom_tags:
    - registry_modification
    - ransomware
    - defense_evasion
    - persistence
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"13" AND data_win_eventdata_targetObject:HKLM\\\\SOFTWARE\\\\Microsoft\\\\Windows\\\\CurrentVersion\\\\Policies\\\\System\\\\DisableChangePassword
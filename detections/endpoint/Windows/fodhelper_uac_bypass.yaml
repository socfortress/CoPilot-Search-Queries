name: FodHelper UAC Bypass
id: 909f8fd8-7ac8-11eb-a1f3-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-27"
author: SOCFortress LLC
status: production
type: TTP

description: >
  This analytic detects child processes spawned by fodhelper.exe, which
  is the canonical indicator of the FodHelper UAC bypass technique.
  Sysmon EventID 1 is used to match process creation events where the
  parent process image ends with fodhelper.exe. fodhelper.exe is a
  legitimate Microsoft-signed Windows binary used to manage Features on
  Demand. It is auto-elevated (runs at High integrity without prompting
  the user for UAC consent) and reads command information from the
  HKCU registry hive when launched. By planting a payload command in
  the HKCU\Software\Classes\ms-settings\Shell\Open\command registry key
  and then launching fodhelper.exe, an attacker can cause arbitrary
  code to run with elevated privileges - bypassing UAC entirely. This
  technique is documented in MITRE ATT&CK T1548.002, included in Atomic
  Red Team, and observed in use by multiple malware families and
  campaigns including IcedID, ValleyRAT, and BlankGrabber Stealer.
  Legitimate use of fodhelper.exe rarely if ever spawns child processes
  visible at the user level, so any child-process activity should be
  treated as suspicious. If confirmed malicious, this could allow an
  attacker to elevate privileges from Medium to High integrity, modify
  the registry, install persistence, disable security tooling, or
  execute additional payloads with elevated rights.

data_source:
  - Sysmon EventID 1

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "1"
        - wildcard:
            data_win_eventdata_parentImage: "*fodhelper.exe"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_eventdata_image
    - data_win_eventdata_originalFileName
    - data_win_eventdata_commandLine
    - data_win_eventdata_parentImage
    - data_win_eventdata_parentCommandLine
    - data_win_eventdata_user
    - data_win_eventdata_processId
    - data_win_eventdata_processGuid
    - data_win_eventdata_parentProcessId
    - data_win_eventdata_parentProcessGuid
    - data_win_eventdata_hashes
    - data_win_eventdata_integrityLevel
    - data_win_eventdata_currentDirectory

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-27 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-27 23:59:59.999"

how_to_implement: >
  This detection requires Sysmon EventID 1 (Process Creation) logs to be forwarded
  from Windows endpoints to Wazuh Indexer. Ensure Sysmon is deployed with a
  configuration that captures Image, ParentImage, OriginalFileName, and
  CommandLine fields (SwiftOnSecurity or Olaf Hartong Sysmon modular config
  recommended). The detection matches any process whose parent image ends
  with fodhelper.exe (case-insensitive in Graylog). For higher fidelity in
  noisy environments, correlate this detection with Sysmon EventID 13
  (Registry Value Set) targeting HKCU\Software\Classes\ms-settings\Shell\
  Open\command - the combination of registry key set + fodhelper.exe
  launch + child process within seconds is the canonical FodHelper UAC
  bypass signature.

known_false_positives: >
  Limited to no false positives are expected. Legitimate use of
  fodhelper.exe is performed by Windows itself in the context of
  Features-on-Demand management UI and rarely produces user-visible
  child processes. Any child process activity warrants investigation.
  Filter as needed only if specific Microsoft-signed maintenance tools
  in your environment legitimately spawn under fodhelper.

references:
  - https://attack.mitre.org/techniques/T1548/002/
  - https://attack.mitre.org/techniques/T1112/
  - https://blog.malwarebytes.com/malwarebytes-news/2021/02/lazyscripter-from-empire-to-double-rat/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1548.002/T1548.002.md
  - https://github.com/gushmazuko/WinBypass/blob/master/FodhelperBypass.ps1

response:
  message: >
    A child process was spawned by fodhelper.exe on endpoint
    $agent_name$ by user $data_win_eventdata_user$. Child process image:
    $data_win_eventdata_image$. Child command line:
    $data_win_eventdata_commandLine$. Parent process image:
    $data_win_eventdata_parentImage$. This is a high-confidence
    indicator of the FodHelper UAC bypass technique - investigate
    immediately, review concurrent registry modifications under
    HKCU\Software\Classes\ms-settings, and isolate the host if the
    child process activity is unexpected.
  risk_score: 80
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 70
    - field: data_win_eventdata_user
      type: user
      score: 70
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name
    - field: data_win_eventdata_parentImage
      type: parent_process_name
    - field: data_win_eventdata_commandLine
      type: command_line

tags:
  analytic_story:
    - IcedID
    - ValleyRAT
    - Compromised Windows Host
    - Windows Defense Evasion Tactics
    - BlankGrabber Stealer
    - UAC Bypass
    - Privilege Escalation
  asset_type: Endpoint
  mitre_attack_id:
    - T1548.002
    - T1112
  custom_tags:
    - fodhelper
    - uac_bypass
    - privilege_escalation
    - registry_modification
    - lolbin
    - autoelevate_abuse
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"1" AND data_win_eventdata_parentImage:/.*[Ff][Oo][Dd][Hh][Ee][Ll][Pp][Ee][Rr]\.exe.*/
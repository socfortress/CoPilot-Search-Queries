name: Detect Path Interception By Creation Of program exe
id: cbef820c-e1ff-407f-887f-0a9240a2d477
version: 1
schema_version: "1.0"
date: "2026-04-21"
author: SOCFortress LLC
status: production
type: TTP

description: >
  Identifies the creation of a program executable in an unquoted service path,
  a common technique for privilege escalation. It leverages data from Endpoint
  Detection and Response (EDR) agents, focusing on process creation events where
  an executable with a common name is created in a service directory path.
  This activity is significant because unquoted service paths can be exploited
  by attackers to execute arbitrary code with elevated privileges. If confirmed
  malicious, this could allow an attacker to gain higher-level access,
  potentially leading to full system compromise and persistent control over the
  affected endpoint.

data_source:
  - Sysmon EventID 1
  - Windows Event Log Security 4688

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "1"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_image: "*Program Files*program.exe"
              - wildcard:
                  data_win_eventdata_image: "*Program Files*program.bat"
              - wildcard:
                  data_win_eventdata_image: "*Program Files*program.com"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_image
    - data_win_eventdata_parentImage
    - data_win_eventdata_commandLine
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-21 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-21 23:59:59.999"

how_to_implement: >
  Requires Wazuh agents with Sysmon installed and configured to log process
  creation events (EventID 1). The data_win_eventdata_image field must be
  populated with full file paths in Elasticsearch/Wazuh Indexer. This detection
  monitors for suspicious executables created in Program Files directories with
  common generic names like program.exe, program.bat, or program.com.

known_false_positives: >
  No false positives have been identified at this time. Legitimate applications
  should not create generic named executables in Program Files directories.

references:
  - https://medium.com/@SumitVerma101/windows-privilege-escalation-part-1-unquoted-service-path-c7a011a8d8ae
  - https://attack.mitre.org/techniques/T1574/009/

response:
  message: >
    Suspicious program executable detected in Program Files directory on
    $agent_name$ by user $data_win_eventdata_user$. Image:
    $data_win_eventdata_image$. Parent: $data_win_eventdata_parentImage$.
    Command: $data_win_eventdata_commandLine$. This indicates potential
    unquoted service path exploitation for privilege escalation.
    MITRE ATT&CK: T1574.009
  risk_score: 70
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 70
    - field: data_win_eventdata_user
      type: user
      score: 70
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name
    - field: data_win_eventdata_parentImage
      type: parent_process

tags:
  analytic_story:
    - Windows Persistence Techniques
    - Privilege Escalation
  asset_type: Endpoint
  mitre_attack_id:
    - T1574.009
  custom_tags:
    - unquoted_service_path
    - privilege_escalation
    - program_files
    - path_interception
    - generic_executable
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"1" AND (data_win_eventdata_image:/.*Program Files.*program\.exe.*/ OR data_win_eventdata_image:/.*Program Files.*program\.bat.*/ OR data_win_eventdata_image:/.*Program Files.*program\.com.*/)
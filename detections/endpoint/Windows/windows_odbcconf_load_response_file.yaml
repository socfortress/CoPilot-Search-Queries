name: Windows Odbcconf Load Response File
id: Windows-Odbcconf-Load-Response-File
version: 8
schema_version: 1
date: '2025-05-02'
author: SOCFortress LLC
status: production
type: TTP
description: >
  Detects odbcconf.exe executing with the /F or -F flag to load a response file
  (.rsp). Response files can contain REGSVR commands or other instructions to
  load malicious DLLs, allowing attackers to proxy code execution through a
  trusted Windows binary while hiding the actual payload in an external file.
  This is the response-file variant of the odbcconf LOLBAS abuse pattern.
  Associated with Living Off The Land tradecraft.
  MITRE ATT&CK: T1218.008 (System Binary Proxy Execution: Odbcconf).

data_source:
  - Sysmon EventID 1 (ProcessCreate)

search:
  query:
    bool:
      must:
        - term:
            agent_name: "AGENT_NAME"
        - term:
            agent_labels_customer: "CUSTOMER_CODE"
        - term:
            data_win_system_eventID: "1"
        - wildcard:
            data_win_eventdata_image: "*\\odbcconf.exe"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_commandLine: "*-f *"
              - wildcard:
                  data_win_eventdata_commandLine: "*/f *"
            minimum_should_match: 1
        - wildcard:
            data_win_eventdata_commandLine: "*.rsp*"
        - range:
            timestamp:
              gte: "START_TIME"
              lte: "END_TIME"

parameters:
  - name: AGENT_NAME
    default: "DESKTOP-AM0HLGE"
  - name: CUSTOMER_CODE
    default: "lab"
  - name: START_TIME
    default: "now-24h"
  - name: END_TIME
    default: "now"

how_to_implement: >
  Requires Sysmon EventID 1 (ProcessCreate) flowing to the Wazuh Indexer.
  Fields data_win_eventdata_image and data_win_eventdata_commandLine are
  confirmed working across all EventID 1 detections in this environment.
  Field-validated based on established EventID 1 detection patterns.

known_false_positives: >
  False positives may be present based on legitimate ODBC configuration
  using response files. Filter based on known approved software or paths
  as needed.

references:
  - https://strontic.github.io/xcyclopedia/library/odbcconf.exe-07FBA12552331355C103999806627314.html
  - https://twitter.com/redcanary/status/1541838407894171650
  - https://attack.mitre.org/techniques/T1218/008/

response:
  message: >
    odbcconf.exe loading response file (.rsp) detected on $agent_name$ by $data_win_eventdata_user$.
    Parent: $data_win_eventdata_parentImage$.
    Command: $data_win_eventdata_commandLine$.
    MITRE ATT&CK: T1218.008
  risk_score: 42
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 42
    - field: data_win_eventdata_user
      type: user
      score: 42
  threat_objects:
    - field: data_win_eventdata_parentImage
      type: parent_process_name
    - field: data_win_eventdata_image
      type: process_name

tags:
  analytic_story:
    - Living Off The Land
  asset_type: Endpoint
  mitre_attack_id:
    - T1218.008
  custom_tags:
    - odbcconf
    - response_file
    - rsp
    - lolbas
    - proxy_execution
    - defense_evasion
  product:
    - Wazuh
  security_domain: endpoint
name: Windows New Service Security Descriptor Set Via Sc.EXE
id: Windows-New-Service-Security-Descriptor-Set-Via-Sc.EXE
version: 4
schema_version: 1
date: '2025-05-02'
author: SOCFortress LLC
status: production
type: Anomaly
description: >
  Detects any modification to a service security descriptor via sc.exe sdset.
  This is a broader companion to the deny ACE detection — any use of sdset
  against a service is suspicious and warrants investigation. Attackers use
  this technique to blind security products, hide services, or escalate
  privileges by manipulating service access control. Associated with SDDL
  Tampering and Glupteba malware defense evasion tradecraft.
  MITRE ATT&CK: T1564 (Hide Artifacts).

data_source:
  - Sysmon EventID 1 (ProcessCreate)

search:
  query:
    bool:
      must:
        - term:
            agent_name: "AGENT_NAME"
        - term:
            agent_labels_customer: "CUSTOMER_CODE"
        - term:
            data_win_system_eventID: "1"
        - wildcard:
            data_win_eventdata_image: "*\\sc.exe"
        - wildcard:
            data_win_eventdata_commandLine: "*sdset *"
        - range:
            timestamp:
              gte: "START_TIME"
              lte: "END_TIME"

parameters:
  - name: AGENT_NAME
    default: "DESKTOP-AM0HLGE"
  - name: CUSTOMER_CODE
    default: "lab"
  - name: START_TIME
    default: "now-24h"
  - name: END_TIME
    default: "now"

how_to_implement: >
  Requires Sysmon EventID 1 (ProcessCreate) flowing to the Wazuh Indexer.
  Fields data_win_eventdata_image and data_win_eventdata_commandLine are
  confirmed working across all EventID 1 detections in this environment.
  Field-validated based on established EventID 1 detection patterns.
  This is a broader detection than #164 — it fires on any sdset usage
  regardless of ACE type. Use alongside the deny ACE detection for
  layered coverage.

known_false_positives: >
  None identified. Any modification to service security descriptors via
  sc.exe sdset should be investigated, especially against security-related
  services.

references:
  - https://www.sans.org/blog/red-team-tactics-hiding-windows-services/
  - https://news.sophos.com/wp-content/uploads/2020/06/glupteba_final-1.pdf
  - https://attack.mitre.org/techniques/T1564/

response:
  message: >
    Service security descriptor modified via sc.exe sdset on $agent_name$ by $data_win_eventdata_user$.
    Parent: $data_win_eventdata_parentImage$.
    Command: $data_win_eventdata_commandLine$.
    MITRE ATT&CK: T1564
  risk_score: 36
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 36
    - field: data_win_eventdata_user
      type: user
      score: 36
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name
    - field: data_win_eventdata_parentImage
      type: parent_process_name

tags:
  analytic_story:
    - Defense Evasion or Unauthorized Access Via SDDL Tampering
  asset_type: Endpoint
  mitre_attack_id:
    - T1564
  custom_tags:
    - sc_exe
    - sdset
    - sddl
    - service_tampering
    - defense_evasion
  product:
    - Wazuh
  security_domain: endpoint
name: Windows Chrome Enable Extension Loading via Command-Line
id: da355155-1d23-48f9-bf95-e534ae273ab0
version: 1
schema_version: 1
date: '2026-01-12'
author: SOCFortress LLC
status: production
type: Anomaly
description: >
  Detects Google Chrome launched with --disable-features=DisableLoadExtensionCommandLineSwitch,
  which bypasses enterprise policies that block loading extensions via the command line.
  Attackers and malware abuse this flag combined with --load-extension to silently
  inject malicious browser extensions for credential theft, session hijacking, or
  persistent browser manipulation. Associated with browser hijacking campaigns.
  MITRE ATT&CK: T1185 (Browser Session Hijacking).

data_source:
  - Sysmon EventID 1 (ProcessCreate)

search:
  query:
    bool:
      must:
        - term:
            agent_name: "AGENT_NAME"
        - term:
            agent_labels_customer: "CUSTOMER_CODE"
        - term:
            data_win_system_eventID: "1"
        - wildcard:
            data_win_eventdata_image: "*\\chrome.exe"
        - wildcard:
            data_win_eventdata_commandLine: "*--disable-features*"
        - wildcard:
            data_win_eventdata_commandLine: "*DisableLoadExtensionCommandLineSwitch*"
        - range:
            timestamp:
              gte: "START_TIME"
              lte: "END_TIME"

parameters:
  - name: AGENT_NAME
    default: "DESKTOP-AM0HLGE"
  - name: CUSTOMER_CODE
    default: "lab"
  - name: START_TIME
    default: "now-24h"
  - name: END_TIME
    default: "now"

how_to_implement: >
  Requires Sysmon EventID 1 (ProcessCreate) flowing to the Wazuh Indexer.
  Validated on DESKTOP-AM0HLGE with Chrome launched via PowerShell using
  --disable-features=DisableLoadExtensionCommandLineSwitch --load-extension.
  Confirmed field names: data_win_eventdata_image, data_win_eventdata_commandLine,
  data_win_eventdata_parentImage, data_win_eventdata_user.
  Note: use & operator in PowerShell to pass flags directly to Chrome binary.

known_false_positives: >
  Developers and IT admins may legitimately use this flag to load unpacked
  extensions during testing or deployment. Filter on data_win_eventdata_user
  for known developer accounts or data_win_eventdata_parentImage for known
  automation tooling. In production endpoints, any use of this flag should
  be investigated.

references:
  - https://www.gdatasoftware.com/blog/2025/11/38298-learning-about-browser-hijacking
  - https://attack.mitre.org/techniques/T1185/

response:
  message: >
    Chrome launched with extension loading bypass flag on $agent_name$.
    Command line: $data_win_eventdata_commandLine$.
    Parent process: $data_win_eventdata_parentImage$.
    User: $data_win_eventdata_user$.
    Possible malicious browser extension injection bypassing enterprise policy.
    MITRE ATT&CK: T1185
  risk_score: 30
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 30
    - field: data_win_eventdata_user
      type: user
      score: 30
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name
    - field: data_win_eventdata_parentImage
      type: parent_process_name

tags:
  analytic_story:
    - Browser Hijacking
  asset_type: Endpoint
  mitre_attack_id:
    - T1185
  custom_tags:
    - chrome
    - browser_hijacking
    - extension_loading
    - disable_features
    - credential_theft
  product:
    - Wazuh
  security_domain: endpoint
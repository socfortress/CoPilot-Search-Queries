name: Windows WaveBrowser PUP Detection
id: Windows_WaveBrowser_PUP_Detection
version: 1
schema_version: "1.0"
date: "2026-03-17"
author: SOCFortress LLC
status: production
type: TTP
description: >
  Detects execution or network activity associated with WaveBrowser, a potentially
  unwanted program (PUP) known for aggressive browser hijacking, data collection,
  and adware behavior. Detection covers both process creation (EventID 1) and
  network connections (EventID 3) by matching process image name, OriginalFileName,
  or Product metadata.
  FIELD-VALIDATED — EventID 1 and EventID 3 field mappings confirmed across
  multiple sessions. wavebrowser.exe added to Sysmon network include rules.
  MITRE ATT&CK: T1176 (Browser Extensions), T1518 (Software Discovery).

data_source:
  - Sysmon EventID 1 (ProcessCreate)
  - Sysmon EventID 3 (NetworkConnect)

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - bool:
            should:
              - term:
                  data_win_system_eventID: "1"
              - term:
                  data_win_system_eventID: "3"
            minimum_should_match: 1
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_image: "*\\wavebrowser.exe"
              - term:
                  data_win_eventdata_originalFileName: "wavebrowser.exe"
              - term:
                  data_win_eventdata_product: "WaveBrowser"
              - wildcard:
                  data_win_eventdata_initiatingProcessImageFileName: "*\\wavebrowser.exe"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_image
    - data_win_eventdata_originalFileName
    - data_win_eventdata_product
    - data_win_eventdata_commandLine
    - data_win_eventdata_parentImage
    - data_win_eventdata_destinationIp
    - data_win_eventdata_destinationPort
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-17 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-17 23:59:59.999"

how_to_implement: >
  Requires Wazuh agents with Sysmon installed and configured to log EventID 1
  (ProcessCreate) and EventID 3 (NetworkConnect). EventID 3 requires wavebrowser.exe
  to be included in the Sysmon network monitoring include rules. Both EventID 1
  and EventID 3 field mappings confirmed working in this environment across
  multiple detection engineering sessions.

known_false_positives: >
  No known false positives. WaveBrowser is consistently classified as a PUP
  and its presence on enterprise endpoints should always be investigated.

references:
  - https://attack.mitre.org/techniques/T1176/
  - https://www.malwarebytes.com/blog/detections/pup-optional-wavebrowser

response:
  message: >
    WaveBrowser PUP detected on $agent_name$ by $data_win_eventdata_user$.
    Process: $data_win_eventdata_image$.
    Command: $data_win_eventdata_commandLine$.
    MITRE ATT&CK: T1176
  risk_score: 50
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 50
    - field: data_win_eventdata_user
      type: user
      score: 50
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name
    - field: data_win_eventdata_destinationIp
      type: ip_address

tags:
  analytic_story:
    - Potentially Unwanted Programs
    - Browser Hijacking
  asset_type: Endpoint
  mitre_attack_id:
    - T1176
    - T1518
  custom_tags:
    - wavebrowser
    - pup
    - adware
    - browser_hijacking
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: (data_win_system_eventID:"1" OR data_win_system_eventID:"3") AND (data_win_eventdata_image:/.*\\wavebrowser\.exe/ OR data_win_eventdata_originalFileName:"wavebrowser.exe" OR data_win_eventdata_product:"WaveBrowser")

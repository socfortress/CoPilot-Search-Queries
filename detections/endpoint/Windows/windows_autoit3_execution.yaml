name: Windows AutoIt3 Execution
id: windows-autoit3-execution-001
version: 1
schema_version: "1.0"
date: "2026-03-03"
author: SOCFortress LLC
status: production
type: TTP

description: >
  Detects execution of AutoIt3 scripting engine. AutoIt is frequently 
  abused by malware including DarkGate, Handala Wiper, and crypto stealers 
  to automate malicious actions, execute payloads, and evade detection 
  by wrapping malware in compiled AutoIt scripts.

data_source:
  - Sysmon EventID 1

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "1"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_image: "*\\autoit*.exe"
              - wildcard:
                  data_win_eventdata_originalFileName: "autoit*.exe"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_eventdata_commandLine
    - data_win_eventdata_image
    - data_win_eventdata_originalFileName
    - data_win_eventdata_parentImage
    - data_win_eventdata_user
    - data_win_eventdata_hashes

parameters:
  AGENT_NAME:
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    type: string
    required: true
    example: "lab"
  START_TIME:
    type: datetime
    default: "now-24h"
  END_TIME:
    type: datetime
    default: "now"

how_to_implement: >
  Requires Sysmon EventID 1 with process name and original filename logging.

known_false_positives: >
  Legitimate use of AutoIt for automation tasks. Filter by user or 
  endpoint context.

references:
  - https://github.com/PaloAltoNetworks/Unit42-timely-threat-intel/blob/main/2023-10-25-IOCs-from-DarkGate-activity.txt
  - https://attack.mitre.org/techniques/T1059/

response:
  message: >
    AutoIt3 execution on $agent_name$. 
    Process: $data_win_eventdata_image$. 
    Command: $data_win_eventdata_commandLine$. 
    Parent: $data_win_eventdata_parentImage$. 
    User: $data_win_eventdata_user$. MITRE ATT&CK: T1059
  risk_score: 50
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 50
  threat_objects: []

tags:
  analytic_story:
    - DarkGate Malware
    - Handala Wiper
    - Crypto Stealer
    - Compromised Windows Host
  asset_type: Endpoint
  mitre_attack_id:
    - T1059
  custom_tags:
    - autoit
    - script_execution
    - malware_delivery
  product:
    - Wazuh
  security_domain: endpoint
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-21 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-21 23:59:59.999"

how_to_implement: >
  REQUIREMENTS:
  (1) Sysmon EventID 1 (Process Creation) logs must be forwarded from Windows
  endpoints to Wazuh Indexer. Ensure Sysmon is deployed with a configuration that
  captures Image, OriginalFileName, Product, Company, Description, and CommandLine
  fields (SwiftOnSecurity or Olaf Hartong Sysmon modular config recommended).
  The detection matches on data_win_eventdata_product populated from the binary's
  PE version information.
  (2) IMPORTANT - OpenSearch regex length limit: The Graylog-equivalent query in
  this detection is ~2,500 characters due to the 194-entry alternation regex.
  OpenSearch's default index.max_regex_length is 1000, which will cause the
  Graylog query to fail with "The length of regex [N] used in the [query_string]
  has exceeded the allowed maximum of [1000]". To resolve this, raise the limit
  on both existing indices AND the index template so new daily indices inherit
  the setting. Run the following against your Wazuh Indexer (replace host,
  credentials, and index pattern as needed):
  
  STEP A - Raise limit on existing indices:
  curl -k -u admin:PASSWORD -X PUT
  "https://INDEXER:9200/wazuh-CUSTOMER_*/_settings"
  -H 'Content-Type: application/json'
  -d '{"index.max_regex_length": 10000}'
  
  STEP B - Check which index template matches your pattern:
  curl -k -u admin:PASSWORD -X GET
  "https://INDEXER:9200/_template"
  -H 'Content-Type: application/json' | jq 'to_entries[] |
  select(.value.index_patterns[]? | test("wazuh-CUSTOMER")) |
  {name: .key, patterns: .value.index_patterns}'
  
  STEP C - Update the matching template to include max_regex_length (preserve
  any existing analyzer or mapping settings from the current template):
  curl -k -u admin:PASSWORD -X PUT
  "https://INDEXER:9200/_template/TEMPLATE_NAME"
  -H 'Content-Type: application/json'
  -d '{"index_patterns": ["wazuh-CUSTOMER_*"],
  "settings": {"index": {"max_regex_length": 10000,
  "analysis": {"analyzer": {"analyzer_keyword":
  {"filter": "lowercase", "tokenizer": "keyword"}}}}}}'
  
  STEP D - Verify:
  curl -k -u admin:PASSWORD -X GET
  "https://INDEXER:9200/_template/TEMPLATE_NAME"
  -H 'Content-Type: application/json' | jq '.[].settings'
  
  After the setting is raised, the Graylog query below will execute successfully.
  The Elasticsearch DSL query in this YAML uses wildcard clauses (not regex) and
  is NOT affected by max_regex_length.

known_false_positives: >
  Legitimate use of approved RMM or remote access tools by IT staff, MSPs,
  backup/restore operations, software deployment, and end-user collaboration is
  the primary source of false positives. The lookup list intentionally includes
  broad substrings (e.g., "Level", "Yandex", "Tencent", "QQ", "RMM", "Quick
  Assist", "PsExec", "Sysinternals PsExec") which will match both malicious and
  benign use. To tune, maintain a per-customer exception list of approved
  (host, product) or (user, product) pairs and suppress those combinations in
  post-processing. Common legitimate deployments to allow-list include:
  corporate-sanctioned RMM (e.g., ConnectWise/Kaseya/NinjaRMM if used internally),
  IT helpdesk tools (Quick Assist, Chrome Remote Desktop), and Microsoft SCCM
  Remote Control in managed environments.


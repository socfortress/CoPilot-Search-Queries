  - https://github.com/jischell-msft/RemoteManagementMonitoringTools
  - https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-025a

response:
  message: >
    Known remote access / RMM software ($data_win_eventdata_product$, company
    $data_win_eventdata_company$) was executed on endpoint $agent_name$ by
    user $data_win_eventdata_user$. Process: $data_win_eventdata_image$.
    Command line: $data_win_eventdata_commandLine$. Review whether this
    matches approved IT tooling or indicates unauthorized remote access.
  risk_score: 40
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 20
    - field: data_win_eventdata_user
      type: user
      score: 20
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name
    - field: data_win_eventdata_product
      type: signature
    - field: data_win_eventdata_company
      type: signature


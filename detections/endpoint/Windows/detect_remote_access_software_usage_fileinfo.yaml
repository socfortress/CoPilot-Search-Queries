name: Detect Remote Access Software Usage FileInfo
id: ccad96d7-a48c-4f13-8b9c-9f6a31cba454
version: 1
schema_version: "1.0"
date: "2026-04-21"
author: SOCFortress LLC
status: production
type: Anomaly

description: >
  This analytic detects the execution of processes whose PE file metadata (Product
  field) matches known remote access software, remote monitoring and management
  (RMM) tools, or file sync utilities commonly abused by adversaries. Sysmon
  EventID 1 is used to match the Product attribute extracted from the binary's
  version information against a curated list of 194 remote access software
  signatures including AnyDesk, TeamViewer, LogMeIn, GoToAssist, ScreenConnect,
  ConnectWise, Splashtop, Zoho Assist, PsExec, Tailscale, Chrome Remote Desktop,
  and many others. Adversaries (including ransomware operators such as Black
  Basta, Scattered Spider, Interlock, and Cactus; APT groups such as Seashell
  Blizzard; and commodity malware campaigns) frequently deploy these tools to
  establish unauthorized remote access, maintain persistence, and exfiltrate data.
  If confirmed malicious, this activity could allow attackers to persist in the
  environment, deliver additional payloads, or complete data exfiltration.

data_source:
  - Sysmon EventID 1

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "1"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_product: "*AOMEI*"
              - wildcard:
                  data_win_eventdata_product: "*Absolute Persistence*"

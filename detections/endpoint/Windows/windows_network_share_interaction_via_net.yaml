name: Windows Network Share Interaction Via Net
id: Windows-Network-Share-Interaction-Via-Net
version: 3
schema_version: 1
date: '2025-05-02'
author: SOCFortress LLC
status: production
type: Anomaly
description: >
  Detects network share discovery and collection activities using net.exe with
  "use" or "view" arguments. Attackers use these commands to identify accessible
  shared resources within a network as a precursor to privilege escalation or
  data exfiltration. Associated with Active Directory Discovery, Active Directory
  Privilege Escalation, and Network Discovery tradecraft.
  MITRE ATT&CK: T1135 (Network Share Discovery), T1039 (Data from Network Shared Drive).

data_source:
  - Sysmon EventID 1 (ProcessCreate)

search:
  query:
    bool:
      must:
        - term:
            agent_name: "AGENT_NAME"
        - term:
            agent_labels_customer: "CUSTOMER_CODE"
        - term:
            data_win_system_eventID: "1"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_image: "*\\net.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\net1.exe"
            minimum_should_match: 1
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_commandLine: "*use *"
              - wildcard:
                  data_win_eventdata_commandLine: "*view*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "START_TIME"
              lte: "END_TIME"

parameters:
  - name: AGENT_NAME
    default: "DESKTOP-AM0HLGE"
  - name: CUSTOMER_CODE
    default: "lab"
  - name: START_TIME
    default: "now-24h"
  - name: END_TIME
    default: "now"

how_to_implement: >
  Requires Sysmon EventID 1 (ProcessCreate) flowing to the Wazuh Indexer.
  Fields data_win_eventdata_image and data_win_eventdata_commandLine are
  confirmed working across all EventID 1 detections in this environment.
  Field-validated based on established EventID 1 detection patterns.

known_false_positives: >
  Administrators or power users may use net use or net view for legitimate
  network share management. Filter by parent process or user context as needed.

references:
  - https://attack.mitre.org/techniques/T1135/
  - https://attack.mitre.org/techniques/T1039/

response:
  message: >
    Network share interaction via net.exe detected on $agent_name$ by $data_win_eventdata_user$.
    Parent: $data_win_eventdata_parentImage$.
    Command: $data_win_eventdata_commandLine$.
    MITRE ATT&CK: T1135, T1039
  risk_score: 20
  severity: low
  risk_objects:
    - field: agent_name
      type: system
      score: 20
    - field: data_win_eventdata_user
      type: user
      score: 20
  threat_objects:
    - field: data_win_eventdata_parentImage
      type: parent_process_name
    - field: data_win_eventdata_image
      type: process_name

tags:
  analytic_story:
    - Active Directory Discovery
    - Active Directory Privilege Escalation
    - Network Discovery
  asset_type: Endpoint
  mitre_attack_id:
    - T1135
    - T1039
  custom_tags:
    - net_use
    - net_view
    - network_share
    - reconnaissance
    - living_off_the_land
  product:
    - Wazuh
  security_domain: endpoint
name: Impacket Lateral Movement Commandline Parameters
id: 8ce07472-496f-11ec-ab3b-3e22fbd008af
version: 1
schema_version: "1.0"
date: "2026-04-28"
author: SOCFortress LLC
status: production
type: TTP

description: >
  This analytic identifies the canonical command-line signature
  produced by Impacket lateral-movement tools (wmiexec.py, smbexec.py,
  dcomexec.py, atexec.py). Sysmon EventID 1 is used to match process
  creation events where the image or OriginalFileName is cmd.exe AND
  the command line contains all of the following: /Q /c (quiet
  run-and-terminate flags), the loopback address 127.0.0.1, an admin
  share marker ($), and stderr-to-stdout redirection (2>&1, which
  appears XML-escaped as 2&gt;&amp;1 in stored Sysmon events). Impacket
  is a well-known offensive Python toolkit used by adversaries and Red
  Teams to move laterally within Windows networks via SMB, WMI, DCOM,
  and Task Scheduler interfaces. When these tools execute commands on
  a target, they spawn cmd.exe with a distinctive command line that
  redirects output to a UNC path on an administrative share so the
  attacker can retrieve results - this produces the signature pattern
  cmd.exe /Q /c <command> 1> \\<host>\<share>$\__<timestamp> 2>&1.
  Note that the original Splunk rule specifically targets the
  loopback (127.0.0.1) variant of this pattern; real lateral movement
  attacks against remote hosts will use the target IP/hostname rather
  than 127.0.0.1, so this detection should be paired with a broader
  variant for full coverage. This is a known T1021.002 (SMB/Admin
  Shares), T1021.003 (DCOM), T1047 (WMI), and T1543.003 (Service
  Creation) technique observed in named threat activity including
  WhisperGate, Industroyer2, Prestige Ransomware, Volt Typhoon,
  Storm-0501 Ransomware, and Gozi Malware. If confirmed malicious,
  this could allow attackers to execute commands remotely, potentially
  leading to further compromise, credential theft, persistence, and
  data exfiltration.

data_source:
  - Sysmon EventID 1

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "1"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_image: "*cmd.exe"
              - term:
                  data_win_eventdata_originalFileName: "Cmd.Exe"
            minimum_should_match: 1
        - wildcard:
            data_win_eventdata_commandLine:
              value: "*/Q /c*"
              case_insensitive: true
        - wildcard:
            data_win_eventdata_commandLine: "*127.0.0.1*"
        - wildcard:
            data_win_eventdata_commandLine: "*$*"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_commandLine: "*2>&1*"
              - wildcard:
                  data_win_eventdata_commandLine: "*2&gt;&amp;1*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_eventdata_image
    - data_win_eventdata_originalFileName
    - data_win_eventdata_commandLine
    - data_win_eventdata_parentImage
    - data_win_eventdata_parentCommandLine
    - data_win_eventdata_user
    - data_win_eventdata_processId
    - data_win_eventdata_processGuid
    - data_win_eventdata_parentProcessId
    - data_win_eventdata_parentProcessGuid
    - data_win_eventdata_hashes
    - data_win_eventdata_integrityLevel
    - data_win_eventdata_currentDirectory

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-28 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-28 23:59:59.999"

how_to_implement: >
  This detection requires Sysmon EventID 1 (Process Creation) logs to be forwarded
  from Windows endpoints to Wazuh Indexer. Ensure Sysmon is deployed with a
  configuration that captures Image, OriginalFileName, and CommandLine fields
  (SwiftOnSecurity or Olaf Hartong Sysmon modular config recommended). The
  detection matches cmd.exe with the canonical Impacket loopback signature.
  IMPORTANT: This detection uses 127.0.0.1 as a literal indicator because that
  is the address used in Splunk's published Impacket rule and matches the
  smbexec/wmiexec local-execution variant. Real lateral movement attacks
  against remote hosts will use the target IP/hostname instead of 127.0.0.1
  in the UNC path - to detect those, deploy a complementary variant that
  matches the same /Q /c + UNC + $ + 2>&1 pattern with any IP/hostname,
  not just loopback. The 2>&1 redirection is stored XML-escaped as
  2&gt;&amp;1 in Sysmon events; the detection matches both forms. The
  Graylog regex form requires &gt; and &amp; to be escaped as \&gt; and
  \&amp; (Lucene treats & as the regex AND-intersection operator).

known_false_positives: >
  Although uncommon, system administrators may leverage Impacket tools
  for legitimate system administration or automation use cases. Some
  software installers and updaters (notably Google Updater, Microsoft
  Office click-to-run) may produce cmd.exe /Q /c command lines that
  superficially resemble Impacket but lack the UNC path with admin
  share marker. Filter as needed by allow-listing approved parent
  processes (deployment frameworks, known software installers) or
  specific target paths.

references:
  - https://attack.mitre.org/techniques/T1021/002/
  - https://attack.mitre.org/techniques/T1021/003/
  - https://attack.mitre.org/techniques/T1047/
  - https://attack.mitre.org/techniques/T1543/003/
  - https://github.com/SecureAuthCorp/impacket
  - https://www.microsoft.com/en-us/security/blog/2023/05/24/volt-typhoon-targets-us-critical-infrastructure-with-living-off-the-land-techniques/
  - https://www.microsoft.com/security/blog/2022/01/15/destructive-malware-targeting-ukrainian-organizations/

response:
  message: >
    Suspicious cmd.exe command line consistent with Impacket lateral
    movement tooling was detected on endpoint $agent_name$ by user
    $data_win_eventdata_user$. Process image: $data_win_eventdata_image$.
    Parent process: $data_win_eventdata_parentImage$. Command line:
    $data_win_eventdata_commandLine$. The /Q /c flags combined with
    UNC output redirection to an admin share and 2>&1 stderr capture
    is the canonical signature for Impacket's wmiexec, smbexec,
    dcomexec, and atexec modules; investigate immediately, review
    parent process lineage, identify the source of execution (local
    vs. remote SMB/WMI/DCOM call), and look for credential-theft or
    follow-on lateral movement activity.
  risk_score: 80
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 70
    - field: data_win_eventdata_user
      type: user
      score: 70
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name
    - field: data_win_eventdata_parentImage
      type: parent_process_name
    - field: data_win_eventdata_commandLine
      type: command_line

tags:
  analytic_story:
    - WhisperGate
    - Gozi Malware
    - Active Directory Lateral Movement
    - Volt Typhoon
    - Prestige Ransomware
    - Industroyer2
    - Data Destruction
    - Graceful Wipe Out Attack
    - Compromised Windows Host
    - CISA AA22-277A
    - Storm-0501 Ransomware
    - Impacket Lateral Movement
  asset_type: Endpoint
  mitre_attack_id:
    - T1021.002
    - T1021.003
    - T1047
    - T1543.003
  custom_tags:
    - impacket
    - wmiexec
    - smbexec
    - dcomexec
    - atexec
    - lateral_movement
    - admin_share_abuse
    - unc_redirection
    - cmd_exe
    - apt_lateral_movement
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"1" AND (data_win_eventdata_image:/.*[Cc][Mm][Dd]\.exe.*/ OR data_win_eventdata_originalFileName:"Cmd.Exe") AND data_win_eventdata_commandLine:/.*\/[Qq] \/[Cc] .*/ AND data_win_eventdata_commandLine:/.*\$.*/ AND data_win_eventdata_commandLine:/.*2\&gt;\&amp;1.*/
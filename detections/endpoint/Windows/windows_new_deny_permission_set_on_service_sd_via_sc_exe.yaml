name: Windows New Deny Permission Set On Service SD Via Sc.EXE
id: Windows-New-Deny-Permission-Set-On-Service-SD-Via-Sc.EXE
version: 4
schema_version: 1
date: '2025-05-02'
author: SOCFortress LLC
status: production
type: Anomaly
description: >
  Detects changes to a service security descriptor where a deny ACE is added
  via sc.exe sdset. Attackers use this technique to blind security products by
  denying access to services for well-known principals (SYSTEM, Administrators,
  Everyone, etc.), preventing security tools from querying, stopping, or
  interacting with the targeted service. Associated with SDDL Tampering and
  Glupteba malware defense evasion tradecraft.
  MITRE ATT&CK: T1564 (Hide Artifacts).

data_source:
  - Sysmon EventID 1 (ProcessCreate)

search:
  query:
    bool:
      must:
        - term:
            agent_name: "AGENT_NAME"
        - term:
            agent_labels_customer: "CUSTOMER_CODE"
        - term:
            data_win_system_eventID: "1"
        - wildcard:
            data_win_eventdata_image: "*\\sc.exe"
        - wildcard:
            data_win_eventdata_commandLine: "*sdset *"
        - wildcard:
            data_win_eventdata_commandLine: "*(D;*"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_commandLine: "*;IU*"
              - wildcard:
                  data_win_eventdata_commandLine: "*;S-1-5-4*"
              - wildcard:
                  data_win_eventdata_commandLine: "*;SU*"
              - wildcard:
                  data_win_eventdata_commandLine: "*;S-1-5-6*"
              - wildcard:
                  data_win_eventdata_commandLine: "*;BA*"
              - wildcard:
                  data_win_eventdata_commandLine: "*;S-1-5-32-544*"
              - wildcard:
                  data_win_eventdata_commandLine: "*;SY*"
              - wildcard:
                  data_win_eventdata_commandLine: "*;S-1-5-18*"
              - wildcard:
                  data_win_eventdata_commandLine: "*;WD*"
              - wildcard:
                  data_win_eventdata_commandLine: "*;S-1-1-0*"
              - wildcard:
                  data_win_eventdata_commandLine: "*;AU*"
              - wildcard:
                  data_win_eventdata_commandLine: "*;S-1-5-11*"
              - wildcard:
                  data_win_eventdata_commandLine: "*;LS*"
              - wildcard:
                  data_win_eventdata_commandLine: "*;S-1-5-19*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "START_TIME"
              lte: "END_TIME"

parameters:
  - name: AGENT_NAME
    default: "DESKTOP-AM0HLGE"
  - name: CUSTOMER_CODE
    default: "lab"
  - name: START_TIME
    default: "now-24h"
  - name: END_TIME
    default: "now"

how_to_implement: >
  Requires Sysmon EventID 1 (ProcessCreate) flowing to the Wazuh Indexer.
  Fields data_win_eventdata_image and data_win_eventdata_commandLine are
  confirmed working across all EventID 1 detections in this environment.
  Field-validated based on established EventID 1 detection patterns.

known_false_positives: >
  None identified. Attempts to add deny ACEs to services, especially
  security-related services, should be immediately investigated.

references:
  - https://www.sans.org/blog/red-team-tactics-hiding-windows-services/
  - https://news.sophos.com/wp-content/uploads/2020/06/glupteba_final-1.pdf
  - https://attack.mitre.org/techniques/T1564/

response:
  message: >
    Service security descriptor deny ACE set via sc.exe on $agent_name$ by $data_win_eventdata_user$.
    Parent: $data_win_eventdata_parentImage$.
    Command: $data_win_eventdata_commandLine$.
    MITRE ATT&CK: T1564
  risk_score: 30
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 30
    - field: data_win_eventdata_user
      type: user
      score: 30
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name
    - field: data_win_eventdata_parentImage
      type: parent_process_name

tags:
  analytic_story:
    - Defense Evasion or Unauthorized Access Via SDDL Tampering
  asset_type: Endpoint
  mitre_attack_id:
    - T1564
  custom_tags:
    - sc_exe
    - sdset
    - sddl
    - deny_ace
    - service_tampering
    - defense_evasion
  product:
    - Wazuh
  security_domain: endpoint
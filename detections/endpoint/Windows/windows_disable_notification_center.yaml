name: Windows Disable Notification Center
id: 1cd983c8-8fd6-11ec-a09d-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-07"
author: SOCFortress LLC
status: production
type: Anomaly

description: >
  The following analytic detects the modification of the Windows registry to disable the Notification
  Center on a host machine. It leverages Sysmon EventID 13 to identify changes to the
  "DisableNotificationCenter" registry value set to "0x00000001". This activity is significant because
  disabling the Notification Center can be a tactic used by RAT malware to hide its presence and
  subsequent actions. If confirmed malicious, this could allow an attacker to operate stealthily,
  potentially leading to further system compromise and data exfiltration.

data_source:
  - Sysmon EventID 13

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "13"
        - wildcard:
            data_win_eventdata_targetObject: "*DisableNotificationCenter"
        - term:
            data_win_eventdata_details: "DWORD (0x00000001)"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - data_win_eventdata_targetObject
    - data_win_eventdata_details
    - data_win_eventdata_image
    - data_win_eventdata_user
    - data_win_system_computer

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "YYYY-MM-DD 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "YYYY-MM-DD 23:59:59.999"

how_to_implement: >
  To successfully implement this search, you need to be ingesting logs with the registry value name,
  registry path, and registry value data from your endpoints. Sysmon EventID 13 captures registry
  modifications (SetValue operations). Ensure that Sysmon is configured to log registry operations
  and that these logs are properly ingested into Elasticsearch with complete registry path and value
  information. The detection specifically looks for modifications to the DisableNotificationCenter
  registry value being set to 0x00000001 (enabled/true), which disables Windows notifications and
  notification center functionality.

known_false_positives: >
  Admin or user may choose to disable this Windows feature for personal preference or organizational
  policy. Organizations should establish baseline behavior for administrative registry modifications
  and create whitelist exceptions for approved management tools and administrative accounts that
  legitimately manage notification settings.

references:
  - https://tccontre.blogspot.com/2020/01/remcos-rat-evading-windows-defender-av.html

response:
  message: >
    Registry modification detected on $data_win_system_computer$. Process $data_win_eventdata_image$
    by user $data_win_eventdata_user$ modified DisableNotificationCenter registry key to value
    $data_win_eventdata_details$. This may indicate RAT malware or malicious activity attempting to
    hide its presence by disabling notifications.
  risk_score: 40
  severity: medium
  risk_objects:
    - field: data_win_system_computer
      type: system
      score: 40
    - field: data_win_eventdata_user
      type: user
      score: 40
  threat_objects:
    - field: data_win_eventdata_image
      type: process

tags:
  analytic_story:
    - Defense Evasion
    - Windows Registry Abuse
    - Remote Access Trojan
  asset_type: Endpoint
  mitre_attack_id:
    - T1112
  custom_tags:
    - registry_modification
    - rat_malware
    - defense_evasion
    - stealth
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"13" AND data_win_eventdata_targetObject:HKLM\\\\SOFTWARE\\\\Policies\\\\Microsoft\\\\Windows\\\\Explorer\\\\DisableNotificationCenter
name: Process Kill Base On File Path
id: 5ffaa42c-acdb-11eb-9ad3-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-28"
author: SOCFortress LLC
status: production
type: TTP

description: >
  This analytic detects the use of wmic.exe with the
  process / executablepath / delete keyword combination to
  forcibly terminate AND remove a running process by its
  on-disk file path. Sysmon EventID 1 is used to match
  process creation events where the Image path is anchored
  to \wmic.exe (or the OriginalFileName field equals
  wmic.exe, catching renamed binaries) AND the command
  line contains all three keywords: process, executablepath,
  and delete (the canonical syntax is
  `wmic process where "executablepath like '%target.exe%'"
  delete` or
  `wmic process where executablepath='C:\path\target.exe'
  delete`). Adversaries use this WMI-based process-kill
  primitive instead of taskkill.exe or Stop-Process because
  filtering by ExecutablePath rather than process name or
  PID lets them target binaries by location pattern (any
  process running from a specific directory, any process
  whose full path matches a wildcard) - this is exactly
  what malware needs to kill EDR or AV agents whose process
  names may vary by installation, security tools running
  out of \Program Files\, competing miners or RATs
  installed in known-bad locations, or any process matching
  a path-based fingerprint. The executablepath filter is
  rare in legitimate administrative use (administrators
  typically use pid or name to identify a target), making
  the combination of wmic.exe with process + executablepath
  + delete keywords highly malicious-specific. This is a
  known T1562.001 (Impair Defenses: Disable or Modify
  Tools) technique observed in named threat activity
  including the XMRig cryptocurrency miner, the DFIR Report
  SQL Server miner intrusion, and broader pre-payload
  defense-tampering playbooks. If confirmed malicious, this
  could allow an attacker to disable EDR / AV / monitoring
  agents before deploying ransomware, stealer, or miner
  payloads, eliminate competing malware on already-infected
  hosts, persist while removing security tooling that would
  otherwise alert on post-compromise behavior, and operate
  with significantly reduced detection coverage -
  investigate the parent process, the user context (the
  operation requires admin privileges to terminate
  protected processes), the specific executablepath
  pattern targeted (which often reveals attacker intent:
  defender / EDR vendor names, miner names, competing-RAT
  names), and any concurrent or follow-on file-write,
  process-spawn, and network-egress activity that may be
  the next stage of the attack.

data_source:
  - Sysmon EventID 1

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "1"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_image:
                    value: "*\\\\wmic.exe"
                    case_insensitive: true
              - term:
                  data_win_eventdata_originalFileName: "wmic.exe"
            minimum_should_match: 1
        - wildcard:
            data_win_eventdata_commandLine:
              value: "*process*"
              case_insensitive: true
        - wildcard:
            data_win_eventdata_commandLine:
              value: "*executablepath*"
              case_insensitive: true
        - wildcard:
            data_win_eventdata_commandLine:
              value: "*delete*"
              case_insensitive: true
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_eventdata_image
    - data_win_eventdata_originalFileName
    - data_win_eventdata_commandLine
    - data_win_eventdata_parentImage
    - data_win_eventdata_parentCommandLine
    - data_win_eventdata_user
    - data_win_eventdata_processId
    - data_win_eventdata_processGuid
    - data_win_eventdata_parentProcessId
    - data_win_eventdata_parentProcessGuid
    - data_win_eventdata_hashes
    - data_win_eventdata_integrityLevel
    - data_win_eventdata_currentDirectory

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-28 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-28 23:59:59.999"

how_to_implement: >
  This detection requires Sysmon EventID 1 (Process Creation) logs to be
  forwarded from Windows endpoints to Wazuh Indexer. Ensure Sysmon is
  deployed with a configuration that captures Image, OriginalFileName,
  and CommandLine fields (SwiftOnSecurity or Olaf Hartong Sysmon modular
  config recommended). The detection matches both the native
  C:\Windows\System32\wbem\WMIC.exe and renamed wmic.exe binaries via
  Image path and OriginalFileName fallback. The command line is
  required to contain all three keywords - process, executablepath,
  and delete - case-insensitively, capturing both lowercase
  attacker-typed forms (process where executablepath='...' delete)
  and PascalCase canonical forms (process where
  ExecutablePath='...' DELETE). The keyword combination is highly
  malicious-specific because the executablepath filter is rare in
  legitimate administrative use - administrators typically identify
  processes by PID or name. Note: wmic.exe is officially deprecated
  by Microsoft and removed by default in newer Windows installations,
  but the binary is still present on Windows 10, Windows 11, and
  Windows Server through the optional WMIC feature - attackers
  routinely re-add it via DISM or carry their own copy. All matching
  is case-insensitive in both Elasticsearch (case_insensitive: true
  on the wildcards) and Graylog (Lucene character classes).

known_false_positives: >
  No false positives have been identified at this time. The keyword
  combination wmic.exe + process + executablepath + delete is highly
  specific to the malicious use case - legitimate administrative
  use of WMIC overwhelmingly uses pid- or name-based filters rather
  than executablepath. If false positives appear in your environment,
  allow-list specific approved configuration management agents,
  documented administrative service accounts, or scheduled-task
  contexts as needed.

references:
  - https://attack.mitre.org/techniques/T1562/001/
  - https://thedfirreport.com/2020/04/20/sqlserver-or-the-miner-in-the-basement/
  - https://learn.microsoft.com/en-us/windows/win32/wmisdk/wmic
  - https://learn.microsoft.com/en-us/windows/win32/cimwin32prov/win32-process

response:
  message: >
    WMIC process termination by ExecutablePath detected on endpoint
    $agent_name$ by user $data_win_eventdata_user$. Process image:
    $data_win_eventdata_image$. Parent process:
    $data_win_eventdata_parentImage$. Command line:
    $data_win_eventdata_commandLine$. The
    `wmic process where executablepath='...' delete` invocation is
    the canonical pre-payload defense-tampering step performed by
    XMRig miners, SQL-Server-targeting intrusion sets, ransomware
    operators, and stealer malware to terminate EDR / AV /
    monitoring agents (or competing malware on already-infected
    hosts) before deploying their own payload. Investigate
    immediately, identify the parent process lineage (suspicious
    parents include Office, browsers, document readers, scripting
    hosts, unsigned binaries), examine the specific executablepath
    pattern - it often reveals attacker intent (defender / EDR
    vendor names, miner names, competing-RAT names), confirm
    whether the targeted process is currently running or was
    successfully terminated, hunt for follow-on payload deployment
    (file writes, process spawns, network egress), and isolate the
    host pending further analysis.
  risk_score: 50
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 50
    - field: data_win_eventdata_user
      type: user
      score: 50
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name
    - field: data_win_eventdata_parentImage
      type: parent_process_name
    - field: data_win_eventdata_commandLine
      type: command_line

tags:
  analytic_story:
    - XMRig
    - Coin Miner
    - Ransomware
    - Defender Tampering
    - Pre-Encryption Activity
    - Compromised Windows Host
    - Suspicious WMI Use
  asset_type: Endpoint
  mitre_attack_id:
    - T1562.001
  custom_tags:
    - wmic
    - wmi_abuse
    - process_kill
    - executablepath_filter
    - defender_tampering
    - edr_kill
    - av_kill
    - xmrig
    - miner_precursor
    - ransomware_precursor
    - impair_defenses
    - lolbin
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"1" AND (data_win_eventdata_image:/.*\\\\[Ww][Mm][Ii][Cc]\.exe/ OR data_win_eventdata_originalFileName:/[Ww][Mm][Ii][Cc]\.exe/) AND data_win_eventdata_commandLine:/.*[Pp][Rr][Oo][Cc][Ee][Ss][Ss].*/ AND data_win_eventdata_commandLine:/.*[Ee][Xx][Ee][Cc][Uu][Tt][Aa][Bb][Ll][Ee][Pp][Aa][Tt][Hh].*/ AND data_win_eventdata_commandLine:/.*[Dd][Ee][Ll][Ee][Tt][Ee].*/
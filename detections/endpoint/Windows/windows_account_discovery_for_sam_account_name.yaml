name: Windows Account Discovery for Sam Account Name
id: Windows_Account_Discovery_For_Sam_Account_Name
version: 1
schema_version: "1.0"
date: "2026-03-27"
author: SOCFortress LLC
status: production
type: Anomaly
description: >
  Detects execution of the PowerView PowerShell cmdlet Get-NetUser specifically
  querying for samaccountname or pwdlastset attributes. This is a common
  reconnaissance technique used by attackers to enumerate Active Directory user
  accounts and password information, typically as a precursor to lateral movement
  or privilege escalation attacks.
data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Get-NetUser*"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*samaccountname*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*pwdlastset*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_path
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-27 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-27 23:59:59.999"

how_to_implement: >
  Requires PowerShell Script Block Logging enabled on endpoints.
  Enable via Group Policy: Computer Configuration → Administrative Templates
  → Windows Components → Windows PowerShell → Turn on PowerShell Script Block
  Logging. The Microsoft-Windows-PowerShell/Operational channel must be
  forwarded by the Wazuh agent. Confirmed flowing in this environment.
  VALIDATED — 3 hits confirmed for Get-NetUser with samaccountname/pwdlastset.

known_false_positives: >
  Administrators may use PowerView or similar tools for legitimate AD
  enumeration and auditing purposes. Review context and user account to
  determine if the activity is authorized.

references:
  - https://attack.mitre.org/techniques/T1087/
  - https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-347a

response:
  message: >
    PowerView Get-NetUser with samaccountname/pwdlastset enumeration detected
    on $agent_name$ by $data_win_eventdata_user$.
    Script: $data_win_eventdata_scriptBlockText$.
    MITRE ATT&CK: T1087
  risk_score: 15
  severity: low
  risk_objects:
    - field: agent_name
      type: system
      score: 15
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: script_block

tags:
  analytic_story:
    - CISA AA23-347A
    - Active Directory Discovery
  asset_type: Endpoint
  mitre_attack_id:
    - T1087
  custom_tags:
    - powerview
    - active_directory
    - account_discovery
    - samaccountname
    - reconnaissance
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Get-NetUser.*/ AND (data_win_eventdata_scriptBlockText:/.*samaccountname.*/ OR data_win_eventdata_scriptBlockText:/.*pwdlastset.*/)
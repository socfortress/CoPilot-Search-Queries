name: Windows DLL Search Order Hijacking with iscsicpl
id: f39ee679-3b1e-4f47-841c-5c3c580acda2
version: 9
schema_version: 1
date: '2025-05-02'
author: SOCFortress LLC
status: production
type: TTP
description: >
  Detects DLL search order hijacking via iscsicpl.exe by identifying Windows
  shell processes (cmd.exe, powershell.exe, etc.) spawned by iscsicpl.exe as
  parent. Attackers place a malicious DLL (iscsi.dll) in the same directory as
  iscsicpl.exe, which loads it and executes a shell payload. This technique
  also provides UAC bypass since iscsicpl.exe auto-elevates. Associated with
  Living Off The Land and Windows Defense Evasion tradecraft.
  MITRE ATT&CK: T1574.001 (DLL Search Order Hijacking).

data_source:
  - Sysmon EventID 1 (ProcessCreate)

search:
  query:
    bool:
      must:
        - term:
            agent_name: "AGENT_NAME"
        - term:
            agent_labels_customer: "CUSTOMER_CODE"
        - term:
            data_win_system_eventID: "1"
        - wildcard:
            data_win_eventdata_parentImage: "*\\iscsicpl.exe"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_image: "*\\cmd.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\powershell.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\pwsh.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\wscript.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\cscript.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\mshta.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\rundll32.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\regsvr32.exe"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "START_TIME"
              lte: "END_TIME"

parameters:
  - name: AGENT_NAME
    default: "DESKTOP-AM0HLGE"
  - name: CUSTOMER_CODE
    default: "lab"
  - name: START_TIME
    default: "now-24h"
  - name: END_TIME
    default: "now"

how_to_implement: >
  Requires Sysmon EventID 1 (ProcessCreate) flowing to the Wazuh Indexer.
  Field-validated — the actual exploit requires a crafted malicious DLL
  (iscsi.dll) placed alongside iscsicpl.exe which cannot be safely simulated.
  iscsicpl.exe launched without the malicious DLL does not spawn child processes.
  Field data_win_eventdata_parentImage is confirmed working across all EventID 1
  detections. Any shell process spawned by iscsicpl.exe is a high-confidence
  indicator of successful DLL hijacking.

known_false_positives: >
  Legitimate child processes from iscsicpl.exe are extremely rare. Any shell
  process (cmd.exe, powershell.exe) spawned by iscsicpl.exe should be treated
  as high priority with very low false positive rate.

references:
  - https://github.com/hackerhouse-opensource/iscsicpl_bypassUAC
  - https://github.com/422926799/csplugin/tree/master/bypassUAC
  - https://attack.mitre.org/techniques/T1574/001/

response:
  message: >
    iscsicpl.exe spawned a shell process on $agent_name$ — possible DLL
    search order hijacking and UAC bypass.
    Child process: $data_win_eventdata_image$.
    Command line: $data_win_eventdata_commandLine$.
    User: $data_win_eventdata_user$.
    MITRE ATT&CK: T1574.001
  risk_score: 64
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 64
    - field: data_win_eventdata_user
      type: user
      score: 64
  threat_objects:
    - field: data_win_eventdata_parentImage
      type: parent_process_name
    - field: data_win_eventdata_image
      type: process_name

tags:
  analytic_story:
    - Living Off The Land
    - Compromised Windows Host
    - Windows Defense Evasion Tactics
  asset_type: Endpoint
  mitre_attack_id:
    - T1574.001
  custom_tags:
    - iscsicpl
    - dll_hijacking
    - uac_bypass
    - lolbas
    - privilege_escalation
  product:
    - Wazuh
  security_domain: endpoint
name: Windows PowerShell Invoke-Sqlcmd Execution
id: 5eb76fe2-a869-4865-8c4c-8cff424b18a1
version: 1
schema_version: "1.0"
date: "2026-03-30"
author: SOCFortress LLC
status: production
type: Hunting
description: >
  Detects potentially suspicious usage of the Invoke-Sqlcmd PowerShell cmdlet
  combined with high-risk parameters or query patterns indicating unauthorized
  database access, data theft, or malicious database operations. Detection covers
  xp_cmdshell abuse, remote file input via URL, system principal enumeration,
  certificate validation bypass, dedicated administrator connections, and
  sp_configure abuse. Threat actors prefer PowerShell Invoke-Sqlcmd over sqlcmd.exe
  for its flexible programmatic interface and potential to evade detection.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Invoke-Sqlcmd*"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*xp_cmdshell*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*sys.server_principals*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*TrustServerCertificate*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*DedicatedAdministratorConnection*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*sp_configure*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*sp_oacreate*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*openrowset*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*sp_addsrvrolemember*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*inputfile*http*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_path
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-30 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-30 23:59:59.999"

how_to_implement: >
  Requires PowerShell Script Block Logging enabled on endpoints.
  Enable via Group Policy: Computer Configuration → Administrative Templates
  → Windows Components → Windows PowerShell → Turn on PowerShell Script Block
  Logging.

known_false_positives: >
  Database administrators and developers frequently use Invoke-Sqlcmd for
  legitimate database management tasks. Establish a whitelist of known
  administrator accounts and approved script paths. Baseline normal PowerShell
  database interaction patterns and tune thresholds accordingly.

references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1059/003/
  - https://learn.microsoft.com/en-us/powershell/module/sqlserver/invoke-sqlcmd

response:
  message: >
    Suspicious PowerShell Invoke-Sqlcmd execution detected on $agent_name$
    by $data_win_eventdata_user$.
    Script: $data_win_eventdata_scriptBlockText$.
    MITRE ATT&CK: T1059.001, T1059.003
  risk_score: 49
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 49
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: script_block

tags:
  analytic_story:
    - SQL Server Abuse
    - GhostRedirector IIS Module and Rungan Backdoor
  asset_type: Endpoint
  mitre_attack_id:
    - T1059.001
    - T1059.003
  custom_tags:
    - invoke_sqlcmd
    - sql_abuse
    - xp_cmdshell
    - database_attack
    - data_exfiltration
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Invoke-Sqlcmd.*/ AND (data_win_eventdata_scriptBlockText:/.*xp_cmdshell.*/ OR data_win_eventdata_scriptBlockText:/.*sys\.server_principals.*/ OR data_win_eventdata_scriptBlockText:/.*TrustServerCertificate.*/ OR data_win_eventdata_scriptBlockText:/.*DedicatedAdministratorConnection.*/ OR data_win_eventdata_scriptBlockText:/.*inputfile.*https?:\/\/.*/ OR data_win_eventdata_scriptBlockText:/.*sp_configure.*/)
name: Windows Disable Lock Workstation Feature Through Registry
id: c82adbc6-9f00-11ec-a81f-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-07"
author: SOCFortress LLC
status: production
type: Anomaly

description: >
  The following analytic detects a suspicious registry modification that disables the Lock Computer
  feature in Windows. It leverages Sysmon EventID 13, specifically monitoring changes to the registry
  path "*\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System\DisableLockWorkstation" with a
  value of "0x00000001". This activity is significant because it prevents users from locking their
  screens, a tactic often used by malware, including ransomware, to maintain control over compromised
  systems. If confirmed malicious, this could allow attackers to sustain their presence and execute
  further malicious actions without user interruption.

data_source:
  - Sysmon EventID 13

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "13"
        - wildcard:
            data_win_eventdata_targetObject: "*DisableLockWorkstation"
        - term:
            data_win_eventdata_details: "DWORD (0x00000001)"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - data_win_eventdata_targetObject
    - data_win_eventdata_details
    - data_win_eventdata_image
    - data_win_eventdata_user
    - data_win_system_computer

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "YYYY-MM-DD 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "YYYY-MM-DD 23:59:59.999"

how_to_implement: >
  To successfully implement this search, you need to be ingesting logs with the registry value name,
  registry path, and registry value data from your endpoints. Sysmon EventID 13 captures registry
  modifications (SetValue operations). Ensure that Sysmon is configured to log registry operations
  and that these logs are properly ingested into Elasticsearch with complete registry path and value
  information. The detection specifically looks for modifications to the DisableLockWorkstation registry
  value being set to 0x00000001 (enabled/true), which prevents users from locking their workstations.

known_false_positives: >
  No false positives have been identified at this time. However, administrators may legitimately modify
  this registry setting in controlled environments. Organizations should establish baseline behavior for
  administrative registry modifications and create whitelist exceptions for approved management tools
  and administrative accounts that legitimately manage this policy.

references:
  - https://www.bleepingcomputer.com/news/security/in-dev-ransomware-forces-you-do-to-survey-before-unlocking-computer/
  - https://heimdalsecurity.com/blog/fatalrat-targets-telegram/

response:
  message: >
    Registry modification detected on $data_win_system_computer$. Process $data_win_eventdata_image$
    by user $data_win_eventdata_user$ modified DisableLockWorkstation registry key to value
    $data_win_eventdata_details$. This may indicate ransomware or malicious activity attempting to
    prevent screen locking and maintain control.
  risk_score: 50
  severity: high
  risk_objects:
    - field: data_win_system_computer
      type: system
      score: 50
    - field: data_win_eventdata_user
      type: user
      score: 50
  threat_objects:
    - field: data_win_eventdata_image
      type: process

tags:
  analytic_story:
    - Ransomware
    - Defense Evasion
    - Windows Policy Abuse
  asset_type: Endpoint
  mitre_attack_id:
    - T1112
  custom_tags:
    - registry_modification
    - ransomware
    - defense_evasion
    - persistence
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"13" AND data_win_eventdata_targetObject:HKLM\\\\SOFTWARE\\\\Microsoft\\\\Windows\\\\CurrentVersion\\\\Policies\\\\System\\\\DisableLockWorkstation
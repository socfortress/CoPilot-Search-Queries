name: Nishang PowershellTCPOneLine
id: 1a382c6c-7c2e-11eb-ac69-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-28"
author: SOCFortress LLC
status: production
type: TTP

description: >
  This analytic detects the use of the Nishang
  Invoke-PowerShellTcpOneLine reverse-shell utility, which
  initiates a callback to a remote Command and Control (C2)
  server. Sysmon EventID 1 is used to match process creation
  events where the Image path ends with powershell.exe or pwsh.exe
  (or the OriginalFileName field equals PowerShell.EXE / pwsh.dll,
  catching renamed binaries) AND the command line contains BOTH
  Net.Sockets.TCPClient (the .NET class for raw TCP outbound
  connections) AND System.Text.ASCIIEncoding (the .NET class for
  byte/string conversion). These two .NET type references together
  are the canonical fingerprint of the Nishang
  Invoke-PowerShellTcpOneLine one-liner: it builds a TCPClient,
  connects to the attacker's listener, then uses ASCIIEncoding to
  marshal the input/output stream of an interactive shell over the
  socket. The reverse-shell pattern allows the attacker to bypass
  inbound firewall rules (the connection originates from inside)
  and to operate the compromised host as if seated at the console
  with full PowerShell capabilities. The two-marker combination
  has high specificity because legitimate PowerShell scripts that
  open raw TCP sockets and explicitly use ASCIIEncoding are rare -
  most network-aware PowerShell relies on Invoke-WebRequest or
  Invoke-RestMethod, not raw socket primitives. This is a known
  T1059.001 (Command and Scripting Interpreter: PowerShell)
  technique observed in named threat activity including the
  HAFNIUM Group Microsoft Exchange ProxyLogon exploitation
  campaign and the Cleo File Transfer Software intrusions. If
  confirmed malicious, this activity could allow attackers to
  achieve unauthorized remote interactive control over the
  compromised host, exfiltrate data through the same outbound
  channel, escalate privileges, deploy additional payloads, or
  pivot to lateral movement. Investigate the parent process
  lineage, the destination IP and port in the command line, the
  user context, and any concurrent network egress and
  follow-on process activity from the host.

data_source:
  - Sysmon EventID 1

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "1"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_image:
                    value: "*powershell.exe"
                    case_insensitive: true
              - wildcard:
                  data_win_eventdata_image: "*pwsh.exe"
              - term:
                  data_win_eventdata_originalFileName: "PowerShell.EXE"
              - term:
                  data_win_eventdata_originalFileName: "pwsh.dll"
            minimum_should_match: 1
        - wildcard:
            data_win_eventdata_commandLine:
              value: "*Net.Sockets.TCPClient*"
              case_insensitive: true
        - wildcard:
            data_win_eventdata_commandLine:
              value: "*System.Text.ASCIIEncoding*"
              case_insensitive: true
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_eventdata_image
    - data_win_eventdata_originalFileName
    - data_win_eventdata_commandLine
    - data_win_eventdata_parentImage
    - data_win_eventdata_parentCommandLine
    - data_win_eventdata_user
    - data_win_eventdata_processId
    - data_win_eventdata_processGuid
    - data_win_eventdata_parentProcessId
    - data_win_eventdata_parentProcessGuid
    - data_win_eventdata_hashes
    - data_win_eventdata_integrityLevel
    - data_win_eventdata_currentDirectory

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-28 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-28 23:59:59.999"

how_to_implement: >
  This detection requires Sysmon EventID 1 (Process Creation) logs to be
  forwarded from Windows endpoints to Wazuh Indexer. Ensure Sysmon is
  deployed with a configuration that captures Image, OriginalFileName,
  and CommandLine fields (SwiftOnSecurity or Olaf Hartong Sysmon modular
  config recommended). The detection matches both Windows PowerShell
  (powershell.exe) and PowerShell Core (pwsh.exe) by Image path with
  OriginalFileName fallbacks (PowerShell.EXE / pwsh.dll) to catch
  renamed binaries. Both .NET type-name markers (Net.Sockets.TCPClient
  AND System.Text.ASCIIEncoding) must be present in the same command
  line, matched case-insensitively in Elasticsearch (case_insensitive:
  true on the wildcards) and in Graylog (Lucene character classes with
  literal dots escaped). The two-marker AND requirement gives the
  detection high fidelity - false positives from legitimate
  network-aware PowerShell are rare because most legitimate scripts
  use Invoke-WebRequest or Invoke-RestMethod rather than raw TCPClient
  sockets paired with ASCIIEncoding. AMSI may block the unobfuscated
  Nishang one-liner, but real-world attackers use string concatenation,
  base64 encoding, or AMSI bypass techniques to deliver the payload -
  the literal markers will still appear in the resulting process
  command line that Sysmon captures even if the script source is
  obfuscated.

known_false_positives: >
  Limited false positives may be present from legitimate PowerShell
  network automation scripts that explicitly use raw socket
  primitives - for example, in-house monitoring tools, SOAR
  playbooks, or vendor agents that perform low-level TCP health
  checks. Validate the parent process, the destination IP and port,
  the user context, and the business justification before clearing.
  Allow-list specific approved scripts, parent processes, scheduled
  tasks, or user accounts rather than removing the detection.

references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://github.com/samratashok/nishang/blob/master/Shells/Invoke-PowerShellTcpOneLine.ps1
  - https://www.volexity.com/blog/2021/03/02/active-exploitation-of-microsoft-exchange-zero-day-vulnerabilities/
  - https://www.microsoft.com/security/blog/2021/03/02/hafnium-targeting-exchange-servers/

response:
  message: >
    Nishang Invoke-PowerShellTcpOneLine reverse-shell pattern
    detected on endpoint $agent_name$ by user
    $data_win_eventdata_user$. Process image:
    $data_win_eventdata_image$. Parent process:
    $data_win_eventdata_parentImage$. Command line:
    $data_win_eventdata_commandLine$. The combination of
    Net.Sockets.TCPClient and System.Text.ASCIIEncoding in a single
    PowerShell command line is the canonical fingerprint of the
    Nishang Invoke-PowerShellTcpOneLine reverse-shell utility -
    this is essentially never a false positive on a typical
    endpoint. Investigate immediately, identify the destination IP
    and port in the command line, examine the parent process
    lineage (suspicious parents include w3wp.exe / web servers
    indicating webshell delivery, Office, browsers, and document
    readers), check for concurrent outbound network egress to the
    target IP, hunt for follow-on process and credential-access
    activity, and isolate the host pending further analysis.
  risk_score: 80
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 70
    - field: data_win_eventdata_user
      type: user
      score: 70
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name
    - field: data_win_eventdata_parentImage
      type: parent_process_name
    - field: data_win_eventdata_commandLine
      type: command_line

tags:
  analytic_story:
    - HAFNIUM Group
    - Cleo File Transfer Software
    - Malicious PowerShell
    - Reverse Shell
    - Compromised Windows Host
    - Web Server Exploitation
    - Suspicious Command-Line Executions
  asset_type: Endpoint
  mitre_attack_id:
    - T1059.001
  custom_tags:
    - nishang
    - powershell
    - reverse_shell
    - tcp_client
    - ascii_encoding
    - powershell_abuse
    - malicious_powershell
    - c2_callback
    - hafnium
    - high_fidelity
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"1" AND (data_win_eventdata_image:/.*[Pp][Oo][Ww][Ee][Rr][Ss][Hh][Ee][Ll][Ll]\.exe/ OR data_win_eventdata_image:/.*[Pp][Ww][Ss][Hh]\.exe/ OR data_win_eventdata_originalFileName:/[Pp][Oo][Ww][Ee][Rr][Ss][Hh][Ee][Ll][Ll]\.EXE/ OR data_win_eventdata_originalFileName:/[Pp][Ww][Ss][Hh]\.dll/) AND data_win_eventdata_commandLine:/.*[Nn][Ee][Tt]\.[Ss][Oo][Cc][Kk][Ee][Tt][Ss]\.[Tt][Cc][Pp][Cc][Ll][Ii][Ee][Nn][Tt].*/ AND data_win_eventdata_commandLine:/.*[Ss][Yy][Ss][Tt][Ee][Mm]\.[Tt][Ee][Xx][Tt]\.[Aa][Ss][Cc][Ii][Ii][Ee][Nn][Cc][Oo][Dd][Ii][Nn][Gg].*/
name: Windows File Download Via Certutil
id: windows-file-download-certutil-001
version: 1
schema_version: "1.0"
date: "2026-02-23"
author: SOCFortress LLC
status: production
type: TTP

description: >
  Detects certutil.exe used to download files from remote URLs via -urlcache,
  -URL, /URL, or verifyctl flags. Certutil is a living-off-the-land binary
  commonly abused by adversaries for ingress tool transfer and payload staging.

data_source:
  - Sysmon EventID 1

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "1"
        - wildcard:
            data_win_eventdata_image: "*\\\\certutil.exe"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_commandLine: "*-urlcache*"
              - wildcard:
                  data_win_eventdata_commandLine: "*-URL *"
              - wildcard:
                  data_win_eventdata_commandLine: "*/URL *"
              - wildcard:
                  data_win_eventdata_commandLine: "*verifyctl*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_commandLine
    - data_win_eventdata_image
    - data_win_eventdata_parentImage
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-02-23 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-02-23 23:59:59.999"

how_to_implement: >
  This detection requires Wazuh agents deployed on Windows endpoints with Sysmon
  installed and configured to log process creation events (EventID 1) with full
  command-line arguments.

known_false_positives: >
  Administrators may use certutil for legitimate certificate operations.
  The -urlcache and verifyctl flags are rarely used for legitimate purposes.

references:
  - https://attack.mitre.org/techniques/T1105/
  - https://lolbas-project.github.io/lolbas/Binaries/Certutil/

response:
  message: >
    Certutil file download on $agent_name$.
    Command: $data_win_eventdata_commandLine$.
    Parent: $data_win_eventdata_parentImage$.
    User: $data_win_eventdata_user$. MITRE ATT&CK: T1105
  risk_score: 64
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 64
  threat_objects: []

tags:
  analytic_story:
    - Ingress Tool Transfer
    - Living Off The Land
    - Compromised Windows Host
  asset_type: Endpoint
  mitre_attack_id:
    - T1105
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"1" AND data_win_eventdata_image:/.*certutil\.exe/ AND (data_win_eventdata_commandLine:/.*-urlcache.*/ OR data_win_eventdata_commandLine:/.*-URL .*/ OR data_win_eventdata_commandLine:/.*\/URL .*/ OR data_win_eventdata_commandLine:/.*verifyctl.*/)

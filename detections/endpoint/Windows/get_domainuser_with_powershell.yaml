name: Get DomainUser with PowerShell
id: 9a5a41d6-04e7-11ec-923c-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-27"
author: SOCFortress LLC
status: production
type: TTP

description: >
  This analytic detects the execution of powershell.exe, pwsh.exe, or
  cmd.exe with the Get-DomainUser function referenced in the command
  line. Sysmon EventID 1 is used to match process creation events where
  the image or OriginalFileName is one of the PowerShell or Command
  Prompt binaries AND the command line contains Get-DomainUser.
  Get-DomainUser is a function from PowerSploit/PowerView - a
  well-known offensive PowerShell toolkit - used to enumerate Active
  Directory user accounts. This is distinct from Microsoft's
  Get-ADUser cmdlet (covered separately) and the presence of this
  PowerSploit-specific function name in a command line is a strong
  indicator of attacker tooling rather than legitimate administrative
  activity. This activity is significant as it indicates potential
  reconnaissance efforts by adversaries or Red Teams using PowerView
  for Active Directory discovery during the early phases of an
  intrusion. This is a known T1087.002 (Domain Account Discovery)
  technique documented in CISA AA23-347A. If confirmed malicious, this
  could allow attackers to gain situational awareness, identify
  high-value targets (privileged users, service accounts, kerberoastable
  accounts), and plan subsequent exploitation including credential
  theft and targeted lateral movement.

data_source:
  - Sysmon EventID 1

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "1"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_image: "*cmd.exe"
              - wildcard:
                  data_win_eventdata_image: "*powershell*.exe"
              - wildcard:
                  data_win_eventdata_image: "*pwsh.exe"
              - term:
                  data_win_eventdata_originalFileName: "Cmd.Exe"
              - term:
                  data_win_eventdata_originalFileName: "PowerShell.EXE"
              - term:
                  data_win_eventdata_originalFileName: "pwsh.dll"
            minimum_should_match: 1
        - wildcard:
            data_win_eventdata_commandLine:
              value: "*Get-DomainUser*"
              case_insensitive: true
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_eventdata_image
    - data_win_eventdata_originalFileName
    - data_win_eventdata_commandLine
    - data_win_eventdata_parentImage
    - data_win_eventdata_parentCommandLine
    - data_win_eventdata_user
    - data_win_eventdata_processId
    - data_win_eventdata_processGuid
    - data_win_eventdata_parentProcessId
    - data_win_eventdata_parentProcessGuid
    - data_win_eventdata_hashes
    - data_win_eventdata_integrityLevel
    - data_win_eventdata_currentDirectory

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-27 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-27 23:59:59.999"

how_to_implement: >
  This detection requires Sysmon EventID 1 (Process Creation) logs to be forwarded
  from Windows endpoints to Wazuh Indexer. Ensure Sysmon is deployed with a
  configuration that captures Image, OriginalFileName, and CommandLine fields
  (SwiftOnSecurity or Olaf Hartong Sysmon modular config recommended). The
  detection matches Windows shells (PowerShell or Command Prompt) by Image
  path or PE OriginalFileName, combined with Get-DomainUser in the command
  line. Case-insensitive matching is used on the function name to handle
  PowerShell's flexible casing. The ES DSL uses case_insensitive wildcard
  option (OpenSearch 2.x / Elasticsearch 7.10+); Graylog equivalent uses
  character classes. For deeper coverage, also enable PowerShell Script
  Block Logging (EventID 4104) and correlate against the same function
  name in script blocks - script block logging will catch in-memory
  PowerSploit imports that don't appear on the command line.

known_false_positives: >
  Get-DomainUser is a PowerSploit/PowerView offensive function, not a
  built-in Microsoft cmdlet, so legitimate administrative use is rare.
  Penetration testers, Red Teamers, and authorized internal security
  assessors may produce true-positive alerts that are not malicious -
  these should be tuned via approved-source allow-listing (specific
  parent process or user account) rather than removing the detection.

references:
  - https://attack.mitre.org/techniques/T1087/002/
  - https://powersploit.readthedocs.io/en/latest/Recon/Get-DomainUser/
  - https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-347a

response:
  message: >
    PowerSploit Get-DomainUser enumeration was identified on endpoint
    $agent_name$ by user $data_win_eventdata_user$. Process image:
    $data_win_eventdata_image$. Parent process:
    $data_win_eventdata_parentImage$. Command line:
    $data_win_eventdata_commandLine$. This is a high-confidence
    indicator of offensive AD toolkit usage - PowerSploit/PowerView
    function names are not legitimate Microsoft cmdlets and warrant
    immediate investigation, including review of parent process
    lineage, in-memory PowerShell module loads, and concurrent
    discovery activity.
  risk_score: 72
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 60
    - field: data_win_eventdata_user
      type: user
      score: 60
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name
    - field: data_win_eventdata_parentImage
      type: parent_process_name
    - field: data_win_eventdata_commandLine
      type: command_line

tags:
  analytic_story:
    - Active Directory Discovery
    - CISA AA23-347A
    - Active Directory Reconnaissance
    - PowerSploit
    - PowerView
    - Offensive PowerShell Toolkit
  asset_type: Endpoint
  mitre_attack_id:
    - T1087.002
  custom_tags:
    - powershell
    - powersploit
    - powerview
    - get_domainuser
    - active_directory
    - ad_enumeration
    - reconnaissance
    - domain_account_discovery
    - offensive_toolkit
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"1" AND (data_win_eventdata_image:/.*[Cc][Mm][Dd]\.exe.*/ OR data_win_eventdata_image:/.*[Pp][Oo][Ww][Ee][Rr][Ss][Hh][Ee][Ll][Ll].*\.exe.*/ OR data_win_eventdata_image:/.*[Pp][Ww][Ss][Hh]\.exe.*/ OR data_win_eventdata_originalFileName:"Cmd.Exe" OR data_win_eventdata_originalFileName:"PowerShell.EXE" OR data_win_eventdata_originalFileName:"pwsh.dll") AND data_win_eventdata_commandLine:/.*[Gg][Ee][Tt]\-[Dd][Oo][Mm][Aa][Ii][Nn][Uu][Ss][Ee][Rr].*/
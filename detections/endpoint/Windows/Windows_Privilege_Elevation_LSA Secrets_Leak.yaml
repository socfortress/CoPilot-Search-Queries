name: Windows Privilege Elevation - LSA Secrets Leak
id: Windows_Privilege_Elevation_LSA Secrets_Leak
version: 1
schema_version: "1.0"
date: "2026-03-16"
author: SOCFortress LLC
status: production
type: TTP
description: >
  Detects registry activity targeting HKLM\SECURITY\Policy\Secrets or
  HKLM\SECURITY\Policy\__GT__Decrypt paths, which are indicators of LSA
  secrets dumping. Attackers and credential dumping tools (Mimikatz, Impacket
  secretsdump) access these registry paths to extract cached credentials,
  service account passwords, and other sensitive secrets stored by the
  Local Security Authority. Any access to these paths outside of normal
  system activity is highly suspicious.
  MITRE ATT&CK: T1003.004 (OS Credential Dumping: LSA Secrets).

data_source:
  - Sysmon EventID 13 (RegistryEvent Value Set)

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "13"
        - wildcard:
            data_win_eventdata_targetObject: "*SECURITY*Policy*"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_targetObject: "*Secrets*"
              - wildcard:
                  data_win_eventdata_targetObject: "*__GT__Decrypt*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_image
    - data_win_eventdata_targetObject
    - data_win_eventdata_details
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-16 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-16 23:59:59.999"

how_to_implement: >
  This detection requires Wazuh agents deployed on Windows endpoints with Sysmon
  installed and configured to log registry value set events (EventID 13).
  Field data_win_eventdata_targetObject is confirmed working across all EventID 13
  detections in this environment. Field-validated — safe simulation of LSA secrets
  dumping is not possible without actual credential dumping tools. Any hit on this
  detection should be treated as critical and investigated immediately.

known_false_positives: >
  Legitimate system processes may occasionally access LSA policy paths during
  normal Windows operation. Review the process image and context to distinguish
  legitimate system activity from malicious credential dumping.

references:
  - https://attack.mitre.org/techniques/T1003/004/
  - https://www.thehacker.recipes/ad/movement/credentials/dumping/lsa-secrets

response:
  message: >
    LSA Secrets registry path accessed on $agent_name$ by $data_win_eventdata_user$.
    Process: $data_win_eventdata_image$.
    Registry path: $data_win_eventdata_targetObject$.
    MITRE ATT&CK: T1003.004
  risk_score: 75
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 75
    - field: data_win_eventdata_user
      type: user
      score: 75
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name
    - field: data_win_eventdata_targetObject
      type: registry_path

tags:
  analytic_story:
    - Credential Dumping
    - Windows Privilege Escalation
  asset_type: Endpoint
  mitre_attack_id:
    - T1003.004
  custom_tags:
    - lsa_secrets
    - credential_dumping
    - mimikatz
    - secretsdump
    - privilege_escalation
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"13" AND data_win_eventdata_targetObject:/.*SECURITY.*Policy.*/ AND (data_win_eventdata_targetObject:/.*Secrets.*/ OR data_win_eventdata_targetObject:/.*__GT__Decrypt.*/)
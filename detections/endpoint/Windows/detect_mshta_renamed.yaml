name: Detect mshta renamed
id: 8f45fcf0-5b68-11eb-ae93-0242ac130002
version: 1
schema_version: "1.0"
date: "2026-04-21"
author: SOCFortress LLC
status: production
type: Hunting

description: >
  The following analytic identifies instances where mshta.exe has been renamed 
  and executed. It leverages Endpoint Detection and Response (EDR) data, 
  specifically focusing on the original file name field to detect discrepancies. 
  This activity is significant because renaming mshta.exe is a common tactic 
  used by attackers to evade detection and execute malicious scripts. If confirmed 
  malicious, this could allow an attacker to execute arbitrary code, potentially 
  leading to system compromise, data exfiltration, or further lateral movement 
  within the network.

data_source:
  - Sysmon EventID 1
  - Windows Event Log Security 4688

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "1"
        - wildcard:
            data_win_eventdata_originalFileName: "*MSHTA*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
      must_not:
        - wildcard:
            data_win_eventdata_image: "*mshta.exe"
  _source:
    - timestamp
    - agent_name
    - data_win_eventdata_image
    - data_win_eventdata_originalFileName
    - data_win_eventdata_commandLine
    - data_win_eventdata_parentImage
    - data_win_eventdata_parentProcessId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-21 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-21 23:59:59.999"

how_to_implement: >
  Ensure Sysmon EventID 1 process creation logging is enabled on Windows endpoints 
  and that original file name capture is configured. Configure the Wazuh agent to 
  forward Windows Security Event Log events. Validate that data_win_eventdata_image, 
  data_win_eventdata_originalFileName, and data_win_eventdata_commandLine fields 
  are being populated in Elasticsearch/Wazuh Indexer.

known_false_positives: >
  Although unlikely, some legitimate applications may use a moved copy of mshta.exe, 
  but never renamed, triggering a false positive. Administrative tools or scripts 
  that copy and rename binaries may also trigger alerts.

references:
  - https://github.com/redcanaryco/AtomicTestHarnesses
  - https://redcanary.com/blog/introducing-atomictestharnesses/
  - https://attack.mitre.org/techniques/T1218/005/

response:
  message: >
    Renamed mshta.exe detected on $agent_name$ by user $data_win_eventdata_user$. 
    Executed as: $data_win_eventdata_image$. 
    Original file name: $data_win_eventdata_originalFileName$. 
    Command: $data_win_eventdata_commandLine$. 
    This indicates potential evasion and malicious script execution. 
    MITRE ATT&CK: T1218.005
  risk_score: 70
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 70
    - field: data_win_eventdata_user
      type: user
      score: 70
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name
    - field: data_win_eventdata_originalFileName
      type: original_filename

tags:
  analytic_story:
    - Suspicious MSHTA Activity
    - Living Off The Land
  asset_type: Endpoint
  mitre_attack_id:
    - T1218.005
  custom_tags:
    - mshta
    - renamed
    - process_manipulation
    - defense_evasion
    - lolbas
    - file_name_mismatch
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"1" AND data_win_eventdata_originalFileName:/.*MSHTA.*/ AND NOT data_win_eventdata_image:/.*mshta.exe.*/
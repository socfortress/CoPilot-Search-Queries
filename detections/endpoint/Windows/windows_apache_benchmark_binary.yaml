name: Windows Apache Benchmark Binary
id: windows-apache-benchmark-binary-001
version: 1
schema_version: "1.0"
date: "2026-03-03"
author: SOCFortress LLC
status: production
type: Anomaly

description: >
  Detects execution of the Apache Benchmark binary (ab.exe), commonly used 
  as a default MetaSploit payload. The original filename ab.exe is a strong 
  indicator of MetaSploit activity when found outside of legitimate Apache 
  installations.

data_source:
  - Sysmon EventID 1

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "1"
        - bool:
            should:
              - term:
                  data_win_eventdata_originalFileName: "ab.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\ab.exe"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_eventdata_commandLine
    - data_win_eventdata_image
    - data_win_eventdata_originalFileName
    - data_win_eventdata_parentImage
    - data_win_eventdata_user
    - data_win_eventdata_hashes

parameters:
  AGENT_NAME:
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    type: string
    required: true
    example: "lab"
  START_TIME:
    type: datetime
    default: "now-24h"
  END_TIME:
    type: datetime
    default: "now"

how_to_implement: >
  Requires Sysmon EventID 1 with original filename logging enabled.

known_false_positives: >
  Legitimate Apache HTTP Server installations include ab.exe. Verify 
  process path is not within Apache installation directory.

references:
  - https://seclists.org/metasploit/2013/q3/13
  - https://attack.mitre.org/techniques/T1059/

response:
  message: >
    MetaSploit Apache Benchmark payload detected on $agent_name$. 
    Process: $data_win_eventdata_image$. 
    Parent: $data_win_eventdata_parentImage$. 
    User: $data_win_eventdata_user$. 
    HIGH CONFIDENCE malware indicator. MITRE ATT&CK: T1059
  risk_score: 100
  severity: critical
  risk_objects:
    - field: agent_name
      type: system
      score: 100
  threat_objects: []

tags:
  analytic_story:
    - MetaSploit
    - Compromised Windows Host
  asset_type: Endpoint
  mitre_attack_id:
    - T1059
  custom_tags:
    - metasploit
    - apache_benchmark
    - malware_ioc
    - high_confidence
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"1" AND data_win_eventdata_originalFileName:"ab.exe"

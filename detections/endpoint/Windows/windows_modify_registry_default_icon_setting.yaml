name: Windows Modify Registry Default Icon Setting
id: a7a7afdb-3c58-45b6-9bff-63e5acfd9d40
version: 1
schema_version: "1.0"
date: "2026-04-08"
author: SOCFortress LLC
status: production
type: Anomaly

description: >
  The following analytic detects suspicious modifications to the Windows registry's default icon settings, a technique
  associated with LockBit ransomware and other malware families. This detection leverages Sysmon EventID 13 (registry
  modification) to identify changes to registry paths under HKCR (HKEY_CLASSES_ROOT) involving defaultIcon settings.
  This activity is significant because it is uncommon for normal users or legitimate applications to modify these settings.
  Ransomware families like LockBit modify default icon associations to display custom ransom notes or intimidating imagery
  when users open files, serving as part of their attack strategy for system defacement and psychological manipulation.
  If confirmed malicious, this could lead to system defacement, signaling a broader ransomware attack in progress,
  potentially compromising sensitive data and system integrity.

data_source:
  - Sysmon EventID 13

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "13"
        - wildcard:
            data_win_eventdata_targetObject: "*defaultIcon*(Default)*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - data_win_eventdata_targetObject
    - data_win_eventdata_details
    - data_win_eventdata_valueName
    - data_win_eventdata_image
    - data_win_eventdata_user
    - agent_name

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "YYYY-MM-DD 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "YYYY-MM-DD 23:59:59.999"

how_to_implement: >
  To successfully implement this search, you must be ingesting data that records registry activity from your hosts to
  populate the endpoint data model in the registry node. This is typically populated via endpoint detection-and-response
  products such as Carbon Black or endpoint data sources such as Sysmon. Ensure that Sysmon is configured to monitor
  HKCR (HKEY_CLASSES_ROOT) registry hive changes. The detection focuses on the defaultIcon registry key which is used
  by Windows to determine the icon displayed for files of specific types. Modifications to these keys can indicate
  malware attempting to change file associations or display custom images when users interact with compromised files.

known_false_positives: >
  No false positives have been identified at this time. Legitimate applications and Windows updates do not typically
  modify defaultIcon registry settings. Any modifications to these keys should be investigated as they are highly
  suspicious and indicative of malware infection or unauthorized system modification. If legitimate software requires
  these changes, document and whitelist the process name and registry path combination.

references:
  - https://blogs.vmware.com/security/2022/10/lockbit-3-0-also-known-as-lockbit-black.html
  - https://news.sophos.com/en-us/2020/04/24/lockbit-ransomware-borrows-tricks-to-keep-up-with-revil-and-maze/
  - https://learn.microsoft.com/en-us/windows/win32/shlwapi/hkey-classes-root-key

response:
  message: >
    Suspicious default icon registry modification detected on $agent_name$ by user $data_win_eventdata_user$.
    Registry Path: $data_win_eventdata_targetObject$. Icon Path: $data_win_eventdata_details$.
    Process: $data_win_eventdata_image$. This may indicate LockBit ransomware or similar malware infection.
  risk_score: 80
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 80
    - field: data_win_eventdata_user
      type: user
      score: 60
  threat_objects:
    - field: data_win_eventdata_targetObject
      type: registry_path
    - field: data_win_eventdata_details
      type: file_path

tags:
  analytic_story:
    - LockBit Ransomware
    - Ransomware Activity
    - System Defacement
  asset_type: Endpoint
  mitre_attack_id:
    - T1112
  custom_tags:
    - defaulticon
    - registry_modification
    - lockbit
    - ransomware
    - hkcr
    - file_association
    - system_defacement
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"13" AND data_win_eventdata_targetObject:/.*defaultIcon.*\(Default\).*/
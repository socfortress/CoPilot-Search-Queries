name: Windows Ngrok Reverse Proxy Usage
id: Windows-Ngrok-Reverse-Proxy-Usage
version: 9
schema_version: 1
date: '2025-05-02'
author: SOCFortress LLC
status: production
type: Anomaly
description: >
  Detects execution of ngrok.exe with tunnel-related arguments (start, --config,
  http, authtoken, tcp). While ngrok is a legitimate tunneling tool, adversaries
  increasingly abuse it to bypass network defenses, establish reverse proxies,
  exfiltrate data, and maintain persistence. Associated with Iranian APT activity
  (CISA AA22-320A, AA24-241A) and Reverse Network Proxy tradecraft.
  MITRE ATT&CK: T1572 (Protocol Tunneling), T1090 (Proxy), T1102 (Web Service).

data_source:
  - Sysmon EventID 1 (ProcessCreate)

search:
  query:
    bool:
      must:
        - term:
            agent_name: "AGENT_NAME"
        - term:
            agent_labels_customer: "CUSTOMER_CODE"
        - term:
            data_win_system_eventID: "1"
        - wildcard:
            data_win_eventdata_image: "*\\ngrok.exe"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_commandLine: "*start*"
              - wildcard:
                  data_win_eventdata_commandLine: "*--config*"
              - wildcard:
                  data_win_eventdata_commandLine: "*http*"
              - wildcard:
                  data_win_eventdata_commandLine: "*authtoken*"
              - wildcard:
                  data_win_eventdata_commandLine: "*tcp*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "START_TIME"
              lte: "END_TIME"

parameters:
  - name: AGENT_NAME
    default: "DESKTOP-AM0HLGE"
  - name: CUSTOMER_CODE
    default: "lab"
  - name: START_TIME
    default: "now-24h"
  - name: END_TIME
    default: "now"

how_to_implement: >
  Requires Sysmon EventID 1 (ProcessCreate) flowing to the Wazuh Indexer.
  Fields data_win_eventdata_image and data_win_eventdata_commandLine are
  confirmed working across all EventID 1 detections in this environment.
  Field-validated based on established EventID 1 detection patterns.

known_false_positives: >
  False positives will be present in organizations that permit the use of
  ngrok for legitimate development or remote access purposes. Filter by
  known approved users or machines as needed.

references:
  - https://www.cisa.gov/uscert/sites/default/files/publications/aa22-320a_joint_csa_iranian_government-sponsored_apt_actors_compromise_federal%20network_deploy_crypto%20miner_credential_harvester.pdf
  - https://attack.mitre.org/techniques/T1572/
  - https://attack.mitre.org/techniques/T1090/

response:
  message: >
    Ngrok reverse proxy execution detected on $agent_name$ by $data_win_eventdata_user$.
    Parent: $data_win_eventdata_parentImage$.
    Command: $data_win_eventdata_commandLine$.
    MITRE ATT&CK: T1572, T1090, T1102
  risk_score: 50
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 50
    - field: data_win_eventdata_user
      type: user
      score: 50
  threat_objects:
    - field: data_win_eventdata_parentImage
      type: parent_process_name
    - field: data_win_eventdata_image
      type: process_name

tags:
  analytic_story:
    - Reverse Network Proxy
    - CISA AA22-320A
    - CISA AA24-241A
  asset_type: Endpoint
  mitre_attack_id:
    - T1572
    - T1090
    - T1102
  custom_tags:
    - ngrok
    - reverse_proxy
    - tunneling
    - defense_evasion
    - exfiltration
  product:
    - Wazuh
  security_domain: endpoint
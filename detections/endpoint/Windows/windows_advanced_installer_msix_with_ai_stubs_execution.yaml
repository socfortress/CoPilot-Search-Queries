name: Windows Advanced Installer MSIX with AI_STUBS Execution
id: windows-advanced-installer-msix-ai-stubs-001
version: 1
schema_version: "1.0"
date: "2026-03-03"
author: SOCFortress LLC
status: production
type: TTP

description: >
  Detects execution of Advanced Installer MSIX Package Support Framework 
  components (AI_STUBS executables with original filename popupwrapper.exe). 
  Adversaries package malicious content within MSIX files built with 
  Advanced Installer to bypass security controls and deliver malware.

data_source:
  - Sysmon EventID 1

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "1"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_image: "*\\AI_STUBS\\AiStubX64Elevated.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\AI_STUBS\\AiStubX86Elevated.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\AI_STUBS\\AiStubX64.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\AI_STUBS\\AiStubX86.exe"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_eventdata_commandLine
    - data_win_eventdata_image
    - data_win_eventdata_originalFileName
    - data_win_eventdata_parentImage
    - data_win_eventdata_user
    - data_win_eventdata_hashes

parameters:
  AGENT_NAME:
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    type: string
    required: true
    example: "lab"
  START_TIME:
    type: datetime
    default: "now-24h"
  END_TIME:
    type: datetime
    default: "now"

how_to_implement: >
  Requires Sysmon EventID 1 with full process path and original filename 
  logging enabled.

known_false_positives: >
  Legitimate applications packaged with Advanced Installer using PSF may 
  trigger this. Verify MSIX package source and publisher trust.

references:
  - https://redcanary.com/blog/threat-intelligence/msix-installers/
  - https://redcanary.com/threat-detection-report/techniques/installer-packages/
  - https://attack.mitre.org/techniques/T1218/

response:
  message: >
    AI_STUBS MSIX execution on $agent_name$. 
    Process: $data_win_eventdata_image$. 
    Parent: $data_win_eventdata_parentImage$. 
    User: $data_win_eventdata_user$. 
    Malicious MSIX indicator. MITRE ATT&CK: T1218
  risk_score: 60
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 60
  threat_objects: []

tags:
  analytic_story:
    - MSIX Package Abuse
    - Compromised Windows Host
  asset_type: Endpoint
  mitre_attack_id:
    - T1218
    - T1553.005
    - T1204.002
  custom_tags:
    - msix
    - ai_stubs
    - popupwrapper
    - installer_abuse
  product:
    - Wazuh
  security_domain: endpoint
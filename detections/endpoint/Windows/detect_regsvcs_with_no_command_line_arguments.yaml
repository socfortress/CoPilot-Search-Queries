name: Detect Regsvcs with No Command Line Arguments
id: 6b74d578-a02e-4e94-a0d1-39440d0bf254
version: 1
schema_version: "1.0"
date: "2026-04-21"
author: SOCFortress LLC
status: production
type: TTP

description: >
  This analytic detects instances of regsvcs.exe running without any command line
  arguments (where the command line consists solely of the binary path, with or
  without surrounding quotes). This behavior typically indicates process injection,
  where another process manipulates regsvcs.exe by spawning it in a suspended state
  and injecting malicious code. regsvcs.exe is a Microsoft .NET Framework .NET
  Services Installation Tool and should normally always be invoked with an assembly
  file argument. A bare invocation with no arguments is highly anomalous and may
  signal an attempt to evade detection or execute malicious code via process
  hollowing. If confirmed malicious, attackers could achieve arbitrary code
  execution, potentially leading to privilege escalation, persistence, or access
  to sensitive information. Investigate network connections, parallel processes,
  and suspicious module loads for further context.

data_source:
  - Sysmon EventID 1

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "1"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_image: "*regsvcs.exe"
              - wildcard:
                  data_win_eventdata_originalFileName: "RegSvcs.exe"
            minimum_should_match: 1
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_commandLine: "*regsvcs.exe\\\\\""
              - wildcard:
                  data_win_eventdata_commandLine: "*regsvcs.exe"
              - wildcard:
                  data_win_eventdata_commandLine: "*regsvcs"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_eventdata_image
    - data_win_eventdata_originalFileName
    - data_win_eventdata_commandLine
    - data_win_eventdata_parentImage
    - data_win_eventdata_parentCommandLine
    - data_win_eventdata_user
    - data_win_eventdata_processId
    - data_win_eventdata_processGuid
    - data_win_eventdata_parentProcessId
    - data_win_eventdata_parentProcessGuid
    - data_win_eventdata_hashes
    - data_win_eventdata_integrityLevel

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-21 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-21 23:59:59.999"

how_to_implement: >
  This detection requires Sysmon EventID 1 (Process Creation) logs to be forwarded
  from Windows endpoints to Wazuh Indexer. Ensure Sysmon is deployed with a
  configuration that captures process creation events including Image,
  OriginalFileName, and CommandLine fields (SwiftOnSecurity or Olaf Hartong Sysmon
  modular config recommended). The detection identifies regsvcs.exe invocations
  where the command line is exactly the process path (no arguments), which is
  extremely unusual for legitimate use since regsvcs.exe requires an assembly
  argument to function normally. The wildcard patterns account for Wazuh's
  ingestion format where quoted command lines are stored with escaped quotes and
  backslashes.

known_false_positives: >
  Although unlikely, limited instances of regsvcs.exe with no command line
  arguments may legitimately occur during manual testing, help/usage queries, or
  unusual installer behavior. Filter based on endpoint usage, parent process
  lineage, or user context as needed. Consider allow-listing specific developer
  workstations where this behavior is expected.

references:
  - https://attack.mitre.org/techniques/T1218/009/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1218.009/T1218.009.md
  - https://lolbas-project.github.io/lolbas/Binaries/Regsvcs/

response:
  message: >
    The process regsvcs.exe ($data_win_eventdata_image$) was spawned by
    $data_win_eventdata_parentImage$ without any command-line arguments on endpoint
    $agent_name$ by user $data_win_eventdata_user$. This behavior is highly
    indicative of process injection or process hollowing attempts. Command line:
    $data_win_eventdata_commandLine$
  risk_score: 72
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 60
    - field: data_win_eventdata_user
      type: user
      score: 60
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name
    - field: data_win_eventdata_parentImage
      type: parent_process_name
    - field: data_win_eventdata_commandLine
      type: command_line

tags:
  analytic_story:
    - Suspicious Regsvcs Regasm Activity
    - Living Off The Land
  asset_type: Endpoint
  mitre_attack_id:
    - T1218.009
  custom_tags:
    - regsvcs
    - lolbin
    - process_injection
    - process_hollowing
    - dotnet_abuse
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"1" AND (data_win_eventdata_image:/.*regsvcs\.exe.*/ OR data_win_eventdata_originalFileName:/RegSvcs\.exe/) AND data_win_eventdata_commandLine:/.*regsvcs\.exe\\\"/
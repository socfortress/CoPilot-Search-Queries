name: Windows Audit Policy Disabled via Legacy Auditpol
id: windows-audit-policy-disabled-legacy-auditpol-001
version: 1
schema_version: "1.0"
date: "2026-03-03"
author: SOCFortress LLC
status: production
type: Anomaly

description: >
  Detects execution of legacy auditpol.exe with /disable flag or category 
  flags set to :none (e.g., /system:none, /logon:none). The legacy auditpol 
  from Windows 2000 Resource Kit can disable audit categories. Used by 
  Solorigate and Prometei botnet for defense evasion.

data_source:
  - Sysmon EventID 1

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "1"
        - bool:
            should:
              - bool:
                  must:
                    - wildcard:
                        data_win_eventdata_image: "*\\auditpol.exe"
                    - wildcard:
                        data_win_eventdata_commandLine: "*/disable*"
              - wildcard:
                  data_win_eventdata_commandLine: "*/system:none*"
              - wildcard:
                  data_win_eventdata_commandLine: "*/logon:none*"
              - wildcard:
                  data_win_eventdata_commandLine: "*/object:none*"
              - wildcard:
                  data_win_eventdata_commandLine: "*/privilege:none*"
              - wildcard:
                  data_win_eventdata_commandLine: "*/process:none*"
              - wildcard:
                  data_win_eventdata_commandLine: "*/policy:none*"
              - wildcard:
                  data_win_eventdata_commandLine: "*/sam:none*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_eventdata_commandLine
    - data_win_eventdata_image
    - data_win_eventdata_parentImage
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    type: string
    required: true
    example: "lab"
  START_TIME:
    type: datetime
    default: "now-24h"
  END_TIME:
    type: datetime
    default: "now"

how_to_implement: >
  Requires Sysmon EventID 1 with full command-line logging.

known_false_positives: >
  Rare. Legacy auditpol usage is uncommon on modern systems.

references:
  - https://www.microsoft.com/en-us/security/blog/2021/01/20/deep-dive-into-the-solorigate-second-stage-activation-from-sunburst-to-teardrop-and-raindrop/
  - https://attack.mitre.org/techniques/T1562/002/

response:
  message: >
    Legacy auditpol disable on $agent_name$. 
    Command: $data_win_eventdata_commandLine$. 
    Parent: $data_win_eventdata_parentImage$. 
    User: $data_win_eventdata_user$. MITRE ATT&CK: T1562.002
  risk_score: 25
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 25
  threat_objects: []

tags:
  analytic_story:
    - Windows Audit Policy Tampering
    - Compromised Windows Host
  asset_type: Endpoint
  mitre_attack_id:
    - T1562.002
  custom_tags:
    - legacy_auditpol
    - audit_policy_tampering
    - defense_evasion
  product:
    - Wazuh
  security_domain: endpoint
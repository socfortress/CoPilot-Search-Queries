name: Windows Powershell Import Applocker Policy
id: 102af98d-0ca3-4aa4-98d6-7ab2b98b955a
version: 1
schema_version: "1.0"
date: "2026-03-30"
author: SOCFortress LLC
status: production
type: TTP
description: >
  Detects use of PowerShell to import and apply AppLocker policies via
  Import-Module Applocker combined with Set-AppLockerPolicy and -XMLPolicy
  parameter. Malware such as Azorult uses this technique to enforce restrictive
  AppLocker policies that disable antivirus products and security tools,
  bypassing security controls and enabling further system compromise. This
  specific combination of cmdlets is rarely used legitimately in enterprise
  environments.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Import-Module Applocker*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Set-AppLockerPolicy*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*-XMLPolicy*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_path
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-30 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-30 23:59:59.999"

how_to_implement: >
  Requires PowerShell Script Block Logging enabled on endpoints.
  Enable via Group Policy: Computer Configuration → Administrative Templates
  → Windows Components → Windows PowerShell → Turn on PowerShell Script Block
  Logging.

known_false_positives: >
  Administrators may legitimately use these cmdlets to deploy or update
  AppLocker policies across endpoints. Review the XML policy content and
  user context to determine if the activity is authorized.

references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1562/001/
  - https://app.any.run/tasks/a6f2ffe2-e6e2-4396-ae2e-04ea0143f2d8/

response:
  message: >
    PowerShell AppLocker policy import detected on $agent_name$ by
    $data_win_eventdata_user$.
    Script: $data_win_eventdata_scriptBlockText$.
    MITRE ATT&CK: T1059.001, T1562.001
  risk_score: 49
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 49
    - field: data_win_eventdata_user
      type: user
      score: 49
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: script_block

tags:
  analytic_story:
    - Azorult
  asset_type: Endpoint
  mitre_attack_id:
    - T1059.001
    - T1562.001
  custom_tags:
    - applocker
    - import_policy
    - defense_evasion
    - azorult
    - antivirus_bypass
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Import-Module Applocker.*/ AND data_win_eventdata_scriptBlockText:/.*Set-AppLockerPolicy.*/ AND data_win_eventdata_scriptBlockText:/.*-XMLPolicy.*/
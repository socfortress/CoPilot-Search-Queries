name: Windows Hide Notification Features Through Registry
id: cafa4bce-9f06-11ec-a7b2-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-08"
author: SOCFortress LLC
status: production
type: Anomaly

description: >
  The following analytic detects suspicious registry modifications aimed at hiding common Windows
  notification features on a compromised host. It leverages Sysmon EventID 13 to monitor specific
  registry paths and values related to notification hiding. This activity is significant as it is
  often used by ransomware to obscure visual indicators, increasing the impact of the attack. If
  confirmed malicious, this could prevent users from noticing critical system alerts, thereby aiding
  the attacker in maintaining persistence and furthering their malicious activities undetected.

data_source:
  - Sysmon EventID 13

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "13"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_targetObject: "*\\Policies\\Explorer\\HideClock"
              - wildcard:
                  data_win_eventdata_targetObject: "*\\Policies\\Explorer\\HideSCAHealth"
              - wildcard:
                  data_win_eventdata_targetObject: "*\\Policies\\Explorer\\HideSCANetwork"
              - wildcard:
                  data_win_eventdata_targetObject: "*\\Policies\\Explorer\\HideSCAPower"
              - wildcard:
                  data_win_eventdata_targetObject: "*\\Policies\\Explorer\\HideSCAVolume"
            minimum_should_match: 1
        - term:
            data_win_eventdata_details: "DWORD (0x00000001)"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - data_win_eventdata_targetObject
    - data_win_eventdata_valueName
    - data_win_eventdata_details
    - data_win_eventdata_image
    - data_win_system_computer

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "YYYY-MM-DD 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "YYYY-MM-DD 23:59:59.999"

how_to_implement: >
  To successfully implement this search, you need to be ingesting logs with registry modification
  data from your endpoints. Sysmon EventID 13 captures registry value set events. Ensure that
  Sysmon is configured to monitor the registry paths related to Windows notification hiding
  (HideClock, HideSCAHealth, HideSCANetwork, HideSCAPower, HideSCAVolume) and that these logs are
  properly ingested into Elasticsearch. The detection specifically looks for DWORD value changes
  to 0x00000001 in the Policies\Explorer registry path, which enables notification hiding.

known_false_positives: >
  No false positives have been identified at this time. Registry modifications to hide Windows
  notification features are typically associated with malicious activity such as ransomware or
  other defensive evasion tactics. Legitimate administrative tasks do not typically involve hiding
  system notification features.

references:
  - https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/Ransom.Win32.ONALOCKER.A/

response:
  message: >
    Registry modification to hide Windows notification on $data_win_system_computer$ detected.
    TargetObject: $data_win_eventdata_targetObject$ Details: $data_win_eventdata_details$.
    This is indicative of ransomware or defense evasion activity attempting to obscure system alerts.
  risk_score: 75
  severity: high
  risk_objects:
    - field: data_win_system_computer
      type: system
      score: 75
  threat_objects:
    - field: data_win_eventdata_targetObject
      type: registry_path

tags:
  analytic_story:
    - Ransomware
    - Windows Defense Evasion Tactics
    - Windows Registry Abuse
  asset_type: Endpoint
  mitre_attack_id:
    - T1112
  custom_tags:
    - notification_hiding
    - registry_modification
    - ransomware
    - defense_evasion
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"13" AND data_win_eventdata_targetObject:"HKLM\\\\SOFTWARE\\\\Microsoft\\\\Windows\\\\CurrentVersion\\\\Policies\\\\Explorer\\\\HideSCAVolume"
name: Windows Bypass UAC via Pkgmgr Tool
id: cce58e2c-988a-4319-9390-0daa9eefa3cd
version: 6
schema_version: 1
date: '2025-05-02'
author: SOCFortress LLC
status: production
type: Anomaly
description: >
  Detects execution of the deprecated pkgmgr.exe with an XML input file argument.
  pkgmgr.exe is a legacy Windows package manager that has been replaced by DISM
  but remains present on modern systems. Warzone RAT abuses this binary to bypass
  UAC by passing a crafted XML manifest, allowing silent package installation with
  elevated privileges without triggering a UAC prompt. Any execution of pkgmgr.exe
  with an XML file argument from a non-system parent process should be investigated.
  MITRE ATT&CK: T1548.002 (Abuse Elevation Control Mechanism: Bypass UAC).

data_source:
  - Sysmon EventID 1 (ProcessCreate)

search:
  query:
    bool:
      must:
        - term:
            agent_name: "AGENT_NAME"
        - term:
            agent_labels_customer: "CUSTOMER_CODE"
        - term:
            data_win_system_eventID: "1"
        - wildcard:
            data_win_eventdata_image: "*\\PkgMgr.exe"
        - wildcard:
            data_win_eventdata_commandLine: "*.xml*"
        - range:
            timestamp:
              gte: "START_TIME"
              lte: "END_TIME"

parameters:
  - name: AGENT_NAME
    default: "DESKTOP-AM0HLGE"
  - name: CUSTOMER_CODE
    default: "lab"
  - name: START_TIME
    default: "now-24h"
  - name: END_TIME
    default: "now"

how_to_implement: >
  Requires Sysmon EventID 1 (ProcessCreate) flowing to the Wazuh Indexer.
  Validated on DESKTOP-AM0HLGE with PkgMgr.exe /n:C:\Windows\Temp\test.xml
  executed from PowerShell. Important: data_win_eventdata_image stores the
  binary as "PkgMgr.exe" (mixed case) — Elasticsearch wildcard queries are
  case-sensitive on keyword fields, use "*\\PkgMgr.exe" not "*\\pkgmgr.exe".
  Confirmed field names: data_win_eventdata_image, data_win_eventdata_commandLine,
  data_win_eventdata_parentImage, data_win_eventdata_user.

known_false_positives: >
  Legitimate use of pkgmgr.exe is extremely rare on modern Windows systems as
  it has been replaced by DISM. Some legacy software deployment tools may invoke
  it. Filter on data_win_eventdata_parentImage for known deployment tool paths
  (e.g. SCCM, software distribution agents). Any execution from user-space
  parent processes should be treated as high priority.

references:
  - https://asec.ahnlab.com/en/17692/
  - https://www.blackberry.com/us/en/solutions/endpoint-security/ransomware-protection/warzone
  - https://attack.mitre.org/techniques/T1548/002/

response:
  message: >
    pkgmgr.exe executed with XML argument on $agent_name$.
    Command line: $data_win_eventdata_commandLine$.
    Parent process: $data_win_eventdata_parentImage$.
    User: $data_win_eventdata_user$.
    Possible UAC bypass via deprecated package manager (Warzone RAT TTP).
    MITRE ATT&CK: T1548.002
  risk_score: 9
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 9
    - field: data_win_eventdata_user
      type: user
      score: 9
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name

tags:
  analytic_story:
    - Warzone RAT
    - UAC Bypass
  asset_type: Endpoint
  mitre_attack_id:
    - T1548.002
  custom_tags:
    - pkgmgr
    - uac_bypass
    - warzone_rat
    - privilege_escalation
    - deprecated_binary
  product:
    - Wazuh
  security_domain: endpoint
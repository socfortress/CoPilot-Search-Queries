name: Windows BitLockerToGo Process Execution
id: 68cbc9e9-2882-46f2-b636-3b5080589d58
version: 5
schema_version: 1
date: '2025-05-02'
author: SOCFortress LLC
status: production
type: Hunting
description: >
  Detects any execution of BitLockerToGo.exe, a legitimate Windows utility for
  managing BitLocker encryption on removable drives. Lumma stealer malware has been
  observed abusing this binary to manipulate registry keys, search for cryptocurrency
  wallets and credentials, and exfiltrate sensitive data. Since BitLockerToGo.exe
  is rarely executed in most environments, any execution should be investigated.
  If the binary is not present or used in your environment, escalate to TTP status.
  MITRE ATT&CK: T1218 (System Binary Proxy Execution).

data_source:
  - Sysmon EventID 1 (ProcessCreate)

search:
  query:
    bool:
      must:
        - term:
            agent_name: "AGENT_NAME"
        - term:
            agent_labels_customer: "CUSTOMER_CODE"
        - term:
            data_win_system_eventID: "1"
        - wildcard:
            data_win_eventdata_image: "*\\bitlockertogo.exe"
        - range:
            timestamp:
              gte: "START_TIME"
              lte: "END_TIME"

parameters:
  - name: AGENT_NAME
    default: "DESKTOP-AM0HLGE"
  - name: CUSTOMER_CODE
    default: "lab"
  - name: START_TIME
    default: "now-24h"
  - name: END_TIME
    default: "now"

how_to_implement: >
  Requires Sysmon EventID 1 (ProcessCreate) flowing to the Wazuh Indexer.
  Field-validated — BitLockerToGo.exe was not present on the lab endpoint
  (DESKTOP-AM0HLGE), binary is only available on Windows editions with
  BitLocker To Go feature enabled. Field names are consistent with all
  confirmed EventID 1 detections: data_win_eventdata_image,
  data_win_eventdata_commandLine, data_win_eventdata_parentImage,
  data_win_eventdata_user.

known_false_positives: >
  Legitimate use is possible in environments that use BitLocker To Go for
  removable drive encryption management. Tune based on
  data_win_eventdata_parentImage and data_win_eventdata_user if noise is
  observed. In environments where BitLockerToGo.exe is not deployed,
  any execution should be treated as high priority.

references:
  - https://securelist.com/fake-captcha-delivers-lumma-amadey/114312/
  - https://attack.mitre.org/techniques/T1218/

response:
  message: >
    BitLockerToGo.exe executed on $agent_name$.
    Command line: $data_win_eventdata_commandLine$.
    Parent process: $data_win_eventdata_parentImage$.
    User: $data_win_eventdata_user$.
    Possible Lumma stealer abuse of BitLockerToGo for credential theft
    or crypto wallet harvesting. MITRE ATT&CK: T1218
  risk_score: 45
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 45
    - field: data_win_eventdata_user
      type: user
      score: 45
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name

tags:
  analytic_story:
    - Lumma Stealer
    - Living Off The Land
  asset_type: Endpoint
  mitre_attack_id:
    - T1218
  custom_tags:
    - bitlockertogo
    - lumma_stealer
    - lolbas
    - credential_theft
    - infostealer
  product:
    - Wazuh
  security_domain: endpoint
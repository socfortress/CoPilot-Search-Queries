name: Get ADUser with PowerShell
id: 0b6ee3f4-04e3-11ec-a87d-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-27"
author: SOCFortress LLC
status: production
type: Hunting

description: >
  This analytic detects the execution of powershell.exe, pwsh.exe, or
  cmd.exe with the Get-ADUser cmdlet combined with the -filter parameter,
  which is used to enumerate domain users in Active Directory. Sysmon
  EventID 1 is used to match process creation events where the image or
  OriginalFileName is one of the PowerShell or Command Prompt binaries
  AND the command line contains both "Get-ADUser" and "-filter". The
  -filter parameter is required because it is used to specify which
  users to retrieve (commonly "*" to dump all users). This activity is
  significant as it may indicate an attempt by adversaries to gather
  information about domain users for situational awareness and Active
  Directory discovery, particularly during the early reconnaissance
  phase of an intrusion. This technique is a known T1087.002 (Domain
  Account Discovery) pattern and is documented in CISA AA23-347A
  alongside other AD discovery techniques used by ransomware operators.
  If confirmed malicious, this behavior could lead to further
  reconnaissance, enabling attackers to identify high-value targets
  (privileged users, service accounts, kerberoastable accounts) and
  plan subsequent attacks including credential theft, password
  spraying, or targeted lateral movement.

data_source:
  - Sysmon EventID 1

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "1"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_image: "*cmd.exe"
              - wildcard:
                  data_win_eventdata_image: "*powershell*.exe"
              - wildcard:
                  data_win_eventdata_image: "*pwsh.exe"
              - term:
                  data_win_eventdata_originalFileName: "Cmd.Exe"
              - term:
                  data_win_eventdata_originalFileName: "PowerShell.EXE"
              - term:
                  data_win_eventdata_originalFileName: "pwsh.dll"
            minimum_should_match: 1
        - wildcard:
            data_win_eventdata_commandLine:
              value: "*Get-ADUser*"
              case_insensitive: true
        - wildcard:
            data_win_eventdata_commandLine:
              value: "*-filter*"
              case_insensitive: true
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_eventdata_image
    - data_win_eventdata_originalFileName
    - data_win_eventdata_commandLine
    - data_win_eventdata_parentImage
    - data_win_eventdata_parentCommandLine
    - data_win_eventdata_user
    - data_win_eventdata_processId
    - data_win_eventdata_processGuid
    - data_win_eventdata_parentProcessId
    - data_win_eventdata_parentProcessGuid
    - data_win_eventdata_hashes
    - data_win_eventdata_integrityLevel
    - data_win_eventdata_currentDirectory

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-27 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-27 23:59:59.999"

how_to_implement: >
  This detection requires Sysmon EventID 1 (Process Creation) logs to be forwarded
  from Windows endpoints to Wazuh Indexer. Ensure Sysmon is deployed with a
  configuration that captures Image, OriginalFileName, and CommandLine fields
  (SwiftOnSecurity or Olaf Hartong Sysmon modular config recommended). The
  detection matches Windows shells (PowerShell or Command Prompt) by Image
  path or PE OriginalFileName, combined with both "Get-ADUser" and "-filter"
  in the command line. Case-insensitive matching is used on cmdlet/parameter
  names to handle PowerShell's flexible casing. The ES DSL uses
  case_insensitive wildcard option (OpenSearch 2.x / Elasticsearch 7.10+);
  Graylog equivalent uses character classes. For deeper coverage, also
  enable PowerShell Script Block Logging (EventID 4104) and correlate
  against the same patterns in script blocks.

known_false_positives: >
  System administrators, helpdesk staff, or domain admins may
  legitimately use Get-ADUser for AD audit, user troubleshooting, or
  reporting purposes. Review the parent process lineage (legitimate
  admin session vs. unexpected parent), user context (admin account
  vs. standard user vs. service account), and timing (scheduled audit
  window vs. unexpected hours) to distinguish authorized administrative
  activity from reconnaissance. Concurrent use of multiple AD
  discovery cmdlets (Get-ADUser, Get-ADGroup, Get-ADComputer,
  Get-ADDomain) on a single host within a short window should be
  treated as high-priority regardless of user context.

references:
  - https://attack.mitre.org/techniques/T1087/002/
  - https://www.blackhillsinfosec.com/red-blue-purple/
  - https://docs.microsoft.com/en-us/powershell/module/activedirectory/get-aduser
  - https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-347a

response:
  message: >
    PowerShell Get-ADUser enumeration with -filter parameter was
    identified on endpoint $agent_name$ by user
    $data_win_eventdata_user$. Process image: $data_win_eventdata_image$.
    Parent process: $data_win_eventdata_parentImage$. Command line:
    $data_win_eventdata_commandLine$. This is consistent with Active
    Directory user enumeration commonly preceding credential theft or
    lateral movement; investigate parent process lineage and concurrent
    AD discovery activity.
  risk_score: 40
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 30
    - field: data_win_eventdata_user
      type: user
      score: 30
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name
    - field: data_win_eventdata_parentImage
      type: parent_process_name
    - field: data_win_eventdata_commandLine
      type: command_line

tags:
  analytic_story:
    - Active Directory Discovery
    - CISA AA23-347A
    - Active Directory Reconnaissance
  asset_type: Endpoint
  mitre_attack_id:
    - T1087.002
  custom_tags:
    - powershell
    - get_aduser
    - active_directory
    - ad_enumeration
    - reconnaissance
    - domain_account_discovery
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"1" AND (data_win_eventdata_image:/.*[Cc][Mm][Dd]\.exe.*/ OR data_win_eventdata_image:/.*[Pp][Oo][Ww][Ee][Rr][Ss][Hh][Ee][Ll][Ll].*\.exe.*/ OR data_win_eventdata_image:/.*[Pp][Ww][Ss][Hh]\.exe.*/ OR data_win_eventdata_originalFileName:"Cmd.Exe" OR data_win_eventdata_originalFileName:"PowerShell.EXE" OR data_win_eventdata_originalFileName:"pwsh.dll") AND data_win_eventdata_commandLine:/.*[Gg][Ee][Tt]\-[Aa][Dd][Uu][Ss][Ee][Rr].*/ AND data_win_eventdata_commandLine:/.*\-[Ff][Ii][Ll][Tt][Ee][Rr].*/
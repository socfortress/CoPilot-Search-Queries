name: Windows Account Access Removal via Logoff Exec
id: Windows_Account_Access_Removal_via_Logoff_Exec
version: 1
schema_version: "1.0"
date: "2026-03-27"
author: SOCFortress LLC
status: production
type: Anomaly
description: >
  Detects execution of logoff.exe which is used to forcibly terminate user
  sessions. While logoff.exe is a legitimate Windows binary, its execution
  may indicate malicious activity such as crypto stealers or other malware
  attempting to remove user access or disrupt active sessions. The analytic
  identifies both direct execution and execution via scripting engines like
  PowerShell or cmd.exe.

data_source:
  - Sysmon EventID 1 (ProcessCreate)

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "1"
        - wildcard:
            data_win_eventdata_image: "*\\logoff.exe"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_image
    - data_win_eventdata_commandLine
    - data_win_eventdata_parentImage
    - data_win_eventdata_originalFileName
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-27 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-27 23:59:59.999"

how_to_implement: >
  Requires Wazuh agents with Sysmon installed and configured to log process
  creation events (EventID 1). VALIDATED — logoff.exe execution confirmed
  via Sysmon EventID 1 with 2 hits. Parent process was powershell.exe.

known_false_positives: >
  Administrators or power users may legitimately use logoff.exe to terminate
  user sessions. Review parent process and context to distinguish legitimate
  administrative use from malicious activity.

references:
  - https://attack.mitre.org/techniques/T1531/
  - https://attack.mitre.org/techniques/T1059/001/
  - https://devblogs.microsoft.com/scripting/automating-quser-through-powershell/

response:
  message: >
    logoff.exe executed on $agent_name$ by $data_win_eventdata_user$.
    Parent process: $data_win_eventdata_parentImage$.
    Command: $data_win_eventdata_commandLine$.
    MITRE ATT&CK: T1531, T1059.001
  risk_score: 36
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 36
    - field: data_win_eventdata_user
      type: user
      score: 36
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name
    - field: data_win_eventdata_parentImage
      type: parent_process_name

tags:
  analytic_story:
    - Crypto Stealer
    - Account Access Removal
  asset_type: Endpoint
  mitre_attack_id:
    - T1531
    - T1059.001
  custom_tags:
    - logoff
    - session_termination
    - account_access_removal
    - crypto_stealer
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"1" AND data_win_eventdata_image:/.*\\logoff\.exe/
name: Powershell Disable Security Monitoring
id: c148a894-dd93-11eb-bf2a-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-28"
author: SOCFortress LLC
status: production
type: TTP

description: >
  This analytic identifies attempts to disable Windows Defender
  real-time security monitoring through PowerShell invocations of
  Set-MpPreference. Sysmon EventID 1 is used to match process
  creation events where the Image path is anchored to
  \powershell.exe or \pwsh.exe (or the OriginalFileName field
  equals PowerShell.EXE / pwsh.dll, catching renamed binaries)
  AND the command line matches one of three high-fidelity
  defender-tampering patterns. Branch one: the command line
  contains Set-MpPreference together with one of twelve full
  disable-feature parameter names (DisableArchiveScanning,
  DisableBehaviorMonitoring, DisableBlockAtFirstSeen,
  DisableCatchupFullScan, DisableCatchupQuickScan,
  DisableIOAVProtection, DisableRealtimeMonitoring,
  DisableRemovableDriveScanning, DisableRestorePoint,
  DisableScanningMappedNetworkDrivesForFullScan,
  DisableScanningNetworkFiles, DisableScriptScanning) OR one of
  ten attacker-favored short-name aliases (drdsc, dsnf, drtm,
  dioavp, dscrptsc, dbaf, darchsc, dcfsc, dbm) used to evade
  basic string matchers, AND a truthy value ($true or 1) that
  enables the disabling. Branch two: the command line contains
  the PUAProtection parameter combined with the disable
  argument, switching off Potentially Unwanted Application
  protection. Branch three: the command line contains
  CloudBlockLevel combined with a falsy value ($false or 0),
  disabling Microsoft Defender's Cloud-delivered protection.
  Disabling Windows Defender real-time monitoring is the
  canonical defender-tampering step performed by ransomware,
  RATs, stealers, and droppers immediately after gaining
  execution but before deploying the destructive or
  data-harvest payload - turning off Defender ensures the
  follow-on file writes, network connections, and process
  spawns proceed without behavioral or signature-based
  interruption. This is a known T1562.001 (Impair Defenses:
  Disable or Modify Tools) technique observed in named threat
  activity including Ransomware playbooks, REvil Ransomware,
  BlankGrabber Stealer, and the CISA AA24-241A advisory. If
  confirmed malicious, this action could allow an attacker to
  operate undetected, execute payloads that would otherwise be
  blocked by Defender, exfiltrate data without alert, achieve
  prolonged persistence, and significantly increase blast
  radius - investigate the parent process, the user context
  (operations require admin and tamper protection bypass), the
  full command line, and any concurrent or follow-on file-write,
  process-spawn, and network-egress activity from the host.

data_source:
  - Sysmon EventID 1

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "1"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_image:
                    value: "*\\\\powershell.exe"
                    case_insensitive: true
              - wildcard:
                  data_win_eventdata_image:
                    value: "*\\\\pwsh.exe"
                    case_insensitive: true
              - term:
                  data_win_eventdata_originalFileName: "PowerShell.EXE"
              - term:
                  data_win_eventdata_originalFileName: "pwsh.dll"
            minimum_should_match: 1
        - bool:
            should:
              - bool:
                  must:
                    - wildcard:
                        data_win_eventdata_commandLine:
                          value: "*Set-MpPreference*"
                          case_insensitive: true
                    - bool:
                        should:
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "*DisableArchiveScanning*"
                                case_insensitive: true
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "*DisableBehaviorMonitoring*"
                                case_insensitive: true
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "*DisableBlockAtFirstSeen*"
                                case_insensitive: true
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "*DisableCatchupFullScan*"
                                case_insensitive: true
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "*DisableCatchupQuickScan*"
                                case_insensitive: true
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "*DisableIOAVProtection*"
                                case_insensitive: true
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "*DisableRealtimeMonitoring*"
                                case_insensitive: true
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "*DisableRemovableDriveScanning*"
                                case_insensitive: true
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "*DisableRestorePoint*"
                                case_insensitive: true
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "*DisableScanningMappedNetworkDrivesForFullScan*"
                                case_insensitive: true
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "*DisableScanningNetworkFiles*"
                                case_insensitive: true
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "*DisableScriptScanning*"
                                case_insensitive: true
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "*drdsc*"
                                case_insensitive: true
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "*dsnf *"
                                case_insensitive: true
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "*drtm *"
                                case_insensitive: true
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "*dioavp *"
                                case_insensitive: true
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "*dscrptsc *"
                                case_insensitive: true
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "*dbaf *"
                                case_insensitive: true
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "*darchsc *"
                                case_insensitive: true
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "*dcfsc *"
                                case_insensitive: true
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "*dbm *"
                                case_insensitive: true
                        minimum_should_match: 1
                    - bool:
                        should:
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "* $true*"
                                case_insensitive: true
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "* 1*"
                        minimum_should_match: 1
              - bool:
                  must:
                    - wildcard:
                        data_win_eventdata_commandLine:
                          value: "*PUAProtection*"
                          case_insensitive: true
                    - wildcard:
                        data_win_eventdata_commandLine:
                          value: "*disable*"
                          case_insensitive: true
              - bool:
                  must:
                    - wildcard:
                        data_win_eventdata_commandLine:
                          value: "*CloudBlockLevel*"
                          case_insensitive: true
                    - bool:
                        should:
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "* $false*"
                                case_insensitive: true
                          - wildcard:
                              data_win_eventdata_commandLine:
                                value: "* 0*"
                        minimum_should_match: 1
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_eventdata_image
    - data_win_eventdata_originalFileName
    - data_win_eventdata_commandLine
    - data_win_eventdata_parentImage
    - data_win_eventdata_parentCommandLine
    - data_win_eventdata_user
    - data_win_eventdata_processId
    - data_win_eventdata_processGuid
    - data_win_eventdata_parentProcessId
    - data_win_eventdata_parentProcessGuid
    - data_win_eventdata_hashes
    - data_win_eventdata_integrityLevel
    - data_win_eventdata_currentDirectory

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-28 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-28 23:59:59.999"

how_to_implement: >
  This detection requires Sysmon EventID 1 (Process Creation) logs to be
  forwarded from Windows endpoints to Wazuh Indexer. Ensure Sysmon is
  deployed with a configuration that captures Image, OriginalFileName,
  and CommandLine fields (SwiftOnSecurity or Olaf Hartong Sysmon modular
  config recommended). The detection matches both Windows PowerShell
  (powershell.exe) and PowerShell Core (pwsh.exe) by Image path with
  OriginalFileName fallbacks. Three logic branches are checked: the
  Set-MpPreference branch requires the cmdlet name plus one of 22
  parameter aliases (12 full names + 10 short-name aliases) plus a
  truthy value to confirm the parameter is being set to "disable";
  the PUAProtection branch requires the parameter name plus the
  disable argument; and the CloudBlockLevel branch requires the
  parameter name plus a falsy value. The short-name aliases (drdsc,
  dsnf, drtm, dioavp, dscrptsc, dbaf, darchsc, dcfsc, dbm) are
  PowerShell parameter prefix abbreviations attackers use to evade
  string matchers - a trailing space is required on each short-name
  pattern to prevent false-positive substring matches inside other
  words. All matching is case-insensitive in both Elasticsearch
  (case_insensitive: true on the wildcards) and Graylog (Lucene
  character classes). Note that AMSI may block the unobfuscated
  Set-MpPreference invocation, but real-world attackers use string
  concatenation, base64 encoding, or AMSI-bypass techniques to
  deliver the payload - the literal markers will still appear in
  the resulting process command line that Sysmon captures even if
  the script source is obfuscated.

known_false_positives: >
  Limited false positives are expected. However, tune based on
  legitimate administrative scripts that may perform Defender
  configuration changes - allow-list specific approved
  configuration management agents (SCCM, Intune, GPO scripts),
  documented administrative service accounts, scheduled-task
  contexts, or in-house security-hardening automation rather
  than removing the detection. Outside of explicitly authorized
  Defender configuration workflows, any match is a high-priority
  investigation.

references:
  - https://attack.mitre.org/techniques/T1562/001/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1562.001/T1562.001.md
  - https://learn.microsoft.com/en-us/powershell/module/defender/set-mppreference
  - https://www.cisa.gov/news-events/cybersecurity-advisories/aa24-241a

response:
  message: >
    Windows Defender real-time security monitoring tampering
    detected on endpoint $agent_name$ by user
    $data_win_eventdata_user$. Process image:
    $data_win_eventdata_image$. Parent process:
    $data_win_eventdata_parentImage$. Command line:
    $data_win_eventdata_commandLine$. Set-MpPreference
    invocations that disable real-time monitoring, behavior
    monitoring, IOAV protection, script scanning, PUA protection,
    or Cloud-delivered protection are the canonical
    defender-tampering step performed by ransomware, RATs,
    stealers (BlankGrabber), and dropper malware just before
    deploying their destructive or data-harvest payload.
    Investigate immediately, identify the parent process lineage
    (suspicious parents include Office, browsers, document
    readers, scripting hosts, and unsigned binaries), confirm
    whether the change matched a documented administrative
    workflow, hunt for follow-on file-write and process-spawn
    activity that may have been the reason Defender was disabled,
    re-enable Defender protection if the change is unauthorized,
    and isolate the host pending further analysis.
  risk_score: 50
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 50
    - field: data_win_eventdata_user
      type: user
      score: 50
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name
    - field: data_win_eventdata_parentImage
      type: parent_process_name
    - field: data_win_eventdata_commandLine
      type: command_line

tags:
  analytic_story:
    - Ransomware
    - Revil Ransomware
    - CISA AA24-241A
    - BlankGrabber Stealer
    - Defender Tampering
    - Pre-Encryption Activity
    - Compromised Windows Host
    - Malicious PowerShell
  asset_type: Endpoint
  mitre_attack_id:
    - T1562.001
  custom_tags:
    - powershell
    - defender_tampering
    - set_mppreference
    - disable_realtime_monitoring
    - disable_behavior_monitoring
    - pua_protection_disable
    - cloud_protection_disable
    - impair_defenses
    - ransomware_precursor
    - powershell_abuse
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"1" AND (data_win_eventdata_image:/.*\\\\[Pp][Oo][Ww][Ee][Rr][Ss][Hh][Ee][Ll][Ll]\.exe/ OR data_win_eventdata_image:/.*\\\\[Pp][Ww][Ss][Hh]\.exe/ OR data_win_eventdata_originalFileName:/[Pp][Oo][Ww][Ee][Rr][Ss][Hh][Ee][Ll][Ll]\.EXE/ OR data_win_eventdata_originalFileName:/[Pp][Ww][Ss][Hh]\.dll/) AND ((data_win_eventdata_commandLine:/.*[Ss][Ee][Tt]\-[Mm][Pp][Pp][Rr][Ee][Ff][Ee][Rr][Ee][Nn][Cc][Ee].*/ AND (data_win_eventdata_commandLine:/.*[Dd][Ii][Ss][Aa][Bb][Ll][Ee][Aa][Rr][Cc][Hh][Ii][Vv][Ee][Ss][Cc][Aa][Nn][Nn][Ii][Nn][Gg].*/ OR data_win_eventdata_commandLine:/.*[Dd][Ii][Ss][Aa][Bb][Ll][Ee][Bb][Ee][Hh][Aa][Vv][Ii][Oo][Rr][Mm][Oo][Nn][Ii][Tt][Oo][Rr][Ii][Nn][Gg].*/ OR data_win_eventdata_commandLine:/.*[Dd][Ii][Ss][Aa][Bb][Ll][Ee][Bb][Ll][Oo][Cc][Kk][Aa][Tt][Ff][Ii][Rr][Ss][Tt][Ss][Ee][Ee][Nn].*/ OR data_win_eventdata_commandLine:/.*[Dd][Ii][Ss][Aa][Bb][Ll][Ee][Cc][Aa][Tt][Cc][Hh][Uu][Pp][Ff][Uu][Ll][Ll][Ss][Cc][Aa][Nn].*/ OR data_win_eventdata_commandLine:/.*[Dd][Ii][Ss][Aa][Bb][Ll][Ee][Cc][Aa][Tt][Cc][Hh][Uu][Pp][Qq][Uu][Ii][Cc][Kk][Ss][Cc][Aa][Nn].*/ OR data_win_eventdata_commandLine:/.*[Dd][Ii][Ss][Aa][Bb][Ll][Ee][Ii][Oo][Aa][Vv][Pp][Rr][Oo][Tt][Ee][Cc][Tt][Ii][Oo][Nn].*/ OR data_win_eventdata_commandLine:/.*[Dd][Ii][Ss][Aa][Bb][Ll][Ee][Rr][Ee][Aa][Ll][Tt][Ii][Mm][Ee][Mm][Oo][Nn][Ii][Tt][Oo][Rr][Ii][Nn][Gg].*/ OR data_win_eventdata_commandLine:/.*[Dd][Ii][Ss][Aa][Bb][Ll][Ee][Rr][Ee][Mm][Oo][Vv][Aa][Bb][Ll][Ee][Dd][Rr][Ii][Vv][Ee][Ss][Cc][Aa][Nn][Nn][Ii][Nn][Gg].*/ OR data_win_eventdata_commandLine:/.*[Dd][Ii][Ss][Aa][Bb][Ll][Ee][Rr][Ee][Ss][Tt][Oo][Rr][Ee][Pp][Oo][Ii][Nn][Tt].*/ OR data_win_eventdata_commandLine:/.*[Dd][Ii][Ss][Aa][Bb][Ll][Ee][Ss][Cc][Aa][Nn][Nn][Ii][Nn][Gg][Mm][Aa][Pp][Pp][Ee][Dd][Nn][Ee][Tt][Ww][Oo][Rr][Kk][Dd][Rr][Ii][Vv][Ee][Ss][Ff][Oo][Rr][Ff][Uu][Ll][Ll][Ss][Cc][Aa][Nn].*/ OR data_win_eventdata_commandLine:/.*[Dd][Ii][Ss][Aa][Bb][Ll][Ee][Ss][Cc][Aa][Nn][Nn][Ii][Nn][Gg][Nn][Ee][Tt][Ww][Oo][Rr][Kk][Ff][Ii][Ll][Ee][Ss].*/ OR data_win_eventdata_commandLine:/.*[Dd][Ii][Ss][Aa][Bb][Ll][Ee][Ss][Cc][Rr][Ii][Pp][Tt][Ss][Cc][Aa][Nn][Nn][Ii][Nn][Gg].*/ OR data_win_eventdata_commandLine:/.*[Dd][Rr][Dd][Ss][Cc].*/ OR data_win_eventdata_commandLine:/.*[Dd][Ss][Nn][Ff] .*/ OR data_win_eventdata_commandLine:/.*[Dd][Rr][Tt][Mm] .*/ OR data_win_eventdata_commandLine:/.*[Dd][Ii][Oo][Aa][Vv][Pp] .*/ OR data_win_eventdata_commandLine:/.*[Dd][Ss][Cc][Rr][Pp][Tt][Ss][Cc] .*/ OR data_win_eventdata_commandLine:/.*[Dd][Bb][Aa][Ff] .*/ OR data_win_eventdata_commandLine:/.*[Dd][Aa][Rr][Cc][Hh][Ss][Cc] .*/ OR data_win_eventdata_commandLine:/.*[Dd][Cc][Ff][Ss][Cc] .*/ OR data_win_eventdata_commandLine:/.*[Dd][Bb][Mm] .*/) AND (data_win_eventdata_commandLine:/.* \$[Tt][Rr][Uu][Ee].*/ OR data_win_eventdata_commandLine:/.* 1.*/)) OR (data_win_eventdata_commandLine:/.*[Pp][Uu][Aa][Pp][Rr][Oo][Tt][Ee][Cc][Tt][Ii][Oo][Nn].*/ AND data_win_eventdata_commandLine:/.*[Dd][Ii][Ss][Aa][Bb][Ll][Ee].*/) OR (data_win_eventdata_commandLine:/.*[Cc][Ll][Oo][Uu][Dd][Bb][Ll][Oo][Cc][Kk][Ll][Ee][Vv][Ee][Ll].*/ AND (data_win_eventdata_commandLine:/.* \$[Ff][Aa][Ll][Ss][Ee].*/ OR data_win_eventdata_commandLine:/.* 0.*/)))
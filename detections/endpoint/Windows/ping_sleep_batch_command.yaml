  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"1" AND ((data_win_eventdata_parentCommandLine:/.*[Pp][Ii][Nn][Gg].*/ AND data_win_eventdata_parentCommandLine:/.*\-[Nn].*/ AND (data_win_eventdata_parentCommandLine:/.*\& .*/ OR data_win_eventdata_parentCommandLine:/.*\&[Aa][Mm][Pp]\;.*/ OR data_win_eventdata_parentCommandLine:/.*\&[Cc]\:.*/ OR data_win_eventdata_parentCommandLine:/.*\&[Gg][Tt]\;.*/ OR data_win_eventdata_parentCommandLine:/.*\>.*/)) OR ((data_win_eventdata_image:/.*\\\\[Pp][Ii][Nn][Gg]\.exe/ OR data_win_eventdata_originalFileName:/[Pp][Ii][Nn][Gg]\.exe/) AND data_win_eventdata_commandLine:/.*\-[Nn].*/ AND (data_win_eventdata_commandLine:/.*\& .*/ OR data_win_eventdata_commandLine:/.*\&[Aa][Mm][Pp]\;.*/ OR data_win_eventdata_commandLine:/.*\&[Cc]\:.*/ OR data_win_eventdata_commandLine:/.*\&[Gg][Tt]\;.*/ OR data_win_eventdata_commandLine:/.*\>.*/)))
name: Get-DomainTrust with PowerShell
id: 4fa7f846-054a-11ec-a836-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-27"
author: SOCFortress LLC
status: production
type: TTP

description: >
  This analytic identifies the execution of the Get-DomainTrust function
  from PowerSploit/PowerView. Sysmon EventID 1 is used to match process
  creation events whose command line contains "get-domaintrust"
  (case-insensitive). Get-DomainTrust is a PowerView/PowerSploit function
  used to enumerate Active Directory domain trust relationships,
  identifying trust types (parent-child, external, forest), trust
  direction (inbound, outbound, bidirectional), and trust attributes
  (transitive, quarantined). This is distinct from Microsoft's
  Get-ADTrust cmdlet and is a hallmark of offensive AD reconnaissance
  toolkits. The detection is process-agnostic, matching anywhere the
  function name appears in a command line. This activity is significant
  as it indicates potential reconnaissance efforts by an adversary to
  understand domain trust relationships, which directly informs lateral
  movement strategies including cross-domain attacks (trust ticket
  forgery, SID history abuse, cross-forest exploitation). If confirmed
  malicious, this could allow attackers to map out the network, identify
  trusted domains as additional attack targets, and plan further
  attacks potentially compromising additional systems and forests.

data_source:
  - Sysmon EventID 1

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "1"
        - wildcard:
            data_win_eventdata_commandLine:
              value: "*get-domaintrust*"
              case_insensitive: true
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_eventdata_image
    - data_win_eventdata_originalFileName
    - data_win_eventdata_commandLine
    - data_win_eventdata_parentImage
    - data_win_eventdata_parentCommandLine
    - data_win_eventdata_user
    - data_win_eventdata_processId
    - data_win_eventdata_processGuid
    - data_win_eventdata_parentProcessId
    - data_win_eventdata_parentProcessGuid
    - data_win_eventdata_hashes
    - data_win_eventdata_integrityLevel
    - data_win_eventdata_currentDirectory

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-27 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-27 23:59:59.999"

how_to_implement: >
  This detection requires Sysmon EventID 1 (Process Creation) logs to be forwarded
  from Windows endpoints to Wazuh Indexer. Ensure Sysmon is deployed with a
  configuration that captures Image, OriginalFileName, and CommandLine fields
  (SwiftOnSecurity or Olaf Hartong Sysmon modular config recommended). The
  detection is process-agnostic - any process with "get-domaintrust" in its
  command line will match. Case-insensitive matching is used on the function
  name to handle PowerShell's flexible casing. The ES DSL uses
  case_insensitive wildcard option (OpenSearch 2.x / Elasticsearch 7.10+);
  Graylog equivalent uses character classes. For deeper coverage, also
  enable PowerShell Script Block Logging (EventID 4104) and correlate
  against the same function name in script blocks - script block logging
  will catch in-memory PowerSploit imports that don't appear on the command
  line.

known_false_positives: >
  Limited false positives expected. Get-DomainTrust is a
  PowerSploit/PowerView offensive function, not a built-in Microsoft
  cmdlet, so legitimate administrative use is rare. Penetration
  testers, Red Teamers, and authorized internal security assessors may
  produce true-positive alerts that are not malicious - these should
  be tuned via approved-source allow-listing (specific parent process
  or user account) rather than removing the detection.

references:
  - https://attack.mitre.org/techniques/T1482/
  - https://blog.harmj0y.net/redteaming/a-guide-to-attacking-domain-trusts/
  - https://powersploit.readthedocs.io/en/latest/Recon/Get-DomainTrust/

response:
  message: >
    Suspicious PowerSploit Get-DomainTrust execution was identified on
    endpoint $agent_name$ by user $data_win_eventdata_user$. Process
    image: $data_win_eventdata_image$. Parent process:
    $data_win_eventdata_parentImage$. Command line:
    $data_win_eventdata_commandLine$. This is a high-confidence
    indicator of offensive AD trust enumeration commonly preceding
    cross-domain lateral movement; investigate immediately, review
    parent process lineage, in-memory PowerShell module loads, and
    concurrent discovery activity.
  risk_score: 72
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 60
    - field: data_win_eventdata_user
      type: user
      score: 60
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name
    - field: data_win_eventdata_parentImage
      type: parent_process_name
    - field: data_win_eventdata_commandLine
      type: command_line

tags:
  analytic_story:
    - Active Directory Discovery
    - Active Directory Reconnaissance
    - Domain Trust Discovery
    - PowerSploit
    - PowerView
    - Offensive PowerShell Toolkit
  asset_type: Endpoint
  mitre_attack_id:
    - T1482
  custom_tags:
    - powershell
    - powersploit
    - powerview
    - get_domaintrust
    - domain_trust_discovery
    - active_directory
    - reconnaissance
    - cross_domain_attack
    - offensive_toolkit
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"1" AND data_win_eventdata_commandLine:/.*[Gg][Ee][Tt]\-[Dd][Oo][Mm][Aa][Ii][Nn][Tt][Rr][Uu][Ss][Tt].*/
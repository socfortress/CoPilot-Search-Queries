name: Windows BitLockerToGo with Network Activity
id: 14e3a089-cc23-4f4d-a770-26e44a31fbac
version: 6
schema_version: 1
date: '2025-10-14'
author: SOCFortress LLC
status: production
type: Hunting
description: >
  Detects BitLockerToGo.exe making DNS queries, indicating potential abuse by
  Lumma stealer malware. Lumma leverages this legitimate Windows utility to
  manipulate registry keys, harvest cryptocurrency wallets, steal browser
  credentials, and exfiltrate sensitive data via network activity. DNS queries
  originating from BitLockerToGo.exe are highly anomalous and not expected in
  normal operations. Associated with Lumma Stealer and Hellcat Ransomware campaigns.
  MITRE ATT&CK: T1218 (System Binary Proxy Execution).

data_source:
  - Sysmon EventID 22 (DNSEvent)

search:
  query:
    bool:
      must:
        - term:
            agent_name: "AGENT_NAME"
        - term:
            agent_labels_customer: "CUSTOMER_CODE"
        - term:
            data_win_system_eventID: "22"
        - wildcard:
            data_win_eventdata_image: "*\\bitlockertogo.exe"
        - range:
            timestamp:
              gte: "START_TIME"
              lte: "END_TIME"

parameters:
  - name: AGENT_NAME
    default: "DESKTOP-AM0HLGE"
  - name: CUSTOMER_CODE
    default: "lab"
  - name: START_TIME
    default: "now-24h"
  - name: END_TIME
    default: "now"

how_to_implement: >
  Requires Sysmon EventID 22 (DNSEvent) flowing to the Wazuh Indexer.
  EventID 22 confirmed flowing on DESKTOP-AM0HLGE with 51 events/hour.
  Confirmed field names: data_win_eventdata_image (querying process),
  data_win_eventdata_queryName (DNS query). Field-validated — BitLockerToGo.exe
  binary not present on lab endpoint, simulation not possible. Binary is only
  available on Windows editions with BitLocker To Go feature enabled.

known_false_positives: >
  Legitimate DNS queries from BitLockerToGo.exe are extremely rare. In
  environments where the binary is not present or not used for removable
  drive management, any hit should be treated as high priority. If confirmed
  legitimate, filter on data_win_eventdata_queryName for known internal domains.

references:
  - https://any.run/report/5e9ba24639f70787e56f10a241271ae819ef9c573edb22b9eeade7cb40a2df2a/66f16c7b-2cfc-40c5-91cc-f1cbe9743fa3
  - https://securelist.com/fake-captcha-delivers-lumma-amadey/114312/
  - https://attack.mitre.org/techniques/T1218/

response:
  message: >
    BitLockerToGo.exe made a DNS query on $agent_name$.
    DNS query: $data_win_eventdata_queryName$.
    Process: $data_win_eventdata_image$.
    Possible Lumma stealer abuse for C2 communication or data exfiltration.
    MITRE ATT&CK: T1218
  risk_score: 50
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 50
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name
    - field: data_win_eventdata_queryName
      type: dns_query

tags:
  analytic_story:
    - Lumma Stealer
    - Hellcat Ransomware
    - Living Off The Land
  asset_type: Endpoint
  mitre_attack_id:
    - T1218
  custom_tags:
    - bitlockertogo
    - lumma_stealer
    - dns
    - network_activity
    - infostealer
    - lolbas
  product:
    - Wazuh
  security_domain: endpoint
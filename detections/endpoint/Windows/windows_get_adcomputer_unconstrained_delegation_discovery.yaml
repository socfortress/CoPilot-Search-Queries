name: Windows Get-AdComputer Unconstrained Delegation Discovery
id: c8640777-469f-4638-ab44-c34a3233ffac
version: 1
schema_version: "1.0"
date: "2026-03-30"
author: SOCFortress LLC
status: production
type: TTP
description: >
  Detects use of the Get-ADComputer cmdlet with TrustedForDelegation parameter
  to identify Windows endpoints with Kerberos Unconstrained Delegation enabled.
  Unconstrained delegation allows a service to impersonate any user that
  authenticates to it, making these systems high-value targets for privilege
  escalation and lateral movement. Adversaries enumerate these systems to
  identify attack paths for domain compromise. Used by Medusa Ransomware and
  other threat actors.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Get-ADComputer*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*TrustedForDelegation*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_path
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-30 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-30 23:59:59.999"

how_to_implement: >
  Requires PowerShell Script Block Logging enabled on endpoints.
  Enable via Group Policy: Computer Configuration → Administrative Templates
  → Windows Components → Windows PowerShell → Turn on PowerShell Script Block
  Logging.

known_false_positives: >
  Administrators or power users may leverage Get-ADComputer with TrustedForDelegation
  for legitimate system management or security auditing. Review the user context
  and frequency to determine if the activity is authorized.

references:
  - https://attack.mitre.org/techniques/T1018/
  - https://adsecurity.org/?p=1667
  - https://docs.microsoft.com/en-us/defender-for-identity/cas-isp-unconstrained-kerberos
  - https://www.ired.team/offensive-security-experiments/active-directory-kerberos-abuse/domain-compromise-via-unrestricted-kerberos-delegation

response:
  message: >
    Get-ADComputer TrustedForDelegation Kerberos unconstrained delegation
    discovery detected on $agent_name$ by $data_win_eventdata_user$.
    Script: $data_win_eventdata_scriptBlockText$.
    MITRE ATT&CK: T1018
  risk_score: 35
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 35
    - field: data_win_eventdata_user
      type: user
      score: 35
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: script_block

tags:
  analytic_story:
    - Medusa Ransomware
    - Active Directory Kerberos Attacks
  asset_type: Endpoint
  mitre_attack_id:
    - T1018
  custom_tags:
    - get_adcomputer
    - kerberos_delegation
    - unconstrained_delegation
    - active_directory
    - privilege_escalation
    - reconnaissance
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Get-ADComputer.*/ AND data_win_eventdata_scriptBlockText:/.*TrustedForDelegation.*/
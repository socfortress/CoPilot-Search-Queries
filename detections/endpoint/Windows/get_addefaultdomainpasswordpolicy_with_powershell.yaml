name: Get ADDefaultDomainPasswordPolicy with Powershell
id: 36e46ebe-065a-11ec-b4c7-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-27"
author: SOCFortress LLC
status: production
type: Hunting

description: >
  This analytic detects the execution of powershell.exe, pwsh.exe, or
  cmd.exe with the Get-ADDefaultDomainPasswordPolicy cmdlet referenced
  in the command line. Sysmon EventID 1 is used to match process
  creation events where the image or OriginalFileName is one of the
  PowerShell or Command Prompt binaries AND the command line contains
  Get-ADDefaultDomainPasswordPolicy. This cmdlet is part of the
  ActiveDirectory PowerShell module and is used to retrieve the default
  domain password policy in a Windows domain (minimum password length,
  complexity requirements, lockout thresholds, history settings).
  Monitoring this activity is significant because it is commonly used
  by adversaries during the discovery phase to gather information about
  domain security policies for situational awareness and to plan
  password-based attacks (password spraying, brute force) against
  high-value accounts. This is a known T1201 (Password Policy Discovery)
  technique and appears in many AD-focused intrusion playbooks. If
  confirmed malicious, this activity could lead to further
  reconnaissance, calibrated password attacks tuned to the policy, and
  potential exploitation of weak domain security settings.

data_source:
  - Sysmon EventID 1

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "1"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_image: "*powershell.exe"
              - wildcard:
                  data_win_eventdata_image: "*pwsh.exe"
              - wildcard:
                  data_win_eventdata_image: "*cmd.exe"
              - term:
                  data_win_eventdata_originalFileName: "PowerShell.EXE"
              - term:
                  data_win_eventdata_originalFileName: "pwsh.dll"
              - term:
                  data_win_eventdata_originalFileName: "Cmd.Exe"
            minimum_should_match: 1
        - wildcard:
            data_win_eventdata_commandLine:
              value: "*Get-ADDefaultDomainPasswordPolicy*"
              case_insensitive: true
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_eventdata_image
    - data_win_eventdata_originalFileName
    - data_win_eventdata_commandLine
    - data_win_eventdata_parentImage
    - data_win_eventdata_parentCommandLine
    - data_win_eventdata_user
    - data_win_eventdata_processId
    - data_win_eventdata_processGuid
    - data_win_eventdata_parentProcessId
    - data_win_eventdata_parentProcessGuid
    - data_win_eventdata_hashes
    - data_win_eventdata_integrityLevel
    - data_win_eventdata_currentDirectory

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-27 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-27 23:59:59.999"

how_to_implement: >
  This detection requires Sysmon EventID 1 (Process Creation) logs to be forwarded
  from Windows endpoints to Wazuh Indexer. Ensure Sysmon is deployed with a
  configuration that captures Image, OriginalFileName, and CommandLine fields
  (SwiftOnSecurity or Olaf Hartong Sysmon modular config recommended). The
  detection matches Windows shells (PowerShell or Command Prompt) by Image
  path or PE OriginalFileName, combined with the
  Get-ADDefaultDomainPasswordPolicy cmdlet name in the command line.
  Case-insensitive matching is used on the cmdlet name (PowerShell cmdlets
  can be invoked with any casing). The ES DSL uses case_insensitive
  wildcard option (OpenSearch 2.x / Elasticsearch 7.10+); Graylog
  equivalent uses character classes. For deeper coverage, also enable
  PowerShell Script Block Logging (EventID 4104) and correlate against
  the same cmdlet name in script blocks.

known_false_positives: >
  System administrators, helpdesk staff, or domain admins may
  legitimately use Get-ADDefaultDomainPasswordPolicy for AD audit,
  compliance reporting, or password policy troubleshooting. Review the
  parent process lineage (legitimate admin session vs. unexpected
  parent), user context (admin account vs. standard user vs. service
  account), and timing (scheduled audit window vs. unexpected hours)
  to distinguish authorized administrative activity from
  reconnaissance. Concurrent use of multiple AD discovery cmdlets
  (Get-ADUser, Get-ADGroup, Get-ADDomain) on a single host within a
  short window should be treated as high-priority regardless of user
  context.

references:
  - https://attack.mitre.org/techniques/T1201/
  - https://github.com/S1ckB0y1337/Active-Directory-Exploitation-Cheat-Sheet
  - https://docs.microsoft.com/en-us/powershell/module/activedirectory/get-addefaultdomainpasswordpolicy

response:
  message: >
    PowerShell Get-ADDefaultDomainPasswordPolicy reconnaissance was
    identified on endpoint $agent_name$ by user
    $data_win_eventdata_user$. Process image: $data_win_eventdata_image$.
    Parent process: $data_win_eventdata_parentImage$. Command line:
    $data_win_eventdata_commandLine$. This is consistent with Active
    Directory password policy discovery commonly preceding password
    spraying or brute-force attacks; investigate parent process lineage
    and concurrent discovery activity.
  risk_score: 40
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 30
    - field: data_win_eventdata_user
      type: user
      score: 30
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name
    - field: data_win_eventdata_parentImage
      type: parent_process_name
    - field: data_win_eventdata_commandLine
      type: command_line

tags:
  analytic_story:
    - Active Directory Discovery
    - Active Directory Reconnaissance
    - Password Policy Discovery
  asset_type: Endpoint
  mitre_attack_id:
    - T1201
  custom_tags:
    - powershell
    - active_directory
    - password_policy_discovery
    - ad_enumeration
    - reconnaissance
    - password_spraying_precursor
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"1" AND (data_win_eventdata_image:/.*[Pp][Oo][Ww][Ee][Rr][Ss][Hh][Ee][Ll][Ll]\.exe.*/ OR data_win_eventdata_image:/.*[Pp][Ww][Ss][Hh]\.exe.*/ OR data_win_eventdata_image:/.*[Cc][Mm][Dd]\.exe.*/ OR data_win_eventdata_originalFileName:"PowerShell.EXE" OR data_win_eventdata_originalFileName:"pwsh.dll" OR data_win_eventdata_originalFileName:"Cmd.Exe") AND data_win_eventdata_commandLine:/.*[Gg][Ee][Tt]\-[Aa][Dd][Dd][Ee][Ff][Aa][Uu][Ll][Tt][Dd][Oo][Mm][Aa][Ii][Nn][Pp][Aa][Ss][Ss][Ww][Oo][Rr][Dd][Pp][Oo][Ll][Ii][Cc][Yy].*/
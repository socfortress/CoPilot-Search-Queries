name: Windows Binary Proxy Execution Mavinject DLL Injection
id: Windows-Binary-Proxy-Execution-Mavinject-DLL-Injection
version: 9
schema_version: 1
date: '2025-05-02'
author: SOCFortress LLC
status: production
type: TTP
description: >
  Detects the execution of mavinject.exe with DLL injection arguments such as
  /INJECTRUNNING or /HMODULE. Mavinject.exe is a signed Microsoft binary (LOLBAS)
  that can inject arbitrary DLLs into running processes, making it a common tool
  for malware deployment, defense evasion, and persistence. Abused by threat actors
  to execute unsigned code under the cover of a trusted Windows binary.
  MITRE ATT&CK: T1218.013 (System Binary Proxy Execution: Mavinject).

data_source:
  - Sysmon EventID 1 (ProcessCreate)

search:
  query:
    bool:
      must:
        - term:
            agent_name: "AGENT_NAME"
        - term:
            agent_labels_customer: "CUSTOMER_CODE"
        - term:
            data_win_system_eventID: "1"
        - wildcard:
            data_win_eventdata_image: "*\\mavinject.exe"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_commandLine: "*injectrunning*"
              - wildcard:
                  data_win_eventdata_commandLine: "*hmodule=0x*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "START_TIME"
              lte: "END_TIME"

parameters:
  - name: AGENT_NAME
    default: "DESKTOP-AM0HLGE"
  - name: CUSTOMER_CODE
    default: "lab"
  - name: START_TIME
    default: "now-24h"
  - name: END_TIME
    default: "now"

how_to_implement: >
  Requires Sysmon EventID 1 (ProcessCreate) flowing to the Wazuh Indexer.
  Validated on DESKTOP-AM0HLGE with mavinject.exe called with /INJECTRUNNING
  from PowerShell. Confirmed field names: data_win_eventdata_image,
  data_win_eventdata_commandLine, data_win_eventdata_parentImage,
  data_win_eventdata_user.

known_false_positives: >
  Legitimate use of mavinject.exe is rare outside of specific Microsoft tooling
  scenarios. Filter on data_win_eventdata_parentImage or DLL path if noise is
  observed. Any use with /INJECTRUNNING or /HMODULE pointing to non-system DLL
  paths should be treated as high priority.

references:
  - https://attack.mitre.org/techniques/T1218/013/
  - https://posts.specterops.io/mavinject-exe-functionality-deconstructed-c29ab2cf5c0e
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1218/T1218.md#atomic-test-1---mavinject---inject-dll-into-running-process

response:
  message: >
    mavinject.exe executed with DLL injection arguments on $agent_name$.
    Command line: $data_win_eventdata_commandLine$.
    Parent process: $data_win_eventdata_parentImage$.
    User: $data_win_eventdata_user$.
    Possible DLL injection into a running process. MITRE ATT&CK: T1218.013
  risk_score: 49
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 49
    - field: data_win_eventdata_user
      type: user
      score: 49
  threat_objects:
    - field: data_win_eventdata_image
      type: process_name

tags:
  analytic_story:
    - Living Off The Land
    - Defense Evasion
    - Process Injection
  asset_type: Endpoint
  mitre_attack_id:
    - T1218.013
  custom_tags:
    - mavinject
    - dll_injection
    - lolbas
    - process_injection
  product:
    - Wazuh
  security_domain: endpoint
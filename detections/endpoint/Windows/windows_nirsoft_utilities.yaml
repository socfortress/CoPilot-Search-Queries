name: Windows NirSoft Utilities
id: Windows-NirSoft-Utilities
version: 9
schema_version: 1
date: '2025-12-13'
author: SOCFortress LLC
status: production
type: Hunting
description: >
  Detects execution of commonly abused NirSoft utilities on Windows systems.
  While legitimate tools, NirSoft utilities are frequently abused by adversaries
  for credential theft, password dumping, system reconnaissance, and data
  exfiltration. Associated with WhisperGate destructive malware and CISA TA18-201A.
  MITRE ATT&CK: T1588.002 (Obtain Capabilities: Tool).

data_source:
  - Sysmon EventID 1 (ProcessCreate)

search:
  query:
    bool:
      must:
        - term:
            agent_name: "AGENT_NAME"
        - term:
            agent_labels_customer: "CUSTOMER_CODE"
        - term:
            data_win_system_eventID: "1"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_image: "*\\advancedrun.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\browserpasview.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\credentialsfileview.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\dialupass.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\iepv.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\mailpv.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\messengpass.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\netpass.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\networkpasswordrecovery.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\nirsoft.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\outlook passview.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\passwordfox.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\pspv.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\rdpv.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\routerpassview.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\sniffpass.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\vpnpass.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\webbrowserpassview.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\wirelesskeyview.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\wnetwatcher.exe"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "START_TIME"
              lte: "END_TIME"

parameters:
  - name: AGENT_NAME
    default: "DESKTOP-AM0HLGE"
  - name: CUSTOMER_CODE
    default: "lab"
  - name: START_TIME
    default: "now-24h"
  - name: END_TIME
    default: "now"

how_to_implement: >
  Requires Sysmon EventID 1 (ProcessCreate) flowing to the Wazuh Indexer.
  Field data_win_eventdata_image is confirmed working across all EventID 1
  detections in this environment. Field-validated based on established EventID 1
  detection patterns. Note: The original Splunk detection uses a lookup table
  (is_nirsoft_software) containing the full NirSoft binary list. This detection
  hardcodes the most commonly abused utilities. Expand the should clause with
  additional NirSoft binaries from http://www.nirsoft.net/ as needed.

known_false_positives: >
  False positives may be present in environments where NirSoft utilities are
  used legitimately by administrators. Filter by known approved paths or users
  as needed.

references:
  - https://www.cisa.gov/uscert/ncas/alerts/TA18-201A
  - http://www.nirsoft.net/
  - https://www.microsoft.com/security/blog/2022/01/15/destructive-malware-targeting-ukrainian-organizations/
  - https://attack.mitre.org/techniques/T1588/002/

response:
  message: >
    NirSoft utility execution detected on $agent_name$ by $data_win_eventdata_user$.
    Binary: $data_win_eventdata_image$.
    Parent: $data_win_eventdata_parentImage$.
    Command: $data_win_eventdata_commandLine$.
    MITRE ATT&CK: T1588.002
  risk_score: 40
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 40
    - field: data_win_eventdata_user
      type: user
      score: 40
  threat_objects:
    - field: data_win_eventdata_parentImage
      type: parent_process_name
    - field: data_win_eventdata_image
      type: process_name

tags:
  analytic_story:
    - Data Destruction
    - WhisperGate
  asset_type: Endpoint
  mitre_attack_id:
    - T1588.002
  custom_tags:
    - nirsoft
    - credential_theft
    - password_dumping
    - reconnaissance
    - tool_abuse
  product:
    - Wazuh
  security_domain: endpoint
name: Windows Credentials Access Via Vaultcli Module
id: windows-credentials-access-vaultcli-module-001
version: 1
schema_version: "1.0"
date: "2026-02-23"
author: SOCFortress LLC
status: production
type: TTP

description: >
  Detects processes loading vaultcli.dll from suspicious locations such as
  Temp, Public, PerfLogs, or Windows fonts directories. Adversaries abuse the
  Windows Vault credential API by loading vaultcli.dll from non-standard paths
  to access stored credentials, including Windows credentials stored in the
  Credential Manager.

data_source:
  - Sysmon EventID 7

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "7"
        - wildcard:
            data_win_eventdata_imageLoaded: "*\\\\vaultcli.dll"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_image: "*\\\\Temp\\\\*"
              - wildcard:
                  data_win_eventdata_image: "*\\\\Public\\\\*"
              - wildcard:
                  data_win_eventdata_image: "*\\\\PerfLogs\\\\*"
              - wildcard:
                  data_win_eventdata_image: "*\\\\windows\\\\temp\\\\*"
              - wildcard:
                  data_win_eventdata_image: "*\\\\windows\\\\fonts\\\\*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_imageLoaded
    - data_win_eventdata_image
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-02-23 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-02-23 23:59:59.999"

how_to_implement: >
  This detection requires Wazuh agents deployed on Windows endpoints with Sysmon
  installed and configured to log image load events (EventID 7). Ensure the
  Sysmon configuration includes monitoring of DLL loads for vaultcli.dll.

known_false_positives: >
  Legitimate software loaded from standard system paths will not trigger this
  detection. Loading vaultcli.dll from user-writable directories is highly
  suspicious.

references:
  - https://attack.mitre.org/techniques/T1555/004/

response:
  message: >
    vaultcli.dll loaded from suspicious path on $agent_name$.
    Image: $data_win_eventdata_image$.
    DLL: $data_win_eventdata_imageLoaded$.
    User: $data_win_eventdata_user$. MITRE ATT&CK: T1555.004
  risk_score: 72
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 72
  threat_objects: []

tags:
  analytic_story:
    - Windows Credential Access
    - Compromised Windows Host
  asset_type: Endpoint
  mitre_attack_id:
    - T1555.004
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"7" AND data_win_eventdata_imageLoaded:/.*vaultcli\.dll/ AND (data_win_eventdata_image:/.*Temp.*/ OR data_win_eventdata_image:/.*Public.*/ OR data_win_eventdata_image:/.*PerfLogs.*/ OR data_win_eventdata_image:/.*windows.*temp.*/ OR data_win_eventdata_image:/.*windows.*fonts.*/)

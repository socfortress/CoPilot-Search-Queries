name: Windows PowerShell Executed with Truncated Parameters
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
version: 1
schema_version: 1
date: '2026-03-16'
author: SOCFortress LLC
status: production
type: TTP
description: >
  Detects PowerShell execution with truncated/abbreviated parameter flags commonly
  used by attackers to evade string-based detections. PowerShell allows parameters
  to be abbreviated to their shortest unambiguous form — attackers exploit this to
  shorten -EncodedCommand to -enc or -e, -NoProfile to -nop, -WindowStyle to -w,
  -NonInteractive to -noni, and -ExecutionPolicy to -ep or -ex. Any combination of
  these truncated flags is a strong indicator of malicious or obfuscated PowerShell
  execution. VALIDATED against DESKTOP-AM0HLGE — confirmed parentImage cmd.exe
  spawning powershell.exe with -w hidden -nop -noni -ep Bypass -enc flags.
  MITRE ATT&CK: T1059.001 (PowerShell), T1027 (Obfuscated Files or Information).

data_source:
  - Sysmon EventID 1

search:
  query:
    bool:
      must:
        - term:
            agent_name: "AGENT_NAME"
        - term:
            agent_labels_customer: "CUSTOMER_CODE"
        - term:
            data_win_system_eventID: "1"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_image: "*\\powershell.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\pwsh.exe"
            minimum_should_match: 1
        - bool:
            should:
              # Group 1 - EncodedCommand truncations
              - wildcard:
                  data_win_eventdata_commandLine: "* -e *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -ec *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -en *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -enc *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -enco *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -encod *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -encode *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -encoded *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -encodedc *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -encodedco *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -encodedcom *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -encodedcomm *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -encodedcomma *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -encodedcomman *"
              # Group 2 - NoProfile truncations
              - wildcard:
                  data_win_eventdata_commandLine: "* -nop *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -nopr *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -nopro *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -noprof *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -noprofi *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -noprofil *"
              # Group 3 - WindowStyle truncations
              - wildcard:
                  data_win_eventdata_commandLine: "* -w *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -wi *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -win *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -wind *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -windo *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -window *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -windows *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -windowst *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -windowsty *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -windowstyl *"
              # Group 4 - NonInteractive truncations
              - wildcard:
                  data_win_eventdata_commandLine: "* -non *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -noni *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -nonin *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -nonint *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -noninte *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -noninter *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -nonintera *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -noninterac *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -noninteract *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -noninteracti *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -noninteractiv *"
              # Group 5 - ExecutionPolicy truncations
              - wildcard:
                  data_win_eventdata_commandLine: "* -ep *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -ex *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -exe *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -exec *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -execu *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -execut *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -executi *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -executio *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -execution *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -executionp *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -executionpo *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -executionpol *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -executionpoli *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -executionpolic *"
            minimum_should_match: 2
        - range:
            timestamp:
              gte: "START_TIME"
              lte: "END_TIME"
      must_not:
        # Known legitimate parent processes (RMM tools, security agents)
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_parentImage: "*\\ltsvc*"
              - wildcard:
                  data_win_eventdata_parentImage: "*amazon ssm*"
              - wildcard:
                  data_win_eventdata_parentImage: "*lenovo*"
              - wildcard:
                  data_win_eventdata_parentImage: "*vmware*"
              - wildcard:
                  data_win_eventdata_parentImage: "*rocketagent*"
              - wildcard:
                  data_win_eventdata_parentImage: "*prtg*"
              - wildcard:
                  data_win_eventdata_parentImage: "*imagemanager*"
              - wildcard:
                  data_win_eventdata_parentImage: "*silverlake*"
              - wildcard:
                  data_win_eventdata_parentImage: "*MaaS360*"
              - wildcard:
                  data_win_eventdata_parentImage: "*cybercnsagentv2*"
              - wildcard:
                  data_win_eventdata_parentImage: "*jumpcloud-agent.exe*"
              - wildcard:
                  data_win_eventdata_parentImage: "*qualysagent*"
              - wildcard:
                  data_win_eventdata_parentImage: "*intune*"
              - wildcard:
                  data_win_eventdata_parentImage: "*SenseIR.exe*"
              - wildcard:
                  data_win_eventdata_parentImage: "*n-able*"
              - wildcard:
                  data_win_eventdata_parentImage: "*cybercnsagent.exe*"
              - wildcard:
                  data_win_eventdata_parentImage: "*liongardinc*"
            minimum_should_match: 1
        # Known legitimate command line strings
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_commandLine: "*ltsvc*"
              - wildcard:
                  data_win_eventdata_commandLine: "*lastpass*"
              - wildcard:
                  data_win_eventdata_commandLine: "*prtg*"
              - wildcard:
                  data_win_eventdata_commandLine: "*pnputil*"
              - wildcard:
                  data_win_eventdata_commandLine: "*chocolateyinstall*"
              - wildcard:
                  data_win_eventdata_commandLine: "*umbrella*"
              - wildcard:
                  data_win_eventdata_commandLine: "*CronitorDCPLoginTest.ps1*"
              - wildcard:
                  data_win_eventdata_commandLine: "*perchCheck.ps1*"
              - wildcard:
                  data_win_eventdata_commandLine: "*ninjarmmagent*"
              - wildcard:
                  data_win_eventdata_commandLine: "*microsoftedgeautolaunch*"
              # Known RMM tool base64 signatures
              - wildcard:
                  data_win_eventdata_commandLine: "*JABmAGkAbABlACAAPQA*"
              - wildcard:
                  data_win_eventdata_commandLine: "*RgB1AG4AYwB0AGkAbwBuACAAVwByAGkAdABlAC0AQwB1AHMAdABvAG0ARQB2AGUAbgB0AEwAbwBnAC*"
              - wildcard:
                  data_win_eventdata_commandLine: "*WwBTAHkAcwB0AGUAbQAuAFQAZQB4AHQALgBFAG4AYwBvAGQAaQBuAGcAXQA*"
              - wildcard:
                  data_win_eventdata_commandLine: "*xIdW50cmVzc0FnZW50LmxvZy*"
              - wildcard:
                  data_win_eventdata_commandLine: "*eElkVzUwY21WemMwRm5aVzUwTG14dlp5*"
            minimum_should_match: 1

parameters:
  - name: AGENT_NAME
    default: "DESKTOP-AM0HLGE"
  - name: CUSTOMER_CODE
    default: "lab"
  - name: START_TIME
    default: "now-24h"
  - name: END_TIME
    default: "now"

how_to_implement: >
  Requires Sysmon EventID 1 (ProcessCreate) flowing to the Wazuh Indexer.
  Fields data_win_eventdata_image and data_win_eventdata_commandLine confirmed
  working. VALIDATED — simulation confirmed two hits: powershell.exe spawned
  from cmd.exe with -w hidden -nop -noni -ep Bypass -enc flags, plus a
  child powershell.exe spawned by the first. Requires minimum 2 truncated
  flags to reduce false positives from legitimate single-flag use.

known_false_positives: >
  Some legitimate administrative scripts may use abbreviated flags such as
  -nop or -ep. Requiring at least 2 truncated flags simultaneously reduces
  false positives significantly. Filter by known approved parent processes
  or script paths as needed.

references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1027/

response:
  message: >
    PowerShell executed with truncated/obfuscated parameters on $agent_name$ by $data_win_eventdata_user$.
    Parent: $data_win_eventdata_parentImage$.
    Command: $data_win_eventdata_commandLine$.
    MITRE ATT&CK: T1059.001, T1027
  risk_score: 60
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 60
    - field: data_win_eventdata_user
      type: user
      score: 60
  threat_objects:
    - field: data_win_eventdata_parentImage
      type: parent_process_name
    - field: data_win_eventdata_image
      type: process_name

tags:
  analytic_story:
    - Malicious PowerShell
    - Obfuscated Command Line
  asset_type: Endpoint
  mitre_attack_id:
    - T1059.001
    - T1027
  custom_tags:
    - powershell
    - truncated_parameters
    - obfuscation
    - encoded_command
    - defense_evasion
  product:
    - Wazuh
  security_domain: endpoint

name: Powershell Fileless Script Contains Base64 Encoded Content
id: windows-powershell-fileless-script-contains-base64-encoded-content-001
version: 1
schema_version: "1.0"
date: "2026-03-10"
author: SOCFortress LLC
status: production
type: TTP

description: >
  Detects the execution of PowerShell scripts containing Base64 encoded content, 
  specifically identifying the use of FromBase64String. It leverages PowerShell 
  Script Block Logging (EventCode 4104) to capture and analyze the full command 
  sent to PowerShell. This activity is significant as Base64 encoding is often 
  used by attackers to obfuscate malicious payloads, making it harder to detect. 
  If confirmed malicious, this could lead to code execution, allowing attackers 
  to run arbitrary commands and potentially compromise the system.

data_source:
  - PowerShell Script Block Logging 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*FromBase64String*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*frombase64string*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_system_computer
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-10 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-10 23:59:59.999"

how_to_implement: >
  This detection requires PowerShell Script Block Logging (EventCode 4104) enabled 
  on Windows endpoints. Enable via registry: HKLM\SOFTWARE\Policies\Microsoft\Windows\
  PowerShell\ScriptBlockLogging\EnableScriptBlockLogging = 1. The Wazuh agent 
  ossec.conf must include the Microsoft-Windows-PowerShell/Operational event channel. 
  The index pattern should match your Wazuh index naming convention.

known_false_positives: >
  False positives should be limited. Base64 decoding with FromBase64String in 
  PowerShell is often used for obfuscation. Filter based on script source and 
  user context, but investigate all matches.

references:
  - https://attack.mitre.org/techniques/T1027/
  - https://attack.mitre.org/techniques/T1059/001/
  - https://blog.palantir.com/tampering-with-windows-event-tracing-background-offense-and-defense-4be7ac62ac63
  - https://www.splunk.com/en_us/blog/security/hunting-for-malicious-powershell-using-script-block-logging.html
  - https://thedfirreport.com/2023/05/22/icedid-macro-ends-in-nokoyawa-ransomware/

response:
  message: >
    Base64 encoded content detected in PowerShell script block on $agent_name$. 
    Script block: $data_win_eventdata_scriptBlockText$. 
    User: $data_win_eventdata_user$. MITRE ATT&CK: T1027, T1059.001
  risk_score: 50
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 50
  threat_objects: []

tags:
  analytic_story:
    - Winter Vivern
    - Malicious PowerShell
    - Medusa Ransomware
    - Data Destruction
    - NjRAT
    - AsyncRAT
    - Hermetic Wiper
    - IcedID
    - XWorm
    - 0bj3ctivity Stealer
    - Hellcat Ransomware
    - NetSupport RMM Tool Abuse
    - MuddyWater
    - Compromised Windows Host
  asset_type: Endpoint
  mitre_attack_id:
    - T1027
    - T1059.001
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND (data_win_eventdata_scriptBlockText:/.*FromBase64String.*/ OR data_win_eventdata_scriptBlockText:/.*frombase64string.*/)
name: Powershell Using memory As Backing Store
id: windows-powershell-using-memory-as-backing-store-001
version: 1
schema_version: "1.0"
date: "2026-03-10"
author: SOCFortress LLC
status: production
type: TTP

description: >
  Detects suspicious PowerShell script execution using memory streams as a backing 
  store, identified via EventCode 4104. It leverages PowerShell Script Block Logging 
  to capture scripts that create new objects with memory streams, often used to 
  decompress and execute payloads in memory. This activity is significant as it 
  indicates potential in-memory execution of malicious code, bypassing traditional 
  file-based detection. If confirmed malicious, this technique could allow attackers 
  to execute arbitrary code, maintain persistence, or escalate privileges without 
  leaving a trace on the disk.

data_source:
  - PowerShell Script Block Logging 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*New-Object*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*IO.MemoryStream*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_system_computer
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-10 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-10 23:59:59.999"

how_to_implement: >
  This detection requires PowerShell Script Block Logging (EventCode 4104) enabled 
  on Windows endpoints. Enable via registry: HKLM\SOFTWARE\Policies\Microsoft\Windows\
  PowerShell\ScriptBlockLogging\EnableScriptBlockLogging = 1. The Wazuh agent 
  ossec.conf must include the Microsoft-Windows-PowerShell/Operational event channel. 
  The index pattern should match your Wazuh index naming convention.

known_false_positives: >
  PowerShell may use this function to store objects into memory for legitimate 
  purposes. However, the combination of New-Object and IO.MemoryStream is often 
  indicative of in-memory payload execution. Filter based on script source and 
  user context to identify anomalies.

references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://web.archive.org/web/20201112031711/https://www.carbonblack.com/blog/decoding-malicious-powershell-streams/
  - https://blog.palantir.com/tampering-with-windows-event-tracing-background-offense-and-defense-4be7ac62ac63
  - https://www.crowdstrike.com/blog/investigating-powershell-command-and-script-logging/
  - https://thedfirreport.com/2023/05/22/icedid-macro-ends-in-nokoyawa-ransomware/

response:
  message: >
    Memory stream in-memory execution detected in PowerShell on $agent_name$. 
    Script block: $data_win_eventdata_scriptBlockText$. 
    User: $data_win_eventdata_user$. MITRE ATT&CK: T1059.001
  risk_score: 75
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 75
  threat_objects: []

tags:
  analytic_story:
    - Data Destruction
    - MoonPeak
    - Medusa Ransomware
    - Hermetic Wiper
    - IcedID
    - Malicious PowerShell
    - Compromised Windows Host
  asset_type: Endpoint
  mitre_attack_id:
    - T1059.001
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*New-Object.*/ AND data_win_eventdata_scriptBlockText:/.*IO\.MemoryStream.*/
name: Detect Mimikatz With PowerShell Script Block Logging
id: 8148c29c-c952-11eb-9255-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-08"
author: SOCFortress LLC
status: production
type: TTP

description: >
  The following analytic detects the execution of Mimikatz commands via PowerShell 
  by leveraging PowerShell Script Block Logging (EventID 4104). This method captures 
  and logs the full command sent to PowerShell, allowing for the identification of 
  suspicious activities such as Pass the Ticket, Pass the Hash, and credential dumping. 
  This activity is significant as Mimikatz is a well-known tool used for credential 
  theft and lateral movement. If confirmed malicious, this could lead to unauthorized 
  access, privilege escalation, and potential compromise of sensitive information 
  within the environment.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*mimikatz*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*sekurlsa::pth*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*kerberos::ptt*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*kerberos::golden*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-08 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-08 23:59:59.999"

how_to_implement: >
  To successfully implement this analytic, you will need to enable PowerShell Script 
  Block Logging (EventID 4104) on some or all endpoints. The Wazuh agent ossec.conf 
  should include the Microsoft-Windows-PowerShell/Operational event channel. This 
  detection monitors for specific Mimikatz command patterns including sekurlsa::pth 
  (Pass the Hash), kerberos::ptt (Pass the Ticket), and kerberos::golden (Golden 
  Ticket generation). Mimikatz is a legitimate pen-testing tool but is frequently 
  abused by attackers for credential theft and lateral movement.

known_false_positives: >
  False positives should be limited as the commands being identified are quite specific 
  to EventID 4104 and Mimikatz. Filter as needed based on authorized red team exercises 
  or legitimate pen-testing activities.

references:
  - https://github.com/gentilkiwi/mimikatz
  - https://www.splunk.com/en_us/blog/security/hunting-for-malicious-powershell-using-script-block-logging.html
  - https://blog.palantir.com/tampering-with-windows-event-tracing-background-offense-and-defense-4be7ac62ac63
  - https://attack.mitre.org/techniques/T1003/
  - https://attack.mitre.org/techniques/T1059/001/

response:
  message: >
    The following behavior was identified and typically related to Mimikatz being 
    loaded within the context of PowerShell on $agent_name$ by user $data_win_eventdata_user$. 
    Script: $data_win_eventdata_scriptBlockText$. 
    This indicates credential dumping or lateral movement activity. MITRE ATT&CK: T1003, T1059.001
  risk_score: 85
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 85
    - field: data_win_eventdata_user
      type: user
      score: 85
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Hellcat Ransomware
    - Malicious PowerShell
    - Hermetic Wiper
    - Sandworm Tools
    - CISA AA22-264A
    - CISA AA22-320A
    - CISA AA23-347A
    - Data Destruction
    - Scattered Spider
    - Credential Dumping
  asset_type: Endpoint
  mitre_attack_id:
    - T1003
    - T1059.001
  custom_tags:
    - mimikatz
    - sekurlsa
    - kerberos
    - pass_the_hash
    - pass_the_ticket
    - golden_ticket
    - credential_dumping
    - lateral_movement
    - powershell
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND (data_win_eventdata_scriptBlockText:/.*mimikatz.*/ OR data_win_eventdata_scriptBlockText:/.*sekurlsa::pth.*/ OR data_win_eventdata_scriptBlockText:/.*kerberos::ptt.*/ OR data_win_eventdata_scriptBlockText:/.*kerberos::golden.*/)
name: Windows PowerShell MSIX Package Installation
id: d2f77901-dbfa-42d9-8af7-dcd0f1a50a2f
version: 1
schema_version: "1.0"
date: "2026-03-30"
author: SOCFortress LLC
status: production
type: TTP
description: >
  Detects PowerShell commands that install unsigned AppX/MSIX packages using
  Add-AppxPackage or Add-AppPackage cmdlets with the -AllowUnsigned flag.
  Adversaries may use unsigned MSIX packages to install malicious applications,
  bypass application signing requirements, or establish persistence. The
  -AllowUnsigned flag is only available on Windows 11 and later, making this
  a targeted technique for modern systems.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Add-AppxPackage*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Add-AppPackage*"
            minimum_should_match: 1
        - wildcard:
            data_win_eventdata_scriptBlockText: "*-AllowUnsigned*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_path
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-30 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-30 23:59:59.999"

how_to_implement: >
  Requires PowerShell Script Block Logging enabled on endpoints.
  Enable via Group Policy: Computer Configuration → Administrative Templates
  → Windows Components → Windows PowerShell → Turn on PowerShell Script Block
  Logging.

known_false_positives: >
  Developers and system administrators may legitimately install unsigned MSIX
  packages for testing or internal application deployment purposes. Review the
  package path, user context, and whether the activity is part of an approved
  development or testing workflow.

references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1547/001/
  - https://learn.microsoft.com/en-us/windows/msix/package/unsigned-package
  - https://learn.microsoft.com/en-us/powershell/module/appx/add-appxpackage

response:
  message: >
    PowerShell unsigned MSIX package installation detected on $agent_name$
    by $data_win_eventdata_user$.
    Script: $data_win_eventdata_scriptBlockText$.
    MITRE ATT&CK: T1059.001, T1547.001
  risk_score: 50
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 50
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: script_block

tags:
  analytic_story:
    - Malicious PowerShell
    - MSIX Package Abuse
  asset_type: Endpoint
  mitre_attack_id:
    - T1059.001
    - T1547.001
  custom_tags:
    - msix
    - appxpackage
    - unsigned_package
    - persistence
    - defense_evasion
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND (data_win_eventdata_scriptBlockText:/.*Add-AppxPackage.*/ OR data_win_eventdata_scriptBlockText:/.*Add-AppPackage.*/) AND data_win_eventdata_scriptBlockText:/.*-AllowUnsigned.*/
name: Detect Copy of ShadowCopy with Script Block Logging
id: 9251299c-ea5b-11eb-a8de-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-08"
author: SOCFortress LLC
status: production
type: TTP

description: >
  The following analytic detects the use of PowerShell commands to copy the SAM, 
  SYSTEM, or SECURITY registry hives, which are critical for credential theft. It 
  leverages PowerShell Script Block Logging (EventID 4104) to capture and analyze 
  the full command executed. This activity is significant as it indicates an attempt 
  to exfiltrate sensitive registry hives for offline password cracking and credential 
  dumping. This technique is associated with HiveNightmare (CVE-2021-36934) which 
  allows unprivileged users to copy sensitive registry hives. If confirmed malicious, 
  this could lead to unauthorized access to credentials, enabling further compromise 
  of the system and potential lateral movement within the network.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Copy-Item*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*[System.IO.File]::Copy*"
            minimum_should_match: 1
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*System32\\config\\SAM*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*System32\\config\\SYSTEM*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*System32\\config\\SECURITY*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-08 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-08 23:59:59.999"

how_to_implement: >
  To successfully implement this analytic, you will need to enable PowerShell Script 
  Block Logging (EventID 4104) on some or all endpoints. The Wazuh agent ossec.conf 
  should include the Microsoft-Windows-PowerShell/Operational event channel. This 
  detection monitors for PowerShell Copy-Item cmdlet or System.IO.File::Copy method 
  being used to copy critical registry hives (SAM, SYSTEM, SECURITY) which contain 
  Windows authentication credentials and system configuration. SAM (Security Accounts 
  Manager) contains local user password hashes, SYSTEM contains encryption keys, and 
  SECURITY contains cached credentials. This is a common tactic for credential dumping 
  and offline password cracking.

known_false_positives: >
  Limited false positives as the scope is limited to SAM, SYSTEM and SECURITY hives. 
  Legitimate administrators do not typically copy these critical hives. Any attempt 
  to copy these registry hives should be investigated immediately.

references:
  - https://msrc.microsoft.com/update-guide/vulnerability/CVE-2021-36934
  - https://github.com/GossiTheDog/HiveNightmare
  - https://github.com/JumpsecLabs/Guidance-Advice/tree/main/SAM_Permissions
  - https://attack.mitre.org/techniques/T1003/002/

response:
  message: >
    PowerShell was identified running a script to capture a registry hive on 
    $agent_name$ by user $data_win_eventdata_user$. 
    Script: $data_win_eventdata_scriptBlockText$. 
    This indicates credential dumping activity. MITRE ATT&CK: T1003.002
  risk_score: 85
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 85
    - field: data_win_eventdata_user
      type: user
      score: 85
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Credential Dumping
    - VanHelsing Ransomware
    - Credential Access
  asset_type: Endpoint
  cve:
    - CVE-2021-36934
  mitre_attack_id:
    - T1003.002
  custom_tags:
    - sam_hive
    - registry_hive
    - credential_dumping
    - hivenightmare
    - cve_2021_36934
    - credential_access
    - powershell
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND (data_win_eventdata_scriptBlockText:/.*Copy-Item.*/ OR data_win_eventdata_scriptBlockText:/.*System.IO.File::Copy.*/) AND (data_win_eventdata_scriptBlockText:/.*System32.*config.*SAM.*/ OR data_win_eventdata_scriptBlockText:/.*System32.*config.*SYSTEM.*/ OR data_win_eventdata_scriptBlockText:/.*System32.*config.*SECURITY.*/)
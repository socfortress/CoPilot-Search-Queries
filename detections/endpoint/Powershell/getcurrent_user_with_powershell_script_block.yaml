name: Get-CurrentUser with PowerShell Script Block
id: 80879283-c30f-44f7-8471-d1381f6d437a
version: 1
schema_version: "1.0"
date: "2026-04-09"
author: SOCFortress LLC
status: production
type: Hunting

description: >
  The following analytic detects the execution of the `GetCurrent` method from the 
  WindowsIdentity .NET class using PowerShell Script Block Logging (EventID 4104). 
  This method identifies the current Windows user. The detection leverages PowerShell 
  script block logs to identify when this method is called. This activity is significant 
  because adversaries and Red Teams may use it to gain situational awareness and perform 
  Active Directory discovery on compromised endpoints. If confirmed malicious, this could 
  allow attackers to map out user accounts and potentially escalate privileges or move 
  laterally within the network.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*System.Security.Principal.WindowsIdentity*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*GetCurrent*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-09 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-09 23:59:59.999"

how_to_implement: >
  To successfully implement this analytic, you will need to enable PowerShell Script 
  Block Logging (EventID 4104) on some or all endpoints. The Wazuh agent ossec.conf 
  should include the Microsoft-Windows-PowerShell/Operational event channel. This 
  detection monitors for the System.Security.Principal.WindowsIdentity::GetCurrent() 
  .NET method call. Validate that data_win_eventdata_scriptBlockText field is being 
  populated in Elasticsearch/Wazuh Indexer.

known_false_positives: >
  Administrators or power users may use this PowerShell method for legitimate 
  troubleshooting and user discovery purposes. Filter based on user context and whether 
  the action was expected and authorized within your organization.

references:
  - https://attack.mitre.org/techniques/T1033/
  - https://docs.microsoft.com/en-us/dotnet/api/system.security.principal.windowsidentity.getcurrent?view=net-6.0
  - https://github.com/S1ckB0y1337/Active-Directory-Exploitation-Cheat-Sheet

response:
  message: >
    Get-CurrentUser (WindowsIdentity::GetCurrent) execution detected on $agent_name$ 
    by user $data_win_eventdata_user$. Script block: $data_win_eventdata_scriptBlockText$. 
    This indicates current user enumeration/situational awareness activity. 
    MITRE ATT&CK: T1033
  risk_score: 30
  severity: low
  risk_objects:
    - field: agent_name
      type: system
      score: 30
    - field: data_win_eventdata_user
      type: user
      score: 30
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Active Directory Discovery
    - System Owner Discovery
  asset_type: Endpoint
  mitre_attack_id:
    - T1033
  custom_tags:
    - getcurrent_user
    - windowsidentity
    - current_user_discovery
    - system_owner_discovery
    - situational_awareness
    - reconnaissance
    - powershell
    - net_method
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*System.Security.Principal.WindowsIdentity.*/ AND data_win_eventdata_scriptBlockText:/.*GetCurrent.*/
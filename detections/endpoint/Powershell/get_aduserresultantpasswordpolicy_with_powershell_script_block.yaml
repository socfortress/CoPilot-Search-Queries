name: Get ADUserResultantPasswordPolicy with Powershell Script Block
id: 737e1eb0-065a-11ec-921a-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-09"
author: SOCFortress LLC
status: production
type: TTP

description: >
  The following analytic detects the execution of the `Get-ADUserResultantPasswordPolicy` 
  PowerShell cmdlet, which is used to obtain the password policy in a Windows domain. 
  It leverages PowerShell Script Block Logging (EventID 4104) to identify this activity. 
  Monitoring this behavior is significant as it may indicate an attempt to enumerate 
  domain policies, a common tactic used by adversaries for situational awareness and 
  Active Directory discovery. If confirmed malicious, this activity could allow attackers 
  to understand password policies, aiding in further attacks such as password guessing 
  or policy exploitation.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Get-ADUserResultantPasswordPolicy*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-09 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-09 23:59:59.999"

how_to_implement: >
  To successfully implement this analytic, you will need to enable PowerShell Script 
  Block Logging (EventID 4104) on some or all endpoints. The Wazuh agent ossec.conf 
  should include the Microsoft-Windows-PowerShell/Operational event channel. This 
  detection monitors for the Get-ADUserResultantPasswordPolicy cmdlet, which retrieves 
  the resultant password policy for a specific user account in the domain. This includes 
  fine-grained password policy settings that may apply to the user based on their group 
  memberships. Attackers use this information to understand password policies for 
  targeted accounts and craft more effective password attacks.

known_false_positives: >
  Administrators or power users may use this command for legitimate troubleshooting 
  and system administration purposes. Filter based on user context and whether the 
  action was expected and authorized within your organization.

references:
  - https://github.com/S1ckB0y1337/Active-Directory-Exploitation-Cheat-Sheet
  - https://attack.mitre.org/techniques/T1201/
  - https://docs.microsoft.com/en-us/powershell/module/activedirectory/get-aduserresultantpasswordpolicy?view=windowsserver2019-ps

response:
  message: >
    Get-ADUserResultantPasswordPolicy execution detected on $agent_name$ by user 
    $data_win_eventdata_user$. Script: $data_win_eventdata_scriptBlockText$. 
    This indicates user-specific password policy enumeration/reconnaissance activity. 
    MITRE ATT&CK: T1201
  risk_score: 48
  severity: low
  risk_objects:
    - field: agent_name
      type: system
      score: 48
    - field: data_win_eventdata_user
      type: user
      score: 48
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Active Directory Discovery
    - CISA AA23-347A
  asset_type: Endpoint
  mitre_attack_id:
    - T1201
  custom_tags:
    - get_aduserresultantpasswordpolicy
    - active_directory
    - password_policy
    - fine_grained_policy
    - policy_discovery
    - reconnaissance
    - powershell
    - enumeration
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Get-ADUserResultantPasswordPolicy.*/
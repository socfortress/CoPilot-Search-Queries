name: PowerShell Start or Stop Service
id: windows-powershell-start-or-stop-service-001
version: 1
schema_version: "1.0"
date: "2026-03-10"
author: SOCFortress LLC
status: production
type: Anomaly

description: >
  Identifies the use of PowerShell's Start-Service or Stop-Service cmdlets on an 
  endpoint. It leverages PowerShell Script Block Logging (EventCode 4104) to detect 
  these commands. This activity is significant because attackers can manipulate 
  services to disable or stop critical functions, causing system instability or 
  disrupting business operations. If confirmed malicious, this behavior could allow 
  attackers to disable security services, evade detection, or disrupt essential 
  services, leading to potential system downtime and compromised security.

data_source:
  - PowerShell Script Block Logging 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*start-service*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*stop-service*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - agent_name
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-10 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-10 23:59:59.999"

how_to_implement: >
  This detection requires PowerShell Script Block Logging (EventCode 4104) enabled 
  on Windows endpoints. Enable via registry: HKLM\SOFTWARE\Policies\Microsoft\Windows\
  PowerShell\ScriptBlockLogging\EnableScriptBlockLogging = 1. The Wazuh agent 
  ossec.conf must include the Microsoft-Windows-PowerShell/Operational event channel. 
  The index pattern should match your Wazuh index naming convention.

known_false_positives: >
  This behavior may be noisy, as these cmdlets are commonly used by system 
  administrators or other legitimate users to manage services. Therefore, it is 
  recommended to use this detection as part of a broader set of security controls. 
  Filter based on user context, service names, and time of execution to identify 
  anomalies and reduce false positives.

references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://learn-powershell.net/2012/01/15/startingstopping-and-restarting-remote-services-with-powershell/
  - https://learn.microsoft.com/en-us/powershell/module/microsoft.powershell.management/start-service?view=powershell-7.3

response:
  message: >
    Service manipulation detected in PowerShell on $agent_name$. 
    Script block: $data_win_eventdata_scriptBlockText$. 
    User: $data_win_eventdata_user$. MITRE ATT&CK: T1059.001
  risk_score: 25
  severity: low
  risk_objects:
    - field: agent_name
      type: system
      score: 25
  threat_objects: []

tags:
  analytic_story:
    - Scattered Lapsus$ Hunters
    - Active Directory Lateral Movement
    - Service Manipulation
    - Compromised Windows Host
  asset_type: Endpoint
  mitre_attack_id:
    - T1059.001
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND (data_win_eventdata_scriptBlockText:/.*Stop-Service.*/ OR data_win_eventdata_scriptBlockText:/.*Start-Service.*/)
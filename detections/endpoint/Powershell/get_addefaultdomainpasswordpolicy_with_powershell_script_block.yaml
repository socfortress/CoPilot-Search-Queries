name: Get ADDefaultDomainPasswordPolicy with Powershell Script Block
id: 1ff7ccc8-065a-11ec-91e4-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-08"
author: SOCFortress LLC
status: production
type: Hunting

description: >
  The following analytic detects the execution of the `Get-ADDefaultDomainPasswordPolicy` 
  PowerShell cmdlet, which is used to retrieve the password policy in a Windows domain. 
  This detection leverages PowerShell Script Block Logging (EventID 4104) to identify 
  the specific command execution. Monitoring this activity is significant as it can 
  indicate an attempt to gather domain policy information, which is often a precursor 
  to further malicious actions. If confirmed malicious, this activity could allow an 
  attacker to understand password policies, aiding in password attacks, credential 
  enumeration, or further domain reconnaissance.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Get-ADDefaultDomainPasswordPolicy*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-08 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-08 23:59:59.999"

how_to_implement: >
  To successfully implement this analytic, you will need to enable PowerShell Script 
  Block Logging (EventID 4104) on some or all endpoints. The Wazuh agent ossec.conf 
  should include the Microsoft-Windows-PowerShell/Operational event channel. This 
  detection monitors for the Get-ADDefaultDomainPasswordPolicy cmdlet, which retrieves 
  the default password policy for the Active Directory domain including password 
  complexity requirements, lockout thresholds, and password expiration settings. 
  Attackers use this information to understand domain password policies and craft 
  more effective password attacks.

known_false_positives: >
  Administrators or power users may use this command for legitimate troubleshooting 
  and system administration purposes. Filter based on user context and whether the 
  action was expected and authorized within your organization.

references:
  - https://github.com/S1ckB0y1337/Active-Directory-Exploitation-Cheat-Sheet
  - https://attack.mitre.org/techniques/T1201/
  - https://docs.microsoft.com/en-us/powershell/module/activedirectory/get-addefaultdomainpasswordpolicy?view=windowsserver2019-ps

response:
  message: >
    Get-ADDefaultDomainPasswordPolicy execution detected on $agent_name$ by user 
    $data_win_eventdata_user$. Script: $data_win_eventdata_scriptBlockText$. 
    This indicates password policy enumeration/reconnaissance activity. 
    MITRE ATT&CK: T1201
  risk_score: 45
  severity: low
  risk_objects:
    - field: agent_name
      type: system
      score: 45
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Active Directory Discovery
    - Password Policy Discovery
  asset_type: Endpoint
  mitre_attack_id:
    - T1201
  custom_tags:
    - get_addefaultdomainpasswordpolicy
    - active_directory
    - password_policy
    - policy_discovery
    - reconnaissance
    - powershell
    - enumeration
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Get-ADDefaultDomainPasswordPolicy.*/
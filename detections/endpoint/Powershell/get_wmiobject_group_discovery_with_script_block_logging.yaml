name: Get-WMIObject Group Discovery with Script Block Logging
id: 69df7f7c-155d-11ec-a055-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-09"
author: SOCFortress LLC
status: production
type: Hunting

description: >
  The following analytic detects the execution of the `Get-WMIObject Win32_Group` 
  command using PowerShell Script Block Logging (EventID 4104). This method captures 
  the full command sent to PowerShell, allowing for detailed analysis. Identifying group 
  information on an endpoint is not inherently malicious but can be suspicious based on 
  context such as time, endpoint, and user. This activity is significant as it may 
  indicate reconnaissance efforts by an attacker. If confirmed malicious, it could lead 
  to further enumeration and potential lateral movement within the network.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Get-WMIObject*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Win32_Group*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-09 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-09 23:59:59.999"

how_to_implement: >
  To successfully implement this analytic, you will need to enable PowerShell Script 
  Block Logging (EventID 4104) on some or all endpoints. The Wazuh agent ossec.conf 
  should include the Microsoft-Windows-PowerShell/Operational event channel. This 
  detection monitors for the Get-WMIObject Win32_Group cmdlet combination, which is 
  used for group enumeration. Validate that data_win_eventdata_scriptBlockText field 
  is being populated in Elasticsearch/Wazuh Indexer.

known_false_positives: >
  False positives may be present. Tune as needed based on organizational baseline. 
  System administrators may use this command for legitimate group management and auditing 
  purposes. Filter based on user context and whether the action was expected and 
  authorized within your organization.

references:
  - https://www.splunk.com/en_us/blog/security/powershell-detections-threat-research-release-august-2021.html
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1069.001/T1069.001.md
  - https://blog.palantir.com/tampering-with-windows-event-tracing-background-offense-and-defense-4be7ac62ac63
  - https://www.crowdstrike.com/blog/investigating-powershell-command-and-script-logging/
  - https://attack.mitre.org/techniques/T1069/001/

response:
  message: >
    Get-WMIObject Win32_Group execution detected on $agent_name$ by user 
    $data_win_eventdata_user$. Script block: $data_win_eventdata_scriptBlockText$. 
    This indicates local/domain group enumeration/reconnaissance activity. 
    MITRE ATT&CK: T1069.001
  risk_score: 40
  severity: low
  risk_objects:
    - field: agent_name
      type: system
      score: 40
    - field: data_win_eventdata_user
      type: user
      score: 40
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Active Directory Discovery
    - Permission Groups Discovery
  asset_type: Endpoint
  mitre_attack_id:
    - T1069.001
  custom_tags:
    - get_wmiobject
    - win32_group
    - group_discovery
    - permission_groups
    - local_groups
    - reconnaissance
    - powershell
    - enumeration
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Get-WMIObject.*/ AND data_win_eventdata_scriptBlockText:/.*Win32_Group.*/
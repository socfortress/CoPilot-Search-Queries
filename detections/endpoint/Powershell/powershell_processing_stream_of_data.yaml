name: Powershell Processing Stream Of Data
id: windows-powershell-processing-stream-of-data-001
version: 1
schema_version: "1.0"
date: "2026-03-10"
author: SOCFortress LLC
status: production
type: TTP

description: >
  Detects suspicious PowerShell script execution involving compressed stream data 
  processing, identified via EventCode 4104. It leverages PowerShell Script Block 
  Logging to flag scripts using IO.Compression, IO.StreamReader, or decompression 
  methods. This activity is significant as it often indicates obfuscated PowerShell 
  or embedded .NET/binary execution, which are common tactics for evading detection. 
  If confirmed malicious, this behavior could allow attackers to execute hidden code, 
  escalate privileges, or maintain persistence within the environment.

data_source:
  - PowerShell Script Block Logging 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*IO.Compression.*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*IO.StreamReader*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*]::Decompress*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - agent_name
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-10 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-10 23:59:59.999"

how_to_implement: >
  This detection requires PowerShell Script Block Logging (EventCode 4104) enabled 
  on Windows endpoints. Enable via registry: HKLM\SOFTWARE\Policies\Microsoft\Windows\
  PowerShell\ScriptBlockLogging\EnableScriptBlockLogging = 1. The Wazuh agent 
  ossec.conf must include the Microsoft-Windows-PowerShell/Operational event channel. 
  The index pattern should match your Wazuh index naming convention.

known_false_positives: >
  PowerShell may legitimately use this function to process compressed data. Filter 
  based on user context, source script path, and frequency of execution to identify 
  anomalies. Administrative scripts that handle compressed data should be reviewed.

references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://medium.com/@ahmedjouini99/deobfuscating-emotets-powershell-payload-e39fb116f7b9
  - https://blog.palantir.com/tampering-with-windows-event-tracing-background-offense-and-defense-4be7ac62ac63
  - https://www.crowdstrike.com/blog/investigating-powershell-command-and-script-logging/
  - https://thedfirreport.com/2023/05/22/icedid-macro-ends-in-nokoyawa-ransomware/

response:
  message: >
    Stream compression processing detected in PowerShell on $agent_name$. 
    Script block: $data_win_eventdata_scriptBlockText$. 
    User: $data_win_eventdata_user$. MITRE ATT&CK: T1059.001
  risk_score: 60
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 60
  threat_objects: []

tags:
  analytic_story:
    - Hellcat Ransomware
    - Malicious PowerShell
    - Medusa Ransomware
    - PXA Stealer
    - Data Destruction
    - AsyncRAT
    - Hermetic Wiper
    - IcedID
    - XWorm
    - MuddyWater
    - Compromised Windows Host
  asset_type: Endpoint
  mitre_attack_id:
    - T1059.001
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND (data_win_eventdata_scriptBlockText:/.*IO\.Compression\..*/ OR data_win_eventdata_scriptBlockText:/.*IO\.StreamReader.*/ OR data_win_eventdata_scriptBlockText:/.*\]::Decompress.*/)
name: Get ADUser with PowerShell Script Block
id: 21432e40-04f4-11ec-b7e6-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-09"
author: SOCFortress LLC
status: production
type: Hunting

description: >
  The following analytic detects the execution of the `Get-AdUser` PowerShell cmdlet 
  with a filter parameter, which is used to enumerate domain users. It leverages 
  PowerShell Script Block Logging (EventID 4104) to identify instances where this 
  command is executed with a filter. This activity is significant as it may indicate 
  an attempt by adversaries or Red Teams to gather information about domain users 
  for situational awareness and Active Directory discovery. If confirmed malicious, 
  this behavior could lead to further reconnaissance and potential exploitation of 
  user accounts within the domain.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Get-AdUser*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Filter*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-09 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-09 23:59:59.999"

how_to_implement: >
  To successfully implement this analytic, you will need to enable PowerShell Script 
  Block Logging (EventID 4104) on some or all endpoints. The Wazuh agent ossec.conf 
  should include the Microsoft-Windows-PowerShell/Operational event channel. This 
  detection monitors for the Get-AdUser cmdlet combined with the -Filter parameter, 
  which is used to query Active Directory for user objects. Attackers use this to 
  enumerate domain users, identify privileged accounts, or search for specific user 
  patterns as part of reconnaissance and lateral movement planning.

known_false_positives: >
  Administrators or power users may use this command for legitimate troubleshooting 
  and system administration purposes. Filter based on user context and whether the 
  action was expected and authorized within your organization.

references:
  - https://www.blackhillsinfosec.com/red-blue-purple/
  - https://attack.mitre.org/techniques/T1087/002/
  - https://docs.microsoft.com/en-us/powershell/module/activedirectory/get-aduser?view=windowsserver2019-ps

response:
  message: >
    Get-AdUser with -Filter parameter detected on $agent_name$ by user 
    $data_win_eventdata_user$. Script: $data_win_eventdata_scriptBlockText$. 
    This indicates domain user enumeration/reconnaissance activity. 
    MITRE ATT&CK: T1087.002
  risk_score: 50
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 50
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Active Directory Discovery
    - CISA AA23-347A
  asset_type: Endpoint
  mitre_attack_id:
    - T1087.002
  custom_tags:
    - get_aduser
    - active_directory
    - user_enumeration
    - filter_parameter
    - reconnaissance
    - powershell
    - account_discovery
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Get-AdUser.*/ AND data_win_eventdata_scriptBlockText:/.*Filter.*/
name: PowerShell Invoke CIMMethod CIMSession
id: windows-powershell-invoke-cimmethod-cimsession-001
version: 1
schema_version: "1.0"
date: "2026-03-10"
author: SOCFortress LLC
status: production
type: Anomaly

description: >
  Detects the creation of a New-CIMSession cmdlet followed by the use of the 
  Invoke-CIMMethod cmdlet within PowerShell. It leverages PowerShell Script Block 
  Logging (EventCode 4104) to identify these specific cmdlets in the ScriptBlockText 
  field. This activity is significant because it mirrors the behavior of the 
  Invoke-WMIMethod cmdlet, often used for remote code execution via NTLMv2 
  pass-the-hash authentication. If confirmed malicious, this could allow an attacker 
  to execute commands remotely, potentially leading to unauthorized access and control 
  over targeted systems.

data_source:
  - PowerShell Script Block Logging 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*invoke-CIMMethod*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*New-CimSession*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - agent_name
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-10 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-10 23:59:59.999"

how_to_implement: >
  This detection requires PowerShell Script Block Logging (EventCode 4104) enabled 
  on Windows endpoints. Enable via registry: HKLM\SOFTWARE\Policies\Microsoft\Windows\
  PowerShell\ScriptBlockLogging\EnableScriptBlockLogging = 1. The Wazuh agent 
  ossec.conf must include the Microsoft-Windows-PowerShell/Operational event channel. 
  The index pattern should match your Wazuh index naming convention.

known_false_positives: >
  False positives may be present based on third-party applications or administrators 
  using CIM for legitimate remote administration. It is recommended to apply 
  appropriate filters based on user context and target systems to minimize false 
  positives.

references:
  - https://attack.mitre.org/techniques/T1047/
  - https://learn.microsoft.com/en-us/powershell/module/cimcmdlets/invoke-cimmethod
  - https://www.splunk.com/en_us/blog/security/powershell-detections-threat-research-release-august-2021.html

response:
  message: >
    PowerShell CIM method invocation detected on $agent_name$. 
    Script block: $data_win_eventdata_scriptBlockText$. 
    User: $data_win_eventdata_user$. MITRE ATT&CK: T1047
  risk_score: 50
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 50
  threat_objects: []

tags:
  analytic_story:
    - Scattered Lapsus$ Hunters
    - Malicious PowerShell
    - Active Directory Lateral Movement
    - Compromised Windows Host
  asset_type: Endpoint
  mitre_attack_id:
    - T1047
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND (data_win_eventdata_scriptBlockText:/.*Invoke-CimMethod.*/ OR data_win_eventdata_scriptBlockText:/.*New-CimSession.*/)
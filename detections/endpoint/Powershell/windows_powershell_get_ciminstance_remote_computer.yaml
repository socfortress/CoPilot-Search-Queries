name: Windows PowerShell Get CIMInstance Remote Computer
id: d8c972eb-ed84-431a-8869-ca4bd83257d1
version: 1
schema_version: "1.0"
date: "2026-03-30"
author: SOCFortress LLC
status: production
type: Anomaly
description: >
  Detects use of the Get-CimInstance cmdlet with the -ComputerName parameter,
  indicating an attempt to retrieve WMI/CIM information from a remote computer.
  Adversaries use this technique for lateral movement reconnaissance to gather
  information about remote systems including OS details, running processes,
  installed software, and network configuration. This is a low-risk anomaly
  detection intended for hunting and risk-based alerting.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Get-CimInstance*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*ComputerName*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_path
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-30 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-30 23:59:59.999"

how_to_implement: >
  Requires PowerShell Script Block Logging enabled on endpoints.
  Enable via Group Policy: Computer Configuration → Administrative Templates
  → Windows Components → Windows PowerShell → Turn on PowerShell Script Block
  Logging.

known_false_positives: >
  Administrators may legitimately use Get-CimInstance with -ComputerName for
  remote system management and monitoring. This is intended as a low-risk
  hunting analytic. Review the remote computer name and user context to
  determine legitimacy.

references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://learn.microsoft.com/en-us/powershell/module/cimcmdlets/get-ciminstance

response:
  message: >
    PowerShell Get-CimInstance remote computer query detected on $agent_name$
    by $data_win_eventdata_user$.
    Script: $data_win_eventdata_scriptBlockText$.
    MITRE ATT&CK: T1059.001
  risk_score: 15
  severity: low
  risk_objects:
    - field: agent_name
      type: system
      score: 15
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: script_block

tags:
  analytic_story:
    - Active Directory Lateral Movement
  asset_type: Endpoint
  mitre_attack_id:
    - T1059.001
  custom_tags:
    - get_ciminstance
    - wmi
    - remote_access
    - lateral_movement
    - reconnaissance
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Get-CimInstance.*/ AND data_win_eventdata_scriptBlockText:/.*ComputerName.*/
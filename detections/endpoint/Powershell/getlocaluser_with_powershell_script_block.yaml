name: Get-LocalUser with PowerShell Script Block
id: 2e891cbe-0426-11ec-9c9c-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-09"
author: SOCFortress LLC
status: production
type: Hunting

description: >
  The following analytic detects the execution of the `Get-LocalUser` PowerShell cmdlet 
  using PowerShell Script Block Logging (EventID 4104). This cmdlet lists all local 
  users on a system. The detection leverages script block text from PowerShell logs to 
  identify this activity. Monitoring this behavior is significant as adversaries and 
  Red Teams may use it to enumerate local users for situational awareness and Active 
  Directory discovery. If confirmed malicious, this activity could lead to further 
  reconnaissance, enabling attackers to identify potential targets for privilege 
  escalation or lateral movement.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Get-LocalUser*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-09 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-09 23:59:59.999"

how_to_implement: >
  To successfully implement this analytic, you will need to enable PowerShell Script 
  Block Logging (EventID 4104) on some or all endpoints. The Wazuh agent ossec.conf 
  should include the Microsoft-Windows-PowerShell/Operational event channel. This 
  detection monitors for the Get-LocalUser cmdlet, which is used for local user 
  enumeration. Validate that data_win_eventdata_scriptBlockText field is being 
  populated in Elasticsearch/Wazuh Indexer.

known_false_positives: >
  Administrators or power users may use this PowerShell cmdlet for legitimate 
  troubleshooting and user management purposes. Filter based on user context and whether 
  the action was expected and authorized within your organization.

references:
  - https://attack.mitre.org/techniques/T1087/001/
  - https://www.splunk.com/en_us/blog/security/hunting-for-malicious-powershell-using-script-block-logging.html
  - https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.localaccounts/get-localuser

response:
  message: >
    Get-LocalUser execution detected on $agent_name$ by user $data_win_eventdata_user$. 
    Script block: $data_win_eventdata_scriptBlockText$. 
    This indicates local user enumeration/reconnaissance activity for privilege escalation targeting. 
    MITRE ATT&CK: T1087.001, T1059.001
  risk_score: 35
  severity: low
  risk_objects:
    - field: agent_name
      type: system
      score: 35
    - field: data_win_eventdata_user
      type: user
      score: 35
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Active Directory Discovery
    - Malicious PowerShell
    - Local User Discovery
  asset_type: Endpoint
  mitre_attack_id:
    - T1087.001
    - T1059.001
  custom_tags:
    - get_localuser
    - local_users
    - user_enumeration
    - local_accounts
    - privilege_escalation
    - reconnaissance
    - powershell
    - enumeration
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Get-LocalUser.*/
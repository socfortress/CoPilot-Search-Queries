name: Windows PowerShell Cryptography Namespace
id: f8b482f4-6d62-49fa-a905-dfa15698317b
version: 1
schema_version: "1.0"
date: "2026-04-07"
author: SOCFortress LLC
status: production
type: Anomaly

description: >
  Detects suspicious PowerShell script execution involving the cryptography
  namespace via EventCode 4104. It leverages PowerShell Script Block Logging
  to identify scripts using cryptographic functions, excluding common hashes
  like SHA and MD5. This activity is significant as it is often associated
  with malware that decrypts or decodes additional malicious payloads.
  If confirmed malicious, this could allow an attacker to execute further code,
  escalate privileges, or establish persistence within the environment.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*System.Security.Cryptography*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
      must_not:
        - wildcard:
            data_win_eventdata_scriptBlockText: "*SHA*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*MD5*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*DeriveBytes*"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-07 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-07 23:59:59.999"

how_to_implement: >
  Requires PowerShell Script Block Logging enabled on endpoints.
  Enable via Group Policy: Computer Configuration → Administrative Templates
  → Windows Components → Windows PowerShell → Turn on PowerShell Script Block
  Logging.

known_false_positives: >
  Administrative scripts using cryptography for legitimate purposes may trigger
  this detection. Review script context, parent process, and user account to
  determine legitimacy.

references:
  - https://malpedia.caad.fkie.fraunhofer.de/details/win.asyncrat
  - https://attack.mitre.org/techniques/T1059/001/
  - https://www.crowdstrike.com/blog/inside-xworm-xworm-malware-analysis/

response:
  message: >
    Suspicious PowerShell cryptography namespace execution detected on
    $agent_name$ by $data_win_eventdata_user$.
    Script: $data_win_eventdata_scriptBlockText$.
    MITRE ATT&CK: T1059.001
  risk_score: 45
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 25
    - field: data_win_eventdata_user
      type: user
      score: 20
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: script_block

tags:
  analytic_story:
    - AsyncRAT
    - XWorm
  asset_type: Endpoint
  mitre_attack_id:
    - T1059.001
  custom_tags:
    - cryptography
    - ransomware
    - payload_decryption
    - asyncrat
    - xworm
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*System\.Security\.Cryptography.*/ AND NOT (data_win_eventdata_scriptBlockText:/.*SHA.*/ OR data_win_eventdata_scriptBlockText:/.*MD5.*/ OR data_win_eventdata_scriptBlockText:/.*DeriveBytes.*/)
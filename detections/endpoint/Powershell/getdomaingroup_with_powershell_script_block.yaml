name: Get-DomainGroup with PowerShell Script Block
id: 09725404-a44f-4ed3-9efa-8ed5d69e4c53
version: 1
schema_version: "1.0"
date: "2026-04-09"
author: SOCFortress LLC
status: production
type: TTP

description: >
  The following analytic detects the execution of the `Get-DomainGroup` cmdlet using 
  PowerShell Script Block Logging (EventID 4104). This cmdlet, part of the PowerView 
  tool, is used to enumerate domain groups within a Windows domain. The detection 
  leverages script block text to identify this specific command. Monitoring this activity 
  is crucial as it may indicate an adversary or Red Team performing reconnaissance to 
  gain situational awareness and map out Active Directory structures. If confirmed 
  malicious, this activity could lead to further exploitation, including privilege 
  escalation and lateral movement within the network.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Get-DomainGroup*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-09 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-09 23:59:59.999"

how_to_implement: >
  To successfully implement this analytic, you will need to enable PowerShell Script 
  Block Logging (EventID 4104) on some or all endpoints. The Wazuh agent ossec.conf 
  should include the Microsoft-Windows-PowerShell/Operational event channel. This 
  detection monitors for the Get-DomainGroup cmdlet from PowerView, which is used for 
  domain group enumeration. Validate that data_win_eventdata_scriptBlockText field is 
  being populated in Elasticsearch/Wazuh Indexer.

known_false_positives: >
  Administrators or power users may use this PowerView function for legitimate 
  troubleshooting and group management purposes. Filter based on user context and whether 
  the action was expected and authorized within your organization.

references:
  - https://attack.mitre.org/techniques/T1069/002/
  - https://powersploit.readthedocs.io/en/latest/Recon/Get-DomainGroup/
  - https://github.com/S1ckB0y1337/Active-Directory-Exploitation-Cheat-Sheet

response:
  message: >
    Get-DomainGroup execution detected on $agent_name$ by user $data_win_eventdata_user$. 
    Script block: $data_win_eventdata_scriptBlockText$. 
    This indicates domain group enumeration/reconnaissance activity for privilege escalation planning. 
    MITRE ATT&CK: T1069.002
  risk_score: 50
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 50
    - field: data_win_eventdata_user
      type: user
      score: 50
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Active Directory Discovery
    - Permission Groups Discovery
    - Privilege Escalation
  asset_type: Endpoint
  mitre_attack_id:
    - T1069.002
  custom_tags:
    - get_domaingroup
    - powerview
    - group_enumeration
    - domain_groups
    - privilege_escalation
    - lateral_movement
    - reconnaissance
    - powershell
    - enumeration
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Get-DomainGroup.*/
name: Remote Process Instantiation via DCOM and PowerShell Script Block
id: fa1c3040-4680-11ec-a618-3e22fbd008af
version: 1
schema_version: "1.0"
date: "2026-04-09"
author: SOCFortress LLC
status: production
type: TTP

description: >
  The following analytic detects the execution of PowerShell commands that initiate 
  a process on a remote endpoint via the DCOM protocol. It leverages PowerShell Script 
  Block Logging (EventCode=4104) to identify the use of ShellExecute and ExecuteShellCommand 
  methods on Document objects. This activity is significant as it may indicate lateral 
  movement or remote code execution attempts by adversaries. If confirmed malicious, 
  this behavior could allow attackers to execute arbitrary code on remote systems, 
  potentially leading to further compromise and persistence within the network.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Document.Application.ShellExecute*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Document.ActiveView.ExecuteShellCommand*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-09 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-09 23:59:59.999"

how_to_implement: >
  To successfully implement this analytic, you will need to enable PowerShell Script 
  Block Logging on some or all endpoints. The Wazuh agent ossec.conf should include 
  the Microsoft-Windows-PowerShell/Operational event channel. This detection monitors 
  for DCOM ShellExecute and ExecuteShellCommand methods targeting Document objects. 
  Validate that data_win_eventdata_scriptBlockText field is being populated in 
  Elasticsearch/Wazuh Indexer.

known_false_positives: >
  Administrators may leverage DCOM to start a process on remote systems, but this 
  activity is usually limited to a small set of hosts or users. Validate that such 
  activity is authorized within your organization.

references:
  - https://attack.mitre.org/techniques/T1021/003/
  - https://www.cybereason.com/blog/dcom-lateral-movement-techniques
  - https://help.splunk.com/en/security-offerings/splunk-user-behavior-analytics/get-data-in/5.4.1/add-other-data-to-splunk-uba/configure-powershell-logging-to-see-powershell-anomalies-in-splunk-uba.html

response:
  message: >
    DCOM remote process instantiation detected on $agent_name$ by user 
    $data_win_eventdata_user$. Script block: $data_win_eventdata_scriptBlockText$. 
    This indicates potential lateral movement via DCOM ShellExecute. 
    MITRE ATT&CK: T1021.003
  risk_score: 50
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 50
    - field: data_win_eventdata_user
      type: user
      score: 50
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Active Directory Lateral Movement
  asset_type: Endpoint
  mitre_attack_id:
    - T1021.003
  custom_tags:
    - dcom_lateral_movement
    - shellexecute
    - remote_code_execution
    - powershell
    - activex
    - document_object
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND (data_win_eventdata_scriptBlockText:/.*Document\.Application\.ShellExecute.*/ OR data_win_eventdata_scriptBlockText:/.*Document\.ActiveView\.ExecuteShellCommand.*/)
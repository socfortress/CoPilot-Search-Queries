name: Interactive Session on Remote Endpoint with PowerShell
id: a4e8f3a4-48b2-11ec-bcfc-3e22fbd008af
version: 1
schema_version: "1.0"
date: "2026-04-09"
author: SOCFortress LLC
status: production
type: TTP

description: >
  The following analytic detects the use of the `Enter-PSSession` cmdlet to establish 
  an interactive session on a remote endpoint via the WinRM protocol. It leverages 
  PowerShell Script Block Logging (EventID 4104) to identify this activity by searching 
  for specific script block text patterns. This behavior is significant as it may indicate 
  lateral movement or remote code execution attempts by adversaries. If confirmed 
  malicious, this activity could allow attackers to execute commands remotely, potentially 
  leading to further compromise of the network and unauthorized access to sensitive 
  information.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Enter-PSSession*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*-ComputerName*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-09 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-09 23:59:59.999"

how_to_implement: >
  To successfully implement this analytic, you will need to enable PowerShell Script 
  Block Logging (EventID 4104) on some or all endpoints. The Wazuh agent ossec.conf 
  should include the Microsoft-Windows-PowerShell/Operational event channel. This 
  detection monitors for the Enter-PSSession cmdlet with -ComputerName parameter for 
  remote interactive sessions. Validate that data_win_eventdata_scriptBlockText field 
  is being populated in Elasticsearch/Wazuh Indexer.

known_false_positives: >
  Administrators may leverage WinRM and `Enter-PSSession` for administrative and 
  troubleshooting tasks. This activity is usually limited to a small set of hosts or 
  users. In certain environments, tuning may not be possible. Filter based on user 
  context and whether the action was expected and authorized within your organization.

references:
  - https://attack.mitre.org/techniques/T1021/006/
  - https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.core/enter-pssession?view=powershell-7.2
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1021.006/T1021.006.md

response:
  message: >
    Interactive PSSession detected from $agent_name$ by user $data_win_eventdata_user$. 
    Remote computer: Script block: $data_win_eventdata_scriptBlockText$. 
    This indicates WinRM-based remote interactive session/lateral movement activity. 
    MITRE ATT&CK: T1021.006
  risk_score: 65
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 65
    - field: data_win_eventdata_user
      type: user
      score: 65
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Active Directory Lateral Movement
    - Lateral Movement
    - Remote Code Execution
  asset_type: Endpoint
  mitre_attack_id:
    - T1021.006
  custom_tags:
    - enter_pssession
    - winrm
    - remote_session
    - lateral_movement
    - remote_code_execution
    - remote_execution
    - powershell
    - interactive_session
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Enter-PSSession.*/ AND data_win_eventdata_scriptBlockText:/.*-ComputerName.*/
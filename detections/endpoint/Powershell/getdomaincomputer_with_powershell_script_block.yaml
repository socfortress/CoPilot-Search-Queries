name: Get-DomainComputer with PowerShell Script Block
id: f64da023-b988-4775-8d57-38e512beb56e
version: 1
schema_version: "1.0"
date: "2026-04-09"
author: SOCFortress LLC
status: production
type: TTP

description: >
  The following analytic detects the execution of the `Get-DomainComputer` cmdlet using 
  PowerShell Script Block Logging (EventID 4104). This cmdlet is part of PowerView, a 
  tool often used for enumerating domain computers within Windows environments. The 
  detection leverages script block text analysis to identify this specific command. 
  Monitoring this activity is crucial as it can indicate an adversary's attempt to gather 
  information about domain computers, which is a common step in Active Directory 
  reconnaissance. If confirmed malicious, this activity could lead to further network 
  enumeration and potential lateral movement within the domain.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Get-DomainComputer*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-09 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-09 23:59:59.999"

how_to_implement: >
  To successfully implement this analytic, you will need to enable PowerShell Script 
  Block Logging (EventID 4104) on some or all endpoints. The Wazuh agent ossec.conf 
  should include the Microsoft-Windows-PowerShell/Operational event channel. This 
  detection monitors for the Get-DomainComputer cmdlet from PowerView, which is used 
  for domain computer enumeration. Validate that data_win_eventdata_scriptBlockText 
  field is being populated in Elasticsearch/Wazuh Indexer.

known_false_positives: >
  Administrators or power users may use PowerView for legitimate troubleshooting and 
  network discovery purposes. Filter based on user context and whether the action was 
  expected and authorized within your organization.

references:
  - https://attack.mitre.org/techniques/T1018/
  - https://powersploit.readthedocs.io/en/latest/Recon/Get-DomainComputer/
  - https://github.com/S1ckB0y1337/Active-Directory-Exploitation-Cheat-Sheet

response:
  message: >
    Get-DomainComputer execution detected on $agent_name$ by user $data_win_eventdata_user$. 
    Script block: $data_win_eventdata_scriptBlockText$. 
    This indicates domain computer enumeration/network discovery/reconnaissance activity for lateral movement planning. 
    MITRE ATT&CK: T1018
  risk_score: 52
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 52
    - field: data_win_eventdata_user
      type: user
      score: 52
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Active Directory Discovery
    - Remote System Discovery
    - Lateral Movement
  asset_type: Endpoint
  mitre_attack_id:
    - T1018
  custom_tags:
    - get_domaincomputer
    - powerview
    - computer_enumeration
    - domain_computers
    - network_discovery
    - lateral_movement
    - reconnaissance
    - powershell
    - enumeration
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Get-DomainComputer.*/
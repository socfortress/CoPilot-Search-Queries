name: Windows PowerView SPN Discovery
id: a7093c28-796c-4ebb-9997-e2c18b870837
version: 1
schema_version: "1.0"
date: "2026-04-10"
author: SOCFortress LLC
status: production
type: TTP

description: >
  The following analytic detects the execution of the `Get-DomainUser` or `Get-NetUser` 
  PowerShell cmdlets with the `-SPN` parameter, indicating the use of PowerView for SPN 
  discovery. It leverages PowerShell Script Block Logging (EventCode=4104) to identify 
  these specific commands. This activity is significant as it suggests an attempt to 
  enumerate domain accounts associated with Service Principal Names (SPNs), a common 
  precursor to Kerberoasting attacks. If confirmed malicious, this could allow an 
  attacker to identify and target accounts for credential theft, potentially leading 
  to unauthorized access and privilege escalation within the network.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Get-NetUser*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Get-DomainUser*"
            minimum_should_match: 1
        - wildcard:
            data_win_eventdata_scriptBlockText: "*-SPN*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-10 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-10 23:59:59.999"

how_to_implement: >
  To successfully implement this analytic, you will need to enable PowerShell Script 
  Block Logging on some or all endpoints. The Wazuh agent ossec.conf should include 
  the Microsoft-Windows-PowerShell/Operational event channel. This detection monitors 
  for the use of Get-DomainUser or Get-NetUser with the -SPN parameter to enumerate 
  accounts with Service Principal Names for Kerberoasting. Validate that 
  data_win_eventdata_scriptBlockText field is being populated in Elasticsearch/Wazuh 
  Indexer.

known_false_positives: >
  False positives may include Administrators using PowerView for legitimate 
  troubleshooting and management purposes. Filter based on user context and whether 
  the action was expected and authorized within your organization.

references:
  - https://book.hacktricks.xyz/windows-hardening/active-directory-methodology/kerberoast
  - https://github.com/PowerShellMafia/PowerSploit/blob/master/Recon/PowerView.ps1
  - https://www.ired.team/offensive-security-experiments/active-directory-kerberos-abuse/t1208-kerberoasting
  - https://attack.mitre.org/techniques/T1558/003

response:
  message: >
    PowerView SPN discovery detected on $agent_name$ by user $data_win_eventdata_user$. 
    Script block: $data_win_eventdata_scriptBlockText$. Adversary is enumerating SPN 
    accounts for Kerberoasting and credential theft. MITRE ATT&CK: T1558.003
  risk_score: 50
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 50
    - field: data_win_eventdata_user
      type: user
      score: 50
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - CISA AA23-347A
    - Rhysida Ransomware
    - Active Directory Kerberos Attacks
    - Interlock Ransomware
  asset_type: Endpoint
  mitre_attack_id:
    - T1558.003
  custom_tags:
    - powerview
    - spn_discovery
    - get_domainuser
    - get_netuser
    - kerberoasting
    - spn_enumeration
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND (data_win_eventdata_scriptBlockText:/.*Get-NetUser.*/ OR data_win_eventdata_scriptBlockText:/.*Get-DomainUser.*/) AND data_win_eventdata_scriptBlockText:/.*-SPN.*/
name: Powershell Remove Windows Defender Directory
id: windows-powershell-remove-windows-defender-directory-001
version: 1
schema_version: "1.0"
date: "2026-03-10"
author: SOCFortress LLC
status: production
type: TTP

description: >
  Detects a suspicious PowerShell command attempting to delete the Windows Defender 
  directory. It leverages PowerShell Script Block Logging to identify commands 
  containing "rmdir" and targeting the Windows Defender path. This activity is 
  significant as it may indicate an attempt to disable or corrupt Windows Defender, 
  a key security component. If confirmed malicious, this action could allow an 
  attacker to bypass endpoint protection, facilitating further malicious activities 
  without detection.

data_source:
  - PowerShell Script Block Logging 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*rmdir*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Windows Defender*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_system_computer
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-10 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-10 23:59:59.999"

how_to_implement: >
  This detection requires PowerShell Script Block Logging (EventCode 4104) enabled 
  on Windows endpoints. Enable via registry: HKLM\SOFTWARE\Policies\Microsoft\Windows\
  PowerShell\ScriptBlockLogging\EnableScriptBlockLogging = 1. The Wazuh agent 
  ossec.conf must include the Microsoft-Windows-PowerShell/Operational event channel. 
  The index pattern should match your Wazuh index naming convention.

known_false_positives: >
  No false positives have been identified at this time. Any attempt to delete the 
  Windows Defender directory should be treated as highly suspicious.

references:
  - https://attack.mitre.org/techniques/T1562/001/
  - https://www.microsoft.com/security/blog/2022/01/15/destructive-malware-targeting-ukrainian-organizations/

response:
  message: >
    Windows Defender directory deletion attempt detected on $agent_name$. 
    Script block: $data_win_eventdata_scriptBlockText$. 
    User: $data_win_eventdata_user$. MITRE ATT&CK: T1562.001
  risk_score: 95
  severity: critical
  risk_objects:
    - field: agent_name
      type: system
      score: 95
  threat_objects: []

tags:
  analytic_story:
    - Data Destruction
    - WhisperGate
    - Endpoint Protection Bypass
    - Compromised Windows Host
  asset_type: Endpoint
  mitre_attack_id:
    - T1562.001
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*rmdir.*/ AND data_win_eventdata_scriptBlockText:/.*Windows Defender.*/
name: Windows Account Discovery for None Disable User Account
id: eddbf5ba-b89e-47ca-995e-2d259804e55e
version: 1
schema_version: "1.0"
date: "2026-04-10"
author: SOCFortress LLC
status: production
type: Hunting

description: >
  The following analytic detects the execution of the PowerView PowerShell cmdlet 
  Get-NetUser with the UACFilter parameter set to NOT_ACCOUNTDISABLE, indicating an 
  attempt to enumerate Active Directory user accounts that are not disabled. This 
  detection leverages PowerShell Script Block Logging (EventCode 4104) to identify 
  the specific script block text. Monitoring this activity is significant as it may 
  indicate reconnaissance efforts by an attacker to identify active user accounts for 
  further exploitation. If confirmed malicious, this activity could lead to 
  unauthorized access, privilege escalation, or lateral movement within the network.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Get-NetUser*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*NOT_ACCOUNTDISABLE*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*-UACFilter*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-10 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-10 23:59:59.999"

how_to_implement: >
  To successfully implement this analytic, you will need to enable PowerShell Script 
  Block Logging on some or all endpoints. The Wazuh agent ossec.conf should include 
  the Microsoft-Windows-PowerShell/Operational event channel. This detection monitors 
  for the use of Get-NetUser with the -UACFilter parameter set to NOT_ACCOUNTDISABLE 
  to enumerate active user accounts in Active Directory. Validate that 
  data_win_eventdata_scriptBlockText field is being populated in Elasticsearch/Wazuh Indexer.

known_false_positives: >
  Administrators may leverage PowerView for legitimate purposes such as Active Directory 
  auditing or troubleshooting. Filter based on user context and whether the action was 
  expected and authorized within your organization.

references:
  - https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-347a
  - https://powersploit.readthedocs.io/en/stable/Recon/README/
  - https://book.hacktricks.xyz/windows-hardening/basic-powershell-for-pentesters/powerview
  - https://atomicredteam.io/discovery/T1087.001/
  - https://help.splunk.com/en/security-offerings/splunk-user-behavior-analytics/get-data-in/5.4.1/add-other-data-to-splunk-uba/configure-powershell-logging-to-see-powershell-anomalies-in-splunk-uba.html

response:
  message: >
    PowerView user discovery with NOT_ACCOUNTDISABLE filter detected on $agent_name$ 
    by user $data_win_eventdata_user$. Script block: $data_win_eventdata_scriptBlockText$. 
    Adversary is enumerating active user accounts for exploitation and lateral movement 
    planning. MITRE ATT&CK: T1087.001
  risk_score: 40
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 40
    - field: data_win_eventdata_user
      type: user
      score: 40
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - CISA AA23-347A
  asset_type: Endpoint
  mitre_attack_id:
    - T1087.001
  custom_tags:
    - powerview
    - get_netuser
    - account_discovery
    - uacfilter
    - active_directory_enumeration
    - reconnaissance
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Get-NetUser.*/ AND data_win_eventdata_scriptBlockText:/.*NOT_ACCOUNTDISABLE.*/ AND data_win_eventdata_scriptBlockText:/.*-UACFilter.*/
name: Windows Exfiltration Over C2 Via Invoke RestMethod
id: 06ade821-f6fa-40d0-80af-15bc1d45b3ba
version: 1
schema_version: "1.0"
date: "2026-03-30"
author: SOCFortress LLC
status: production
type: TTP
description: >
  Detects potential data exfiltration using PowerShell's Invoke-RestMethod
  with HTTP POST and -InFile parameters, indicating an attempt to upload files
  to an external command and control server. This technique is used by threat
  actors including APT37, Winter Vivern, and Hellcat Ransomware to exfiltrate
  sensitive data such as desktop screenshots or documents to attacker-controlled
  infrastructure. Immediate investigation is recommended to determine the intent
  and scope of the activity.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Invoke-RestMethod*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*-Uri*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*-Method*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Post*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*-InFile*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_path
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-30 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-30 23:59:59.999"

how_to_implement: >
  Requires PowerShell Script Block Logging enabled on endpoints.
  Enable via Group Policy: Computer Configuration → Administrative Templates
  → Windows Components → Windows PowerShell → Turn on PowerShell Script Block
  Logging. Confirmed flowing in this environment.

known_false_positives: >
  False positives should be limited. Legitimate use of Invoke-RestMethod
  with POST and -InFile for API integrations or automation scripts may occur.
  Review the URI destination and file being uploaded to determine legitimacy.

references:
  - https://attack.mitre.org/techniques/T1041/
  - https://twitter.com/_CERT_UA/status/1620781684257091584
  - https://cert.gov.ua/article/3761104

response:
  message: >
    PowerShell Invoke-RestMethod POST file upload detected on $agent_name$
    by $data_win_eventdata_user$.
    Script: $data_win_eventdata_scriptBlockText$.
    MITRE ATT&CK: T1041
  risk_score: 49
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 49
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: script_block

tags:
  analytic_story:
    - Microsoft WSUS CVE-2025-59287
    - Hellcat Ransomware
    - APT37 Rustonotto and FadeStealer
    - Winter Vivern
    - Water Gamayun
  asset_type: Endpoint
  mitre_attack_id:
    - T1041
  custom_tags:
    - invoke_restmethod
    - exfiltration
    - c2
    - powershell
    - apt37
    - winter_vivern
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Invoke-RestMethod.*/ AND data_win_eventdata_scriptBlockText:/.*-Uri.*/ AND data_win_eventdata_scriptBlockText:/.*-Method.*/ AND data_win_eventdata_scriptBlockText:/.*Post.*/ AND data_win_eventdata_scriptBlockText:/.*-InFile.*/
name: Remote System Discovery with Adsisearcher
id: 70803451-0047-4e12-9d63-77fa7eb8649c
version: 1
schema_version: "1.0"
date: "2026-04-09"
author: SOCFortress LLC
status: production
type: TTP

description: >
  The following analytic detects the use of the `[Adsisearcher]` type accelerator in 
  PowerShell scripts to query Active Directory for domain computers. It leverages 
  PowerShell Script Block Logging (EventCode=4104) to identify specific script blocks 
  containing `adsisearcher` and `objectcategory=computer` with methods like `findAll()` 
  or `findOne()`. This activity is significant as it may indicate an attempt by 
  adversaries or Red Teams to perform Active Directory discovery and gain situational 
  awareness of the network infrastructure. If confirmed malicious, this could lead to 
  further reconnaissance and potential lateral movement within the network.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*adsisearcher*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*objectcategory=computer*"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*findAll()*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*findOne()*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-09 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-09 23:59:59.999"

how_to_implement: >
  To successfully implement this analytic, you will need to enable PowerShell Script 
  Block Logging on some or all endpoints. The Wazuh agent ossec.conf should include 
  the Microsoft-Windows-PowerShell/Operational event channel. This detection monitors 
  for ADSI searcher queries targeting computer objects using findAll() or findOne() 
  methods. Validate that data_win_eventdata_scriptBlockText field is being populated 
  in Elasticsearch/Wazuh Indexer.

known_false_positives: >
  Administrators or power users may use Adsisearcher for legitimate Active Directory 
  troubleshooting or discovery operations. Filter based on user context and whether 
  the action was expected and authorized within your organization.

references:
  - https://attack.mitre.org/techniques/T1018/
  - https://devblogs.microsoft.com/scripting/use-the-powershell-adsisearcher-type-accelerator-to-search-active-directory/
  - https://help.splunk.com/en/security-offerings/splunk-user-behavior-analytics/get-data-in/5.4.1/add-other-data-to-splunk-uba/configure-powershell-logging-to-see-powershell-anomalies-in-splunk-uba.html

response:
  message: >
    Active Directory system discovery with adsisearcher detected on $agent_name$ by 
    user $data_win_eventdata_user$. Script block: $data_win_eventdata_scriptBlockText$. 
    Adversary is performing AD reconnaissance for situational awareness and potential 
    lateral movement planning. MITRE ATT&CK: T1018
  risk_score: 50
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 50
    - field: data_win_eventdata_user
      type: user
      score: 50
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Active Directory Discovery
  asset_type: Endpoint
  mitre_attack_id:
    - T1018
  custom_tags:
    - active_directory_discovery
    - adsisearcher
    - objectcategory_computer
    - powershell
    - adsi
    - reconnaissance
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*[Aa][Dd][Ss][Ii][Ss][Ee][Aa][Rr][Cc][Hh].*/ AND data_win_eventdata_scriptBlockText:/.*[Oo][Bb][Jj][Ee][Cc][Tt][Cc][Aa][Tt][Ee][Gg][Oo][Rr][Yy]=computer.*/ AND (data_win_eventdata_scriptBlockText:/.*[Ff]ind[Aa]ll\(\).*/ OR data_win_eventdata_scriptBlockText:/.*[Ff]ind[Oo]ne\(\).*/)
name: Powershell Load Module in Meterpreter
id: windows-powershell-load-module-in-meterpreter-001
version: 1
schema_version: "1.0"
date: "2026-03-10"
author: SOCFortress LLC
status: production
type: TTP

description: >
  Detects the execution of suspicious PowerShell commands associated with Meterpreter 
  modules, such as "MSF.Powershell" and "MSF.Powershell.Meterpreter". It leverages 
  PowerShell Script Block Logging (EventCode 4104) to capture and analyze the full 
  command sent to PowerShell. This activity is significant as it indicates potential 
  post-exploitation actions, including credential dumping and persistence mechanisms. 
  If confirmed malicious, an attacker could gain extensive control over the compromised 
  system, escalate privileges, and maintain long-term access, posing a severe threat 
  to the environment.

data_source:
  - PowerShell Script Block Logging 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*MSF.Powershell*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*MSF.Powershell.Meterpreter*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*MSF.Powershell.Meterpreter.Kiwi*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*MSF.Powershell.Meterpreter.Transport*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_system_computer
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-10 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-10 23:59:59.999"

how_to_implement: >
  This detection requires PowerShell Script Block Logging (EventCode 4104) enabled 
  on Windows endpoints. Enable via registry: HKLM\SOFTWARE\Policies\Microsoft\Windows\
  PowerShell\ScriptBlockLogging\EnableScriptBlockLogging = 1. The Wazuh agent 
  ossec.conf must include the Microsoft-Windows-PowerShell/Operational event channel. 
  The index pattern should match your Wazuh index naming convention.

known_false_positives: >
  False positives should be very limited as this is strict to MetaSploit behavior. 
  Monitor for any legitimate use cases and adjust filters accordingly.

references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://github.com/OJ/metasploit-payloads/blob/master/powershell/MSF.Powershell/Scripts.cs
  - https://www.splunk.com/en_us/blog/security/powershell-detections-threat-research-release-august-2021.html

response:
  message: >
    Meterpreter PowerShell module detected on $agent_name$. 
    Script block: $data_win_eventdata_scriptBlockText$. 
    User: $data_win_eventdata_user$. MITRE ATT&CK: T1059.001
  risk_score: 85
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 85
  threat_objects: []

tags:
  analytic_story:
    - MetaSploit
    - Post-Exploitation
    - Compromised Windows Host
  asset_type: Endpoint
  mitre_attack_id:
    - T1059.001
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND (data_win_eventdata_scriptBlockText:/.*MSF\.Powershell.*/ OR data_win_eventdata_scriptBlockText:/.*MSF\.Powershell\.Meterpreter.*/ OR data_win_eventdata_scriptBlockText:/.*MSF\.Powershell\.Meterpreter\.Kiwi.*/ OR data_win_eventdata_scriptBlockText:/.*MSF\.Powershell\.Meterpreter\.Transport.*/)
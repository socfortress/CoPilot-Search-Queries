name: Windows PowerShell Process With Malicious String
id: 5df35d50-e1a3-4a52-a337-92e69d9b1b8a
version: 1
schema_version: "1.0"
date: "2026-04-07"
author: SOCFortress LLC
status: production
type: TTP

description: >
  The following analytic detects the execution of multiple offensive toolkits and commands
  through PowerShell process execution. This method captures commands given directly to
  powershell.exe (EventID 1) and PowerShell script block content (EventID 4104), allowing
  for the identification of suspicious activities including several well-known tools used
  for credential theft, lateral movement, and persistence. Detections include PowerSploit
  functions, PowerShell Empire patterns, Mimikatz execution, credential extraction tools,
  and other malicious PowerShell patterns. If confirmed malicious, this could lead to
  unauthorized access, privilege escalation, and potential compromise of sensitive information
  within the environment.

data_source:
  - Sysmon EventID 1
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - bool:
            should:
              - bool:
                  must:
                    - term:
                        data_win_system_eventID: "1"
                    - bool:
                        should:
                          - wildcard:
                              data_win_eventdata_commandLine: "*Invoke-DllInjection*"
                          - wildcard:
                              data_win_eventdata_commandLine: "*Invoke-ReflectivePEInjection*"
                          - wildcard:
                              data_win_eventdata_commandLine: "*Invoke-Shellcode*"
                          - wildcard:
                              data_win_eventdata_commandLine: "*Invoke-WmiCommand*"
                          - wildcard:
                              data_win_eventdata_commandLine: "*Add-Persistence*"
                          - wildcard:
                              data_win_eventdata_commandLine: "*Install-SSP*"
                          - wildcard:
                              data_win_eventdata_commandLine: "*Invoke-Mimikatz*"
                          - wildcard:
                              data_win_eventdata_commandLine: "*Get-GPPPassword*"
                          - wildcard:
                              data_win_eventdata_commandLine: "*Get-VaultCredential*"
                          - wildcard:
                              data_win_eventdata_commandLine: "*Out-Minidump*"
                          - wildcard:
                              data_win_eventdata_commandLine: "*Invoke-Kerberoast*"
                          - wildcard:
                              data_win_eventdata_commandLine: "*sekurlsa::*"
                          - wildcard:
                              data_win_eventdata_commandLine: "*lsadump::*"
                          - wildcard:
                              data_win_eventdata_commandLine: "*Invoke-AmsiBypass*"
                          - wildcard:
                              data_win_eventdata_commandLine: "*Invoke-PowerShellTcp*"
                          - wildcard:
                              data_win_eventdata_commandLine: "*Add-Exfiltration*"
                          - wildcard:
                              data_win_eventdata_commandLine: "*Invoke-SafetyKatz*"
                          - wildcard:
                              data_win_eventdata_commandLine: "*Invoke-SharpBypassUAC*"
                          - wildcard:
                              data_win_eventdata_commandLine: "*Invoke-SharpKatz*"
                          - wildcard:
                              data_win_eventdata_commandLine: "*Invoke-SharpPrintNightmare*"
                          - wildcard:
                              data_win_eventdata_commandLine: "*Invoke-SharpSploit*"
                          - wildcard:
                              data_win_eventdata_commandLine: "*Invoke-SharpWSUS*"
                          - wildcard:
                              data_win_eventdata_commandLine: "*Invoke-Snaffler*"
                        minimum_should_match: 1
              - bool:
                  must:
                    - term:
                        data_win_system_eventID: "4104"
                    - bool:
                        should:
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*Invoke-DllInjection*"
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*Invoke-ReflectivePEInjection*"
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*Invoke-Shellcode*"
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*Invoke-WmiCommand*"
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*Add-Persistence*"
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*Install-SSP*"
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*Invoke-Mimikatz*"
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*Get-GPPPassword*"
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*Get-VaultCredential*"
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*Out-Minidump*"
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*Invoke-Kerberoast*"
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*sekurlsa::*"
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*lsadump::*"
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*Invoke-AmsiBypass*"
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*Invoke-PowerShellTcp*"
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*Add-Exfiltration*"
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*Invoke-SafetyKatz*"
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*Invoke-SharpBypassUAC*"
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*Invoke-SharpKatz*"
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*Invoke-SharpPrintNightmare*"
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*Invoke-SharpSploit*"
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*Invoke-SharpWSUS*"
                          - wildcard:
                              data_win_eventdata_scriptBlockText: "*Invoke-Snaffler*"
                        minimum_should_match: 1
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_commandLine
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_image
    - data_win_eventdata_parentImage
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-07 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-07 23:59:59.999"

how_to_implement: >
  Requires Sysmon EventID 1 (Process Creation) and PowerShell Script Block Logging
  EventID 4104 to be enabled on endpoints. Ensure Sysmon version 6.0.4 or later is
  configured with complete command-line argument capture. Configure PowerShell Script
  Block Logging via Group Policy: Computer Configuration > Administrative Templates >
  Windows Components > Windows PowerShell > Turn on PowerShell Script Block Logging.
  The detection uses a lookup table (malicious_powershell_strings.csv) containing 130+
  malicious PowerShell patterns including PowerSploit, Empire, Mimikatz, and other
  offensive toolkit signatures. Ensure the lookup table is present and updated regularly.
  The detection is based on data that originates from Endpoint Detection and Response
  (EDR) agents and must be mapped to the Endpoint data model.

known_false_positives: >
  Legitimate PowerShell administrative scripts may trigger this detection if they contain
  similar string patterns. System administrators performing authorized tasks, script
  developers testing code, and automated security tools may generate false positives.
  Review the context of PowerShell execution, including parent process, user context,
  and command intent to determine legitimacy. Implement tuning rules to exclude known
  legitimate administrative scripts and tools from this detection.

references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://github.com/PowerShellMafia/PowerSploit
  - https://github.com/PowerShellEmpire/
  - https://github.com/S3cur3Th1sSh1t/PowerSharpPack
  - https://www.splunk.com/en_us/blog/security/hunting-for-malicious-powershell-using-script-block-logging.html

response:
  message: >
    Malicious PowerShell execution detected on $agent_name$ by user $data_win_eventdata_user$.
    Detected Pattern: Malicious string match from lookup table.
    Source: EventID $data_win_system_eventID$ (Sysmon Process or PowerShell Script Block).
    Process: $data_win_eventdata_image$.
    Command: $data_win_eventdata_commandLine$ / $data_win_eventdata_scriptBlockText$.
    MITRE ATT&CK: T1059.001 (Command and Scripting Interpreter: PowerShell)
  risk_score: 86
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 40
    - field: data_win_eventdata_user
      type: user
      score: 35
  threat_objects:
    - field: data_win_eventdata_commandLine
      type: process_command
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script


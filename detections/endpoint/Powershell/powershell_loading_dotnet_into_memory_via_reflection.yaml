name: PowerShell Loading DotNET into Memory via Reflection
id: windows-powershell-loading-dotnet-into-memory-via-reflection-001
version: 1
schema_version: "1.0"
date: "2026-03-10"
author: SOCFortress LLC
status: production
type: Anomaly

description: >
  Detects the use of PowerShell scripts to load .NET assemblies into memory via 
  reflection, a technique often used in malicious activities such as those by Empire 
  and Cobalt Strike. It leverages PowerShell Script Block Logging (EventCode 4104) 
  to capture and analyze the full command executed. This behavior is significant as 
  it can indicate advanced attack techniques aiming to execute code in memory, 
  bypassing traditional defenses. If confirmed malicious, this activity could lead 
  to unauthorized code execution, privilege escalation, and persistent access 
  within the environment.

data_source:
  - PowerShell Script Block Logging 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Reflection.Assembly]::Load*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Reflection.Assembly.Load*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*UnsafeLoadFrom*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*.LoadFrom(*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*.LoadModule(*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*.LoadWithPartialName*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*ReflectionOnlyLoad*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_system_computer
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-10 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-10 23:59:59.999"

how_to_implement: >
  This detection requires PowerShell Script Block Logging (EventCode 4104) enabled 
  on Windows endpoints. Enable via registry: HKLM\SOFTWARE\Policies\Microsoft\Windows\
  PowerShell\ScriptBlockLogging\EnableScriptBlockLogging = 1. The Wazuh agent 
  ossec.conf must include the Microsoft-Windows-PowerShell/Operational event channel. 
  The index pattern should match your Wazuh index naming convention.

known_false_positives: >
  False positives should be limited as day-to-day scripts do not typically use 
  reflection-based assembly loading. Monitor for legitimate third-party applications 
  that may use this technique and adjust filters accordingly.

references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://docs.microsoft.com/en-us/dotnet/api/system.reflection.assembly?view=net-5.0
  - https://blog.palantir.com/tampering-with-windows-event-tracing-background-offense-and-defense-4be7ac62ac63
  - https://www.crowdstrike.com/blog/investigating-powershell-command-and-script-logging/

response:
  message: >
    Reflective .NET assembly loading detected in PowerShell on $agent_name$. 
    Script block: $data_win_eventdata_scriptBlockText$. 
    User: $data_win_eventdata_user$. MITRE ATT&CK: T1059.001
  risk_score: 65
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 65
  threat_objects: []

tags:
  analytic_story:
    - Winter Vivern
    - AgentTesla
    - AsyncRAT
    - Hermetic Wiper
    - Malicious PowerShell
    - Data Destruction
    - Hellcat Ransomware
    - Compromised Windows Host
  asset_type: Endpoint
  mitre_attack_id:
    - T1059.001
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND (data_win_eventdata_scriptBlockText:/.*Reflection\.Assembly\]::Load.*/ OR data_win_eventdata_scriptBlockText:/.*Reflection\.Assembly\.Load.*/ OR data_win_eventdata_scriptBlockText:/.*UnsafeLoadFrom.*/ OR data_win_eventdata_scriptBlockText:/.*\.LoadFrom\(.*/ OR data_win_eventdata_scriptBlockText:/.*\.LoadModule\(.*/ OR data_win_eventdata_scriptBlockText:/.*\.LoadWithPartialName.*/ OR data_win_eventdata_scriptBlockText:/.*ReflectionOnlyLoad.*/)
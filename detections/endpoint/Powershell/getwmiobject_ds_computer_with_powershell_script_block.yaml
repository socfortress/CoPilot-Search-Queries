name: Get-WmiObject Ds_Computer with PowerShell Script Block
id: 29b99201-723c-4118-847a-db2b3d3fb8ea
version: 1
schema_version: "1.0"
date: "2026-04-09"
author: SOCFortress LLC
status: production
type: TTP

description: >
  The following analytic detects the execution of the `Get-WmiObject` cmdlet with the 
  `DS_Computer` class parameter via PowerShell Script Block Logging (EventID 4104). This 
  detection leverages script block text to identify queries targeting domain computers 
  using WMI. Monitoring this activity is crucial as adversaries and Red Teams may use it 
  for Active Directory Discovery and situational awareness. If confirmed malicious, this 
  behavior could allow attackers to map out domain computers, facilitating further attacks 
  such as lateral movement or privilege escalation.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Get-WmiObject*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*root\\directory\\ldap*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*ds_computer*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-09 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-09 23:59:59.999"

how_to_implement: >
  To successfully implement this analytic, you will need to enable PowerShell Script 
  Block Logging (EventID 4104) on some or all endpoints. The Wazuh agent ossec.conf 
  should include the Microsoft-Windows-PowerShell/Operational event channel. This 
  detection monitors for the Get-WmiObject cmdlet with DS_Computer class targeting the 
  LDAP namespace. Validate that data_win_eventdata_scriptBlockText field is being 
  populated in Elasticsearch/Wazuh Indexer.

known_false_positives: >
  Administrators or power users may use this PowerShell cmdlet for legitimate 
  troubleshooting and Active Directory queries. Filter based on user context and whether 
  the action was expected and authorized within your organization.

references:
  - https://attack.mitre.org/techniques/T1018/
  - https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.management/get-wmiobject?view=powershell-5.1
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1018/T1018.md

response:
  message: >
    Get-WmiObject DS_Computer LDAP query detected on $agent_name$ by user 
    $data_win_eventdata_user$. Script block: $data_win_eventdata_scriptBlockText$. 
    This indicates domain computer enumeration via WMI LDAP namespace/reconnaissance activity. 
    MITRE ATT&CK: T1018
  risk_score: 55
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 55
    - field: data_win_eventdata_user
      type: user
      score: 55
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Active Directory Discovery
    - Remote System Discovery
    - Domain Computer Discovery
  asset_type: Endpoint
  mitre_attack_id:
    - T1018
  custom_tags:
    - get_wmiobject
    - ds_computer
    - ldap_namespace
    - computer_enumeration
    - domain_computers
    - wmi_query
    - reconnaissance
    - powershell
    - enumeration
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Get-WmiObject.*/ AND data_win_eventdata_scriptBlockText:/.*root\\\\directory\\\\ldap.*/ AND data_win_eventdata_scriptBlockText:/.*ds_computer.*/
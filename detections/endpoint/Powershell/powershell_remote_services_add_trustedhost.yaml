name: Powershell Remote Services Add TrustedHost
id: windows-powershell-remote-services-add-trustedhost-001
version: 1
schema_version: "1.0"
date: "2026-03-10"
author: SOCFortress LLC
status: production
type: TTP

description: >
  Detects the execution of a PowerShell script that modifies the 'TrustedHosts' 
  configuration via EventCode 4104. It leverages PowerShell Script Block Logging 
  to identify commands targeting WSMan settings, specifically those altering or 
  concatenating trusted hosts. This activity is significant as it can indicate 
  attempts to manipulate remote connection settings, potentially allowing 
  unauthorized remote access. If confirmed malicious, this could enable attackers 
  to establish persistent remote connections, bypass security protocols, and gain 
  unauthorized access to sensitive systems and data.

data_source:
  - PowerShell Script Block Logging 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*WSMan*TrustedHosts*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_system_computer
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-10 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-10 23:59:59.999"

how_to_implement: >
  This detection requires PowerShell Script Block Logging (EventCode 4104) enabled 
  on Windows endpoints. Enable via registry: HKLM\SOFTWARE\Policies\Microsoft\Windows\
  PowerShell\ScriptBlockLogging\EnableScriptBlockLogging = 1. The Wazuh agent 
  ossec.conf must include the Microsoft-Windows-PowerShell/Operational event channel. 
  The index pattern should match your Wazuh index naming convention.

known_false_positives: >
  User and network administrators may legitimately use this function to add trusted 
  hosts for remote management purposes. Filter based on user context and approved 
  administrative activities to reduce false positives.

references:
  - https://attack.mitre.org/techniques/T1021/006/
  - https://malpedia.caad.fkie.fraunhofer.de/details/win.darkgate

response:
  message: >
    WSMan TrustedHosts modification detected on $agent_name$. 
    Script block: $data_win_eventdata_scriptBlockText$. 
    User: $data_win_eventdata_user$. MITRE ATT&CK: T1021.006
  risk_score: 58
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 58
  threat_objects: []

tags:
  analytic_story:
    - DarkGate Malware
    - Lateral Movement
    - Compromised Windows Host
  asset_type: Endpoint
  mitre_attack_id:
    - T1021.006
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*WSMan.*TrustedHosts.*/
name: Get-DomainUser with PowerShell Script Block
id: 61994268-04f4-11ec-865c-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-09"
author: SOCFortress LLC
status: production
type: TTP

description: >
  The following analytic detects the execution of the `Get-DomainUser` cmdlet using 
  PowerShell Script Block Logging (EventID 4104). This cmdlet is part of PowerView, 
  a tool often used for domain enumeration. The detection leverages PowerShell 
  operational logs to identify instances where this command is executed. Monitoring 
  this activity is crucial as it may indicate an adversary's attempt to gather 
  information about domain users, which is a common step in Active Directory Discovery. 
  If confirmed malicious, this activity could lead to further reconnaissance and 
  potential exploitation of domain resources.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Get-DomainUser*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-09 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-09 23:59:59.999"

how_to_implement: >
  The following Hunting analytic requires PowerShell operational logs to be imported. 
  The Wazuh agent ossec.conf should include the Microsoft-Windows-PowerShell/Operational 
  event channel. This detection monitors for the Get-DomainUser cmdlet, which is used 
  for domain user enumeration. Validate that data_win_eventdata_scriptBlockText field 
  is being populated in Elasticsearch/Wazuh Indexer.

known_false_positives: >
  Administrators or power users may use this command for legitimate troubleshooting 
  and system administration purposes. Filter based on user context and whether the 
  action was expected and authorized within your organization.

references:
  - https://powersploit.readthedocs.io/en/latest/Recon/Get-DomainUser/
  - https://attack.mitre.org/techniques/T1087/002/
  - https://github.com/S1ckB0y1337/Active-Directory-Exploitation-Cheat-Sheet

response:
  message: >
    Get-DomainUser execution detected on $agent_name$ by user $data_win_eventdata_user$. 
    Script block: $data_win_eventdata_scriptBlockText$. 
    This indicates domain user enumeration/reconnaissance activity for targeting. 
    MITRE ATT&CK: T1087.002
  risk_score: 50
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 50
    - field: data_win_eventdata_user
      type: user
      score: 50
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Active Directory Discovery
    - CISA AA23-347A
  asset_type: Endpoint
  mitre_attack_id:
    - T1087.002
  custom_tags:
    - get_domainuser
    - active_directory
    - user_enumeration
    - domain_users
    - reconnaissance
    - powershell
    - enumeration
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Get-DomainUser.*/
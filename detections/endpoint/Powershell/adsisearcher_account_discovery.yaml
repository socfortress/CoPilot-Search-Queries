name: AdsiSearcher Account Discovery
id: de7fcadc-04f3-11ec-a241-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-08"
author: SOCFortress LLC
status: production
type: TTP

description: >
  The following analytic detects the use of the `[adsisearcher]` type accelerator in 
  PowerShell to query Active Directory for domain users. It leverages PowerShell Script 
  Block Logging (EventID 4104) to identify script blocks containing `[adsisearcher]`, 
  `objectcategory=user`, and `.findAll()`. This activity is significant as it may 
  indicate an attempt by adversaries or Red Teams to enumerate domain users for 
  situational awareness and Active Directory discovery. If confirmed malicious, this 
  could lead to further reconnaissance, privilege escalation, or lateral movement 
  within the network.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*adsisearcher*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*objectcategory=user*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*findAll*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-08 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-08 23:59:59.999"

how_to_implement: >
  This detection requires PowerShell Script Block Logging (EventID 4104) to be enabled 
  on Windows endpoints. Enable PowerShell operational logs to be imported into the 
  Wazuh index. The Wazuh agent ossec.conf should include the 
  Microsoft-Windows-PowerShell/Operational event channel. The detection monitors for 
  the specific combination of three PowerShell constructs: the [adsisearcher] type 
  accelerator which enables LDAP queries, the LDAP filter for user objects 
  (objectcategory=user), and the findAll() method which returns all matching results.

known_false_positives: >
  Administrators or power users may use this command for legitimate Active Directory 
  troubleshooting and administration purposes. Filter based on user context and whether 
  the action was expected and authorized within your organization.

references:
  - https://attack.mitre.org/techniques/T1087/002/
  - https://www.blackhillsinfosec.com/red-blue-purple/
  - https://devblogs.microsoft.com/scripting/use-the-powershell-adsisearcher-type-accelerator-to-search-active-directory/

response:
  message: >
    ADSI user account discovery detected on $agent_name$ by user $data_win_eventdata_user$.
    PowerShell Script: $data_win_eventdata_scriptBlockText$. 
    This may indicate Active Directory reconnaissance activity.
  risk_score: 50
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 50
    - field: data_win_eventdata_user
      type: user
      score: 50
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Industroyer2
    - Active Directory Discovery
    - CISA AA23-347A
    - Data Destruction
    - Scattered Lapsus$ Hunters
  asset_type: Endpoint
  mitre_attack_id:
    - T1087.002
  custom_tags:
    - adsisearcher
    - active_directory
    - user_enumeration
    - ldap_query
    - powershell
    - reconnaissance
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*adsisearcher.*/ AND data_win_eventdata_scriptBlockText:/.*objectcategory=user.*/ AND data_win_eventdata_scriptBlockText:/.*findAll.*/
name: PowerShell COM Hijacking InProcServer32 Modification
id: ea61e291-af05-4716-932a-67faddb6ae6f
version: 1
schema_version: "1.0"
date: "2026-04-09"
author: SOCFortress LLC
status: production
type: TTP

description: >
  The following analytic detects attempts to modify or add a Component Object Model 
  (COM) entry to the InProcServer32 path within the registry using PowerShell. It 
  leverages PowerShell ScriptBlock Logging (EventID 4104) to identify suspicious script 
  blocks that target the InProcServer32 registry path. This activity is significant 
  because modifying COM objects can be used for persistence or privilege escalation by 
  attackers. If confirmed malicious, this could allow an attacker to execute arbitrary 
  code or maintain persistent access to the compromised system, posing a severe security risk.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Software\\Classes\\CLSID\\*\\InProcServer32*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-09 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-09 23:59:59.999"

how_to_implement: >
  The following analytic requires PowerShell operational logs to be imported. The Wazuh 
  agent ossec.conf should include the Microsoft-Windows-PowerShell/Operational event 
  channel. This detection monitors for PowerShell script blocks that target the 
  InProcServer32 registry path within Software\Classes\CLSID. Validate that 
  data_win_eventdata_scriptBlockText field is being populated in Elasticsearch/Wazuh Indexer.

known_false_positives: >
  False positives will be present if any scripts are adding to InProcServer32 for 
  legitimate purposes. Filter based on user context, registry paths being modified, 
  and whether the action was expected and authorized within your organization.

references:
  - https://attack.mitre.org/techniques/T1546/015/
  - https://www.splunk.com/en_us/blog/security/hunting-for-malicious-powershell-using-script-block-logging.html
  - https://blog.cluster25.duskrise.com/2022/09/23/in-the-footsteps-of-the-fancy-bear-powerpoint-graphite/
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1546.015/T1546.015.md

response:
  message: >
    PowerShell COM hijacking via InProcServer32 modification detected on $agent_name$ 
    by user $data_win_eventdata_user$. Script block: $data_win_eventdata_scriptBlockText$. 
    This indicates potential COM persistence/privilege escalation attempt. 
    MITRE ATT&CK: T1546.015, T1059.001
  risk_score: 70
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 70
    - field: data_win_eventdata_user
      type: user
      score: 70
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Malicious PowerShell
    - Persistence Techniques
    - Privilege Escalation
  asset_type: Endpoint
  mitre_attack_id:
    - T1059.001
    - T1546.015
  custom_tags:
    - com_hijacking
    - inprocserver32
    - registry_modification
    - persistence
    - privilege_escalation
    - powershell
    - clsid
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Software\\\\Classes\\\\CLSID\\\\.*\\\\InProcServer32.*/
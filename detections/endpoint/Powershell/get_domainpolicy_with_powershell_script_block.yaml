name: Get DomainPolicy with PowerShell Script Block
id: a360d2b2-065a-11ec-b0bf-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-09"
author: SOCFortress LLC
status: production
type: TTP

description: >
  The following analytic detects the execution of the `Get-DomainPolicy` cmdlet using 
  PowerShell Script Block Logging (EventID 4104). This command is used to obtain the 
  password policy in a Windows domain. This activity is significant as it indicates 
  potential reconnaissance efforts by adversaries or Red Teams to gather domain policy 
  information. If confirmed malicious, this behavior could lead to detailed knowledge of 
  domain security settings, aiding in privilege escalation or lateral movement within 
  the network.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Get-DomainPolicy*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-09 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-09 23:59:59.999"

how_to_implement: >
  Ensure PowerShell Script Block Logging (EventID 4104) is enabled on Windows endpoints. 
  Configure the Wazuh agent to forward PowerShell operational logs from 
  Microsoft-Windows-PowerShell/Operational channel. Validate that 
  data_win_eventdata_scriptBlockText field is being populated in Elasticsearch/Wazuh Indexer.

known_false_positives: >
  Administrators or power users may use Get-DomainPolicy for legitimate domain administration, 
  troubleshooting, and compliance auditing purposes. Filter based on user context and 
  whether the action was expected and authorized within your organization.

references:
  - https://github.com/S1ckB0y1337/Active-Directory-Exploitation-Cheat-Sheet
  - https://powersploit.readthedocs.io/en/latest/Recon/Get-DomainPolicy/
  - https://attack.mitre.org/techniques/T1201/
  - https://docs.microsoft.com/en-us/powershell/module/activedirectory/get-domainpolicy

response:
  message: >
    Get-DomainPolicy execution detected on $agent_name$ by user $data_win_eventdata_user$. 
    Script block: $data_win_eventdata_scriptBlockText$. 
    This indicates domain policy reconnaissance/enumeration activity. 
    MITRE ATT&CK: T1201
  risk_score: 45
  severity: low
  risk_objects:
    - field: agent_name
      type: system
      score: 45
    - field: data_win_eventdata_user
      type: user
      score: 45
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Active Directory Discovery
    - Password Policy Discovery
  asset_type: Endpoint
  mitre_attack_id:
    - T1201
  custom_tags:
    - get_domainpolicy
    - active_directory
    - domain_policy
    - policy_discovery
    - reconnaissance
    - powershell
    - enumeration
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Get-DomainPolicy.*/
name: PowerShell Invoke WmiExec Usage
id: windows-powershell-invoke-wmiexec-usage-001
version: 1
schema_version: "1.0"
date: "2026-03-10"
author: SOCFortress LLC
status: production
type: TTP

description: >
  Detects the execution of the Invoke-WmiExec utility within PowerShell Script Block 
  Logging (EventCode 4104). This detection leverages PowerShell script block logs to 
  identify instances where the Invoke-WmiExec command is used. Monitoring this activity 
  is crucial as it indicates potential lateral movement using WMI commands with NTLMv2 
  pass-the-hash authentication. If confirmed malicious, this activity could allow an 
  attacker to execute commands remotely on target systems, potentially leading to further 
  compromise and lateral spread within the network.

data_source:
  - PowerShell Script Block Logging 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*invoke-wmiexec*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - agent_name
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-10 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-10 23:59:59.999"

how_to_implement: >
  This detection requires PowerShell Script Block Logging (EventCode 4104) enabled 
  on Windows endpoints. Enable via registry: HKLM\SOFTWARE\Policies\Microsoft\Windows\
  PowerShell\ScriptBlockLogging\EnableScriptBlockLogging = 1. The Wazuh agent 
  ossec.conf must include the Microsoft-Windows-PowerShell/Operational event channel. 
  The index pattern should match your Wazuh index naming convention.

known_false_positives: >
  False positives should be limited as this analytic is designed to detect a specific 
  utility (Invoke-WmiExec). It is recommended to apply appropriate filters as needed 
  to minimize the number of false positives, particularly filtering by user context 
  and source.

references:
  - https://attack.mitre.org/techniques/T1047/
  - https://github.com/Kevin-Robertson/Invoke-TheHash/blob/master/Invoke-WMIExec.ps1
  - https://www.splunk.com/en_us/blog/security/powershell-detections-threat-research-release-august-2021.html

response:
  message: >
    Invoke-WmiExec lateral movement detected on $agent_name$. 
    Script block: $data_win_eventdata_scriptBlockText$. 
    User: $data_win_eventdata_user$. MITRE ATT&CK: T1047
  risk_score: 72
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 72
  threat_objects: []

tags:
  analytic_story:
    - Scattered Lapsus$ Hunters
    - Suspicious WMI Use
    - Lateral Movement
    - Compromised Windows Host
  asset_type: Endpoint
  mitre_attack_id:
    - T1047
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Invoke-WmiExec.*/
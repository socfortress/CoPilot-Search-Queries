            minimum_should_match: 1
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_image
    - data_win_eventdata_commandLine
    - data_win_eventdata_parentImage
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-16 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-16 23:59:59.999"

how_to_implement: >
  This detection requires Wazuh agents deployed on Windows endpoints with Sysmon
  installed and configured to log process creation events (EventID 1) with full
  command-line arguments. Fields data_win_eventdata_image and
  data_win_eventdata_commandLine confirmed working. VALIDATED — simulation confirmed
  hits: powershell.exe spawned from cmd.exe with -w hidden -nop -noni -ep Bypass
  -enc flags. Requires minimum 2 truncated flags to reduce false positives.

known_false_positives: >
  Some legitimate administrative scripts may use abbreviated flags such as
  -nop or -ep. Requiring at least 2 truncated flags simultaneously reduces
  false positives significantly. Filter by known approved parent processes
  or script paths as needed.

references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1027/

response:
  message: >
    PowerShell executed with truncated/obfuscated parameters on $agent_name$ by $data_win_eventdata_user$.
    Parent: $data_win_eventdata_parentImage$.
    Command: $data_win_eventdata_commandLine$.
    MITRE ATT&CK: T1059.001, T1027
  risk_score: 60
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 60
    - field: data_win_eventdata_user
      type: user
      score: 60
  threat_objects:
    - field: data_win_eventdata_parentImage
      type: parent_process_name
    - field: data_win_eventdata_image
      type: process_name

tags:
  analytic_story:
    - Malicious PowerShell
    - Obfuscated Command Line
  asset_type: Endpoint
  mitre_attack_id:
    - T1059.001
    - T1027
  custom_tags:
    - powershell
    - truncated_parameters
    - obfuscation
    - encoded_command
    - defense_evasion
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: "data_win_system_eventID:\"1\" AND (data_win_eventdata_image:/.*powershell\\.exe/ OR data_win_eventdata_image:/.*pwsh\\.exe/ OR data_win_eventdata_originalFileName:\"PowerShell.EXE\") AND (data_win_eventdata_commandLine:/.*-e .*/ OR data_win_eventdata_commandLine:/.*-ec .*/ OR data_win_eventdata_commandLine:/.*-en .*/ OR data_win_eventdata_commandLine:/.*-enc .*/ OR data_win_eventdata_commandLine:/.*-enco .*/ OR data_win_eventdata_commandLine:/.*-encod .*/ OR data_win_eventdata_commandLine:/.*-encode .*/ OR data_win_eventdata_commandLine:/.*-encoded .*/ OR data_win_eventdata_commandLine:/.*-encodedc .*/ OR data_win_eventdata_commandLine:/.*-encodedco .*/ OR data_win_eventdata_commandLine:/.*-encodedcom .*/ OR data_win_eventdata_commandLine:/.*-encodedcomm .*/ OR data_win_eventdata_commandLine:/.*-encodedcomma .*/ OR data_win_eventdata_commandLine:/.*-encodedcomman .*/ OR data_win_eventdata_commandLine:/.*-nop .*/ OR data_win_eventdata_commandLine:/.*-nopr .*/ OR data_win_eventdata_commandLine:/.*-nopro .*/ OR data_win_eventdata_commandLine:/.*-noprof .*/ OR data_win_eventdata_commandLine:/.*-noprofi .*/ OR data_win_eventdata_commandLine:/.*-noprofil .*/ OR data_win_eventdata_commandLine:/.*-w .*/ OR data_win_eventdata_commandLine:/.*-wi .*/ OR data_win_eventdata_commandLine:/.*-win .*/ OR data_win_eventdata_commandLine:/.*-wind .*/ OR data_win_eventdata_commandLine:/.*-windo .*/ OR data_win_eventdata_commandLine:/.*-window .*/ OR data_win_eventdata_commandLine:/.*-windows .*/ OR data_win_eventdata_commandLine:/.*-windowst .*/ OR data_win_eventdata_commandLine:/.*-windowsty .*/ OR data_win_eventdata_commandLine:/.*-windowstyl .*/ OR data_win_eventdata_commandLine:/.*-non .*/ OR data_win_eventdata_commandLine:/.*-noni .*/ OR data_win_eventdata_commandLine:/.*-nonin .*/ OR data_win_eventdata_commandLine:/.*-nonint .*/ OR data_win_eventdata_commandLine:/.*-noninte .*/ OR data_win_eventdata_commandLine:/.*-noninter .*/ OR data_win_eventdata_commandLine:/.*-nonintera .*/ OR data_win_eventdata_commandLine:/.*-noninterac .*/ OR data_win_eventdata_commandLine:/.*-noninteract .*/ OR data_win_eventdata_commandLine:/.*-noninteracti .*/ OR data_win_eventdata_commandLine:/.*-noninteractiv .*/ OR data_win_eventdata_commandLine:/.*-ep .*/ OR data_win_eventdata_commandLine:/.*-ex .*/ OR data_win_eventdata_commandLine:/.*-exe .*/ OR data_win_eventdata_commandLine:/.*-exec .*/ OR data_win_eventdata_commandLine:/.*-execu .*/ OR data_win_eventdata_commandLine:/.*-execut .*/ OR data_win_eventdata_commandLine:/.*-executi .*/ OR data_win_eventdata_commandLine:/.*-executio .*/ OR data_win_eventdata_commandLine:/.*-execution .*/ OR data_win_eventdata_commandLine:/.*-executionp .*/ OR data_win_eventdata_commandLine:/.*-executionpo .*/ OR data_win_eventdata_commandLine:/.*-executionpol .*/ OR data_win_eventdata_commandLine:/.*-executionpoli .*/ OR data_win_eventdata_commandLine:/.*-executionpolic .*/) AND NOT (data_win_eventdata_commandLine:/.*ltsvc.*/ OR data_win_eventdata_commandLine:/.*lastpass.*/ OR data_win_eventdata_commandLine:/.*prtg.*/ OR data_win_eventdata_commandLine:/.*pnputil.*/ OR data_win_eventdata_commandLine:/.*chocolateyinstall.*/ OR data_win_eventdata_commandLine:/.*umbrella.*/ OR data_win_eventdata_commandLine:/.*CronitorDCPLoginTest\\.ps1.*/ OR data_win_eventdata_commandLine:/.*perchCheck\\.ps1.*/ OR data_win_eventdata_commandLine:/.*ninjarmmagent.*/ OR data_win_eventdata_commandLine:/.*microsoftedgeautolaunch.*/ OR data_win_eventdata_commandLine:/.*JABmAGkAbABlACAAPQA.*/ OR data_win_eventdata_commandLine:/.*RgB1AG4AYwB0AGkAbwBuACAAVwByAGkAdABlAC0AQwB1AHMAdABvAG0ARQB2AGUAbgB0AEwAbwBnAC.*/ OR data_win_eventdata_commandLine:/.*WwBTAHkAcwB0AGUAbQAuAFQAZQB4AHQALgBFAG4AYwBvAGQAaQBuAGcAXQA6ADoAVQBUAEYAOAAuAEcAZQB0AFMAdAByAGkAbgBnACgAWwBTAHkAcwB0AGUAbQAuAEMAbwBuAHYAZQByAHQAXQA6ADoARgByAG8AbQBCAGEAcwBlADYANABTAHQAcgBpAG4AZwAoACgAJwB7ACIAUwBjAHIAaQBwAHQAIgA6ACIA.*/ OR data_win_eventdata_commandLine:/.*xIdW50cmVzc0FnZW50LmxvZy.*/ OR d
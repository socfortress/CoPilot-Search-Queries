name: Windows PowerShell Executed with Truncated Parameters
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
version: 1
schema_version: "1.0"
date: "2026-03-16"
author: SOCFortress LLC
status: production
type: TTP
description: >
  Detects PowerShell execution with truncated/abbreviated parameter flags commonly
  used by attackers to evade string-based detections. PowerShell allows parameters
  to be abbreviated to their shortest unambiguous form — attackers exploit this to
  shorten -EncodedCommand to -enc or -e, -NoProfile to -nop, -WindowStyle to -w,
  -NonInteractive to -noni, and -ExecutionPolicy to -ep or -ex. Any combination of
  these truncated flags is a strong indicator of malicious or obfuscated PowerShell
  execution.
  MITRE ATT&CK: T1059.001 (PowerShell), T1027 (Obfuscated Files or Information).

data_source:
  - Sysmon EventID 1

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "1"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_image: "*\\powershell.exe"
              - wildcard:
                  data_win_eventdata_image: "*\\pwsh.exe"
            minimum_should_match: 1
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_commandLine: "* -e *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -ec *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -en *"
              - wildcard:
                  data_win_eventdata_commandLine: "* -enc *"

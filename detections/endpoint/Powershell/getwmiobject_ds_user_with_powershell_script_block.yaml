name: Get-WmiObject Ds_User with PowerShell Script Block
id: fabd364e-04f3-11ec-b34b-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-09"
author: SOCFortress LLC
status: production
type: TTP

description: >
  The following analytic detects the execution of the `Get-WmiObject` cmdlet with the 
  `DS_User` class parameter via PowerShell Script Block Logging (EventID 4104). It 
  leverages logs to identify attempts to query all domain users using WMI. This activity 
  is significant as it may indicate an adversary or Red Team operation attempting to 
  enumerate domain users for situational awareness and Active Directory discovery. If 
  confirmed malicious, this behavior could lead to further reconnaissance, enabling 
  attackers to map out the network and identify potential targets for privilege 
  escalation or lateral movement.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*get-wmiobject*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*ds_user*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*-namespace*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*root\\directory\\ldap*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-09 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-09 23:59:59.999"

how_to_implement: >
  The following Hunting analytic requires PowerShell operational logs to be imported. 
  The Wazuh agent ossec.conf should include the Microsoft-Windows-PowerShell/Operational 
  event channel. This detection monitors for the Get-WmiObject cmdlet with DS_User class 
  targeting the LDAP namespace. Validate that data_win_eventdata_scriptBlockText field 
  is being populated in Elasticsearch/Wazuh Indexer.

known_false_positives: >
  Administrators or power users may use this command for legitimate troubleshooting and 
  Active Directory user discovery. Filter based on user context and whether the action 
  was expected and authorized within your organization.

references:
  - https://www.blackhillsinfosec.com/red-blue-purple/
  - https://docs.microsoft.com/en-us/windows/win32/wmisdk/describing-the-ldap-namespace
  - https://attack.mitre.org/techniques/T1087/002/

response:
  message: >
    Get-WmiObject DS_User LDAP query detected on $agent_name$ by user 
    $data_win_eventdata_user$. Script block: $data_win_eventdata_scriptBlockText$. 
    This indicates domain user enumeration via WMI LDAP namespace/reconnaissance activity. 
    MITRE ATT&CK: T1087.002
  risk_score: 48
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 48
    - field: data_win_eventdata_user
      type: user
      score: 48
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Active Directory Discovery
    - User Discovery
    - Reconnaissance
  asset_type: Endpoint
  mitre_attack_id:
    - T1087.002
  custom_tags:
    - get_wmiobject
    - ds_user
    - ldap_namespace
    - user_enumeration
    - domain_users
    - wmi_query
    - reconnaissance
    - powershell
    - enumeration
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Get-WmiObject.*/ AND data_win_eventdata_scriptBlockText:/.*ds_user.*/ AND data_win_eventdata_scriptBlockText:/.*namespace.*/ AND data_win_eventdata_scriptBlockText:/.*root\\\\directory\\\\ldap.*/
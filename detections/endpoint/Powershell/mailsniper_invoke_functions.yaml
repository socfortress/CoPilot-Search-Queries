name: MailSniper Invoke Functions
id: a36972c8-b894-11eb-9f78-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-09"
author: SOCFortress LLC
status: production
type: TTP

description: >
  The following analytic detects the execution of known MailSniper PowerShell functions 
  on a machine. It leverages PowerShell logs (EventID 4104) to identify specific script 
  block text associated with MailSniper activities. This behavior is significant as 
  MailSniper is often used by attackers to harvest sensitive emails from compromised 
  Exchange servers. If confirmed malicious, this activity could lead to unauthorized 
  access to sensitive email data, credential theft, and further compromise of the email 
  infrastructure.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
      should:
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Invoke-GlobalO365MailSearch*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Invoke-GlobalMailSearch*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Invoke-SelfSearch*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Invoke-PasswordSprayOWA*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Invoke-PasswordSprayEWS*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Invoke-DomainHarvestOWA*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Invoke-UsernameHarvestOWA*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Invoke-OpenInboxFinder*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Invoke-InjectGEventAPI*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Invoke-InjectGEvent*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Invoke-SearchGmail*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Invoke-MonitorCredSniper*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Invoke-AddGmailRule*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Invoke-PasswordSprayEAS*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Invoke-UsernameHarvestEAS*"
      minimum_should_match: 1
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-09 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-09 23:59:59.999"

how_to_implement: >
  To successfully implement this search, you need to be ingesting logs with the 
  PowerShell logs from your endpoints. The Wazuh agent ossec.conf should include 
  the Microsoft-Windows-PowerShell/Operational event channel. This detection 
  monitors for 15 known MailSniper function invocations. Validate that 
  data_win_eventdata_scriptBlockText field is being populated in Elasticsearch/Wazuh Indexer.

known_false_positives: >
  No false positives have been identified at this time. MailSniper functions are 
  specifically designed for malicious email harvesting and should not appear in 
  legitimate PowerShell scripts.

references:
  - https://www.blackhillsinfosec.com/introducing-mailsniper-a-tool-for-searching-every-users-email-for-sensitive-data/
  - https://github.com/dafthack/MailSniper
  - https://attack.mitre.org/techniques/T1114/001/

response:
  message: >
    MailSniper function execution detected on $agent_name$ by user $data_win_eventdata_user$. 
    Function: $data_win_eventdata_scriptBlockText$. 
    This indicates email harvesting/credential spraying via MailSniper tool. 
    MITRE ATT&CK: T1114.001
  risk_score: 85
  severity: critical
  risk_objects:
    - field: agent_name
      type: system
      score: 85
    - field: data_win_eventdata_user
      type: user
      score: 85
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Data Exfiltration
    - Email Harvesting
    - Credential Theft
  asset_type: Endpoint
  mitre_attack_id:
    - T1114.001
  custom_tags:
    - mailsniper
    - email_harvesting
    - invoke_functions
    - data_exfiltration
    - credential_spraying
    - exchange_exploitation
    - powershell
    - offensive_tool
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Invoke-(GlobalO365MailSearch|GlobalMailSearch|SelfSearch|PasswordSprayOWA|PasswordSprayEWS|DomainHarvestOWA|UsernameHarvestOWA|OpenInboxFinder|InjectGEventAPI|InjectGEvent|SearchGmail|MonitorCredSniper|AddGmailRule|PasswordSprayEAS|UsernameHarvestEAS).*/
name: Domain Group Discovery with Adsisearcher
id: 089c862f-5f83-49b5-b1c8-7e4ff66560c7
version: 1
schema_version: "1.0"
date: "2026-04-08"
author: SOCFortress LLC
status: production
type: TTP

description: >
  The following analytic detects the use of the `[adsisearcher]` type accelerator 
  in PowerShell to query Active Directory for domain groups. It leverages PowerShell 
  Script Block Logging (EventID 4104) to identify specific script blocks containing 
  `[adsisearcher]` and group-related queries (`objectcategory=group` and `findAll()`). 
  This activity is significant as it may indicate an attempt by adversaries or Red 
  Teams to enumerate domain groups for situational awareness and Active Directory 
  discovery. If confirmed malicious, this behavior could lead to further reconnaissance, 
  privilege escalation, or lateral movement within the network.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*adsisearcher*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*objectcategory=group*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*findAll*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-08 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-08 23:59:59.999"

how_to_implement: >
  To successfully implement this analytic, you will need to enable PowerShell Script 
  Block Logging (EventID 4104) on some or all endpoints. The Wazuh agent ossec.conf 
  should include the Microsoft-Windows-PowerShell/Operational event channel. This 
  detection monitors for the [adsisearcher] type accelerator combined with LDAP 
  filters for group objects (objectcategory=group) and the findAll() method. 
  This combination is used to enumerate domain groups, which is a common reconnaissance 
  activity in the early stages of an attack.

known_false_positives: >
  Administrators or power users may use Adsisearcher for legitimate troubleshooting 
  and system administration purposes. Filter based on user context and whether the 
  action was expected and authorized within your organization.

references:
  - https://attack.mitre.org/techniques/T1069/002/
  - https://devblogs.microsoft.com/scripting/use-the-powershell-adsisearcher-type-accelerator-to-search-active-directory/
  - https://learn.microsoft.com/en-us/windows/win32/adsi/ldap-syntaxes

response:
  message: >
    Domain group discovery enumeration using PowerShell on $agent_name$ by user 
    $data_win_eventdata_user$. Script: $data_win_eventdata_scriptBlockText$. 
    This indicates Active Directory reconnaissance activity. MITRE ATT&CK: T1069.002
  risk_score: 50
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 50
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Scattered Lapsus$ Hunters
    - Active Directory Discovery
    - Reconnaissance
  asset_type: Endpoint
  mitre_attack_id:
    - T1069.002
  custom_tags:
    - adsisearcher
    - active_directory
    - group_enumeration
    - ldap_query
    - powershell
    - reconnaissance
    - objectcategory
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*adsisearcher.*/ AND data_win_eventdata_scriptBlockText:/.*objectcategory=group.*/ AND data_win_eventdata_scriptBlockText:/.*findAll.*/
name: Get-DomainController with PowerShell Script Block
id: 676b600a-a94d-4951-b346-11329431e6c1
version: 1
schema_version: "1.0"
date: "2026-04-09"
author: SOCFortress LLC
status: production
type: TTP

description: >
  The following analytic detects the execution of the `Get-DomainController` cmdlet using 
  PowerShell Script Block Logging (EventID 4104). This cmdlet is part of PowerView, a 
  tool often used for domain enumeration. The detection leverages script block text to 
  identify this specific activity. Monitoring this behavior is crucial as it may indicate 
  an adversary or Red Team performing reconnaissance to map out domain controllers. If 
  confirmed malicious, this activity could lead to further domain enumeration, potentially 
  exposing sensitive information and aiding in lateral movement within the network.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Get-DomainController*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-09 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-09 23:59:59.999"

how_to_implement: >
  To successfully implement this analytic, you will need to enable PowerShell Script 
  Block Logging (EventID 4104) on some or all endpoints. The Wazuh agent ossec.conf 
  should include the Microsoft-Windows-PowerShell/Operational event channel. This 
  detection monitors for the Get-DomainController cmdlet from PowerView, which is used 
  for domain controller enumeration. Validate that data_win_eventdata_scriptBlockText 
  field is being populated in Elasticsearch/Wazuh Indexer.

known_false_positives: >
  Administrators or power users may use this PowerShell cmdlet for legitimate 
  troubleshooting and infrastructure discovery purposes. Filter based on user context 
  and whether the action was expected and authorized within your organization.

references:
  - https://attack.mitre.org/techniques/T1018/
  - https://powersploit.readthedocs.io/en/latest/Recon/Get-DomainController/
  - https://github.com/S1ckB0y1337/Active-Directory-Exploitation-Cheat-Sheet

response:
  message: >
    Get-DomainController execution detected on $agent_name$ by user $data_win_eventdata_user$. 
    Script block: $data_win_eventdata_scriptBlockText$. 
    This indicates domain controller enumeration/reconnaissance activity for lateral movement planning. 
    MITRE ATT&CK: T1018
  risk_score: 55
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 55
    - field: data_win_eventdata_user
      type: user
      score: 55
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Active Directory Discovery
    - Remote System Discovery
    - Domain Controller Discovery
  asset_type: Endpoint
  mitre_attack_id:
    - T1018
  custom_tags:
    - get_domaincontroller
    - powerview
    - domain_controller_enumeration
    - domain_controllers
    - infrastructure_discovery
    - lateral_movement
    - reconnaissance
    - powershell
    - enumeration
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Get-DomainController.*/
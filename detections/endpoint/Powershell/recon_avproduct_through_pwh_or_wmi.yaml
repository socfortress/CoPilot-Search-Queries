name: Recon AVProduct Through PowerShell or WMI
id: 28077620-c9f6-11eb-8785-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-09"
author: SOCFortress LLC
status: production
type: TTP

description: >
  The following analytic detects suspicious PowerShell or WMI script execution via 
  EventCode 4104, specifically targeting checks for installed anti-virus products. 
  This detection leverages PowerShell Script Block Logging to identify scripts containing 
  keywords like "Get-WmiObject," "SELECT," "WMIC," combined with "AntiVirusProduct" or 
  "AntiSpywareProduct." This activity is significant as it is commonly used by malware 
  and APT actors to map running security applications or services, aiding in evasion 
  techniques. If confirmed malicious, this could allow attackers to disable or bypass 
  security measures, leading to further compromise of the endpoint.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Get-WmiObject*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*SELECT*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*WMIC*"
            minimum_should_match: 1
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*AntiVirusProduct*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*AntiSpywareProduct*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-09 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-09 23:59:59.999"

how_to_implement: >
  To successfully implement this search you need to be ingesting information on 
  processes that include the name of the process responsible for the changes from 
  your endpoints. The Wazuh agent ossec.conf should include the Microsoft-Windows-PowerShell/Operational 
  event channel. This detection monitors for Get-WmiObject, SELECT, or WMIC 
  commands querying AntiVirusProduct or AntiSpywareProduct classes. Validate that 
  data_win_eventdata_scriptBlockText field is being populated in Elasticsearch/Wazuh Indexer.

known_false_positives: >
  System administrators or legitimate tools may query WMI for antivirus product information 
  during security audits or inventory management. Filter based on user context and whether 
  the action was expected and authorized within your organization.

references:
  - https://news.sophos.com/en-us/2020/05/12/maze-ransomware-1-year-counting/
  - https://help.splunk.com/en/security-offerings/splunk-user-behavior-analytics/get-data-in/5.4.1/add-other-data-to-splunk-uba/configure-powershell-logging-to-see-powershell-anomalies-in-splunk-uba.html
  - https://blog.palantir.com/tampering-with-windows-event-tracing-background-offense-and-defense-4be7ac62ac63
  - https://static1.squarespace.com/static/552092d5e4b0661088167e5c/t/59c1814829f18782e24f1fe2/1505853768977/Windows+PowerShell+Logging+Cheat+Sheet+ver+Sept+2017+v2.1.pdf
  - https://www.crowdstrike.com/blog/investigating-powershell-command-and-script-logging/
  - https://www.splunk.com/en_us/blog/security/hunting-for-malicious-powershell-using-script-block-logging.html

response:
  message: >
    Antivirus product reconnaissance detected on $agent_name$ by user 
    $data_win_eventdata_user$. Script block: $data_win_eventdata_scriptBlockText$. 
    Attacker is enumerating security products for evasion planning. 
    MITRE ATT&CK: T1592
  risk_score: 50
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 50
    - field: data_win_eventdata_user
      type: user
      score: 50
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - XWorm
    - Ransomware
    - Hermetic Wiper
    - Prestige Ransomware
    - Quasar RAT
    - Malicious PowerShell
    - Data Destruction
    - MoonPeak
    - Qakbot
    - Windows Post-Exploitation
  asset_type: Endpoint
  mitre_attack_id:
    - T1592
  custom_tags:
    - av_reconnaissance
    - security_evasion
    - wmi_query
    - powershell
    - antivirus_discovery
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND (data_win_eventdata_scriptBlockText:/.*Get-WmiObject.*/ OR data_win_eventdata_scriptBlockText:/.*SELECT.*/ OR data_win_eventdata_scriptBlockText:/.*WMIC.*/) AND (data_win_eventdata_scriptBlockText:/.*AntiVirusProduct.*/ OR data_win_eventdata_scriptBlockText:/.*AntiSpywareProduct.*/)
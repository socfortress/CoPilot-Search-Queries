name: Get-ForestTrust with PowerShell Script Block
id: 70fac80e-0bf1-11ec-9ba0-acde48001122
version: 1
schema_version: "1.0"
date: "2026-04-09"
author: SOCFortress LLC
status: production
type: TTP

description: >
  The following analytic detects the execution of the `Get-ForestTrust` cmdlet from 
  PowerSploit using PowerShell Script Block Logging (EventID 4104). This method captures 
  the full command sent to PowerShell, providing detailed visibility into potentially 
  suspicious activities. Monitoring this behavior is crucial as it can indicate an attempt 
  to gather domain trust information, which is often a precursor to lateral movement or 
  privilege escalation. If confirmed malicious, this activity could allow an attacker to 
  map trust relationships within the domain, facilitating further exploitation and access 
  to sensitive resources.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Get-ForestTrust*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-09 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-09 23:59:59.999"

how_to_implement: >
  To successfully implement this analytic, you will need to enable PowerShell Script 
  Block Logging (EventID 4104) on some or all endpoints. The Wazuh agent ossec.conf 
  should include the Microsoft-Windows-PowerShell/Operational event channel. This 
  detection monitors for the Get-ForestTrust cmdlet, which is used for forest trust 
  enumeration. Validate that data_win_eventdata_scriptBlockText field is being 
  populated in Elasticsearch/Wazuh Indexer.

known_false_positives: >
  False positives may be present. Tune as needed based on organizational baseline 
  and whether the action was expected and authorized within your organization.

references:
  - https://powersploit.readthedocs.io/en/latest/Recon/Get-ForestTrust/
  - https://www.splunk.com/en_us/blog/security/hunting-for-malicious-powershell-using-script-block-logging.html
  - https://attack.mitre.org/techniques/T1482/
  - https://attack.mitre.org/techniques/T1059/001/

response:
  message: >
    Get-ForestTrust execution detected on $agent_name$ by user $data_win_eventdata_user$. 
    Script block: $data_win_eventdata_scriptBlockText$. 
    This indicates forest trust enumeration/reconnaissance activity for lateral movement planning. 
    MITRE ATT&CK: T1482, T1059.001
  risk_score: 55
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 55
    - field: data_win_eventdata_user
      type: user
      score: 55
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Active Directory Discovery
    - Lateral Movement
  asset_type: Endpoint
  mitre_attack_id:
    - T1482
    - T1059.001
  custom_tags:
    - get_foresttrust
    - active_directory
    - forest_trust
    - trust_discovery
    - lateral_movement
    - reconnaissance
    - powershell
    - enumeration
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Get-ForestTrust.*/
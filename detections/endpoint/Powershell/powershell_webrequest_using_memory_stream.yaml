name: PowerShell WebRequest Using Memory Stream
id: windows-powershell-webrequest-using-memory-stream-001
version: 1
schema_version: "1.0"
date: "2026-03-10"
author: SOCFortress LLC
status: production
type: TTP

description: >
  Detects the use of .NET classes in PowerShell to download a URL payload directly 
  into memory, a common fileless malware staging technique. It leverages PowerShell 
  Script Block Logging (EventCode 4104) to identify suspicious PowerShell commands 
  involving system.net.webclient, system.net.webrequest, and IO.MemoryStream. This 
  activity is significant as it indicates potential fileless malware execution, which 
  is harder to detect and can bypass traditional file-based defenses. If confirmed 
  malicious, this technique could allow attackers to execute code in memory, evade 
  detection, and maintain persistence in the environment.

data_source:
  - PowerShell Script Block Logging 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*system.net.webclient*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*system.net.webrequest*"
            minimum_should_match: 1
        - wildcard:
            data_win_eventdata_scriptBlockText: "*IO.MemoryStream*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_system_computer
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-10 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-10 23:59:59.999"

how_to_implement: >
  This detection requires PowerShell Script Block Logging (EventCode 4104) enabled 
  on Windows endpoints. Enable via registry: HKLM\SOFTWARE\Policies\Microsoft\Windows\
  PowerShell\ScriptBlockLogging\EnableScriptBlockLogging = 1. The Wazuh agent 
  ossec.conf must include the Microsoft-Windows-PowerShell/Operational event channel. 
  The index pattern should match your Wazuh index naming convention.

known_false_positives: >
  No false positives have been identified at this time. The combination of web 
  request functionality with in-memory stream operations is highly indicative of 
  fileless malware staging and should be treated as suspicious.

references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1105/
  - https://attack.mitre.org/techniques/T1027/011/
  - https://www.mandiant.com/resources/blog/tracking-evolution-gootloader-operations
  - https://thedfirreport.com/2022/05/09/seo-poisoning-a-gootloader-story/

response:
  message: >
    Fileless malware staging detected via web request to memory stream on $agent_name$. 
    Script block: $data_win_eventdata_scriptBlockText$. 
    User: $data_win_eventdata_user$. MITRE ATT&CK: T1059.001, T1105, T1027.011
  risk_score: 85
  severity: critical
  risk_objects:
    - field: agent_name
      type: system
      score: 85
  threat_objects: []

tags:
  analytic_story:
    - MoonPeak
    - Medusa Ransomware
    - Malicious PowerShell
    - Fileless Malware
    - Gootloader
    - Compromised Windows Host
  asset_type: Endpoint
  mitre_attack_id:
    - T1059.001
    - T1105
    - T1027.011
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND (data_win_eventdata_scriptBlockText:/.*System\.Net\.WebClient.*/ OR data_win_eventdata_scriptBlockText:/.*System\.Net\.WebRequest.*/) AND data_win_eventdata_scriptBlockText:/.*IO\.MemoryStream.*/
name: Windows Powershell History File Deletion
id: f1369394-48e1-4327-bf6d-14377f4b8687
version: 1
schema_version: "1.0"
date: "2026-03-30"
author: SOCFortress LLC
status: production
type: Anomaly
description: >
  Detects PowerShell commands that delete the PowerShell command history file
  using Remove-Item targeting .HistorySavePath. PowerShell stores command history
  in ConsoleHost_history.txt under the user's profile directory. Adversaries
  delete this file to remove evidence of executed commands, hindering forensic
  investigation and incident response. This technique is used by Medusa Ransomware
  and other threat actors for post-exploitation cleanup.
  
data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Remove-Item*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*.HistorySavePath*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_path
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-30 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-30 23:59:59.999"

how_to_implement: >
  Requires PowerShell Script Block Logging enabled on endpoints.
  Enable via Group Policy: Computer Configuration → Administrative Templates
  → Windows Components → Windows PowerShell → Turn on PowerShell Script Block
  Logging.

known_false_positives: >
  Administrators may occasionally clear PowerShell history for privacy or
  maintenance purposes. Frequent or automated deletions should be investigated
  for potential defense evasion activity.

references:
  - https://attack.mitre.org/techniques/T1059/003/
  - https://attack.mitre.org/techniques/T1070/003/
  - https://www.cisa.gov/news-events/cybersecurity-advisories/aa25-071a

response:
  message: >
    PowerShell history file deletion detected on $agent_name$ by
    $data_win_eventdata_user$.
    Script: $data_win_eventdata_scriptBlockText$.
    MITRE ATT&CK: T1059.003, T1070.003
  risk_score: 20
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 20
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: script_block

tags:
  analytic_story:
    - Medusa Ransomware
  asset_type: Endpoint
  mitre_attack_id:
    - T1059.003
    - T1070.003
  custom_tags:
    - history_deletion
    - anti_forensics
    - defense_evasion
    - powershell_history
    - medusa_ransomware
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Remove-Item.*/ AND data_win_eventdata_scriptBlockText:/.*\.HistorySavePath.*/
name: Get-WmiObject Ds_Group with PowerShell Script Block
id: 67740bd3-1506-469c-b91d-effc322cc6e5
version: 1
schema_version: "1.0"
date: "2026-04-09"
author: SOCFortress LLC
status: production
type: TTP

description: >
  The following analytic detects the execution of the `Get-WmiObject` cmdlet with the 
  `DS_Group` parameter via PowerShell Script Block Logging (EventID 4104). This method 
  leverages WMI to query all domain groups. Monitoring this activity is crucial as 
  adversaries and Red Teams may use it for domain group enumeration, aiding in situational 
  awareness and Active Directory discovery. If confirmed malicious, this activity could 
  allow attackers to map out the domain structure, potentially leading to further 
  exploitation and privilege escalation within the network.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*Get-WmiObject*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*root\\directory\\ldap*"
        - wildcard:
            data_win_eventdata_scriptBlockText: "*ds_group*"
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_scriptBlockId
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-04-09 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-04-09 23:59:59.999"

how_to_implement: >
  To successfully implement this analytic, you will need to enable PowerShell Script 
  Block Logging (EventID 4104) on some or all endpoints. The Wazuh agent ossec.conf 
  should include the Microsoft-Windows-PowerShell/Operational event channel. This 
  detection monitors for the Get-WmiObject cmdlet with DS_Group class targeting the 
  LDAP namespace. Validate that data_win_eventdata_scriptBlockText field is being 
  populated in Elasticsearch/Wazuh Indexer.

known_false_positives: >
  Administrators or power users may use this PowerShell cmdlet for legitimate 
  troubleshooting and Active Directory group management. Filter based on user context 
  and whether the action was expected and authorized within your organization.

references:
  - https://attack.mitre.org/techniques/T1069/002/
  - https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.management/get-wmiobject?view=powershell-5.1
  - https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1069.002/T1069.002.md

response:
  message: >
    Get-WmiObject DS_Group LDAP query detected on $agent_name$ by user 
    $data_win_eventdata_user$. Script block: $data_win_eventdata_scriptBlockText$. 
    This indicates domain group enumeration via WMI LDAP namespace/reconnaissance activity. 
    MITRE ATT&CK: T1069.002
  risk_score: 50
  severity: medium
  risk_objects:
    - field: agent_name
      type: system
      score: 50
    - field: data_win_eventdata_user
      type: user
      score: 50
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: powershell_script

tags:
  analytic_story:
    - Active Directory Discovery
    - Permission Groups Discovery
    - Privilege Escalation
  asset_type: Endpoint
  mitre_attack_id:
    - T1069.002
  custom_tags:
    - get_wmiobject
    - ds_group
    - ldap_namespace
    - group_enumeration
    - domain_groups
    - wmi_query
    - privilege_escalation
    - reconnaissance
    - powershell
    - enumeration
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND data_win_eventdata_scriptBlockText:/.*Get-WmiObject.*/ AND data_win_eventdata_scriptBlockText:/.*root\\\\directory\\\\ldap.*/ AND data_win_eventdata_scriptBlockText:/.*ds_group.*/
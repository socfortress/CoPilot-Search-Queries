name: Windows PowerShell Disable HTTP Logging
id: 27958de0-2857-43ca-9d4c-b255cf59dcab
version: 1
schema_version: "1.0"
date: "2026-03-30"
author: SOCFortress LLC
status: production
type: TTP
description: >
  Detects use of get-WebConfigurationProperty or Set-ItemProperty commands
  in PowerShell to disable HTTP logging on Windows IIS servers by setting
  httpLogging or logfile.enabled to false or dontLog. Disabling HTTP logging
  is used by adversaries to cover their tracks and prevent forensic investigation
  of web-based attacks. This technique is documented in IcedApple post-exploitation
  framework and OilRig threat actor operations.
data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*get-WebConfigurationProperty*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Set-ItemProperty*"
            minimum_should_match: 1
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*httpLogging*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*logfile.enabled*"
            minimum_should_match: 1
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*dontLog*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*false*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_path
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-30 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-30 23:59:59.999"

how_to_implement: >
  Requires PowerShell Script Block Logging enabled on endpoints.
  Enable via Group Policy: Computer Configuration → Administrative Templates
  → Windows Components → Windows PowerShell → Turn on PowerShell Script Block
  Logging.

known_false_positives: >
  Administrators or scripts may legitimately disable HTTP logging for
  maintenance or performance reasons. Review the user context and whether
  the change is authorized before escalating.

references:
  - https://attack.mitre.org/techniques/T1505/004/
  - https://attack.mitre.org/techniques/T1562/002/
  - https://www.microsoft.com/en-us/security/blog/2022/12/12/iis-modules-the-evolution-of-web-shells-and-how-to-detect-them/
  - https://www.crowdstrike.com/wp-content/uploads/2022/05/crowdstrike-iceapple-a-novel-internet-information-services-post-exploitation-framework-1.pdf

response:
  message: >
    PowerShell IIS HTTP logging disable detected on $agent_name$
    by $data_win_eventdata_user$.
    Script: $data_win_eventdata_scriptBlockText$.
    MITRE ATT&CK: T1505.004, T1562.002
  risk_score: 64
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 64
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: script_block

tags:
  analytic_story:
    - IIS Components
    - Windows Defense Evasion Tactics
  asset_type: Endpoint
  mitre_attack_id:
    - T1505.004
    - T1562.002
  custom_tags:
    - iis
    - http_logging
    - log_tampering
    - defense_evasion
    - iceapple
    - oilrig
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND (data_win_eventdata_scriptBlockText:/.*get-WebConfigurationProperty.*/ OR data_win_eventdata_scriptBlockText:/.*Set-ItemProperty.*/) AND (data_win_eventdata_scriptBlockText:/.*httpLogging.*/ OR data_win_eventdata_scriptBlockText:/.*logfile\.enabled.*/) AND (data_win_eventdata_scriptBlockText:/.*dontLog.*/ OR data_win_eventdata_scriptBlockText:/.*false.*/)
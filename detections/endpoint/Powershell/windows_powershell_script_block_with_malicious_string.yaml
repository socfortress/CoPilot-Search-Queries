name: Windows PowerShell Script Block With Malicious String
id: 0f09cedd-10f1-4b9f-bdea-7a8b06ea575d
version: 1
schema_version: "1.0"
date: "2026-03-30"
author: SOCFortress LLC
status: production
type: TTP
description: >
  Detects execution of known offensive PowerShell toolkit functions and commands
  via Script Block Logging. Covers well-known tools used for credential theft,
  lateral movement, and persistence including PowerSploit, PowerShell Empire,
  and PowerSharpPack. This is a simplified version of the original Splunk detection
  which used a lookup table of malicious strings — key offensive toolkit functions
  are hardcoded as detection patterns.

data_source:
  - PowerShell Script Block Logging EventID 4104

search:
  index_pattern: "${INDEX_PATTERN}"
  size: 100
  sort:
    - timestamp: desc
  query:
    bool:
      must:
        - term:
            agent_name: "${AGENT_NAME}"
        - term:
            agent_labels_customer: "${CUSTOMER_CODE}"
        - term:
            data_win_system_eventID: "4104"
        - bool:
            should:
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Invoke-Mimikatz*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Invoke-BloodHound*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Invoke-Kerberoast*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Invoke-DCSync*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Get-GPPPassword*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*PowerSploit*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Invoke-PowerDump*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Invoke-WCMDump*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Invoke-NinjaCopy*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Invoke-TokenManipulation*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Get-TimedScreenshot*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Invoke-CredentialInjection*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Invoke-DllInjection*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Invoke-ReflectivePEInjection*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*Invoke-Shellcode*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*PowerShellEmpire*"
              - wildcard:
                  data_win_eventdata_scriptBlockText: "*PowerSharpPack*"
            minimum_should_match: 1
        - range:
            timestamp:
              gte: "${START_TIME}"
              lte: "${END_TIME}"
  _source:
    - timestamp
    - agent_name
    - data_win_system_eventID
    - data_win_eventdata_scriptBlockText
    - data_win_eventdata_path
    - data_win_eventdata_user

parameters:
  AGENT_NAME:
    description: "Target agent/host name"
    type: string
    required: true
    example: "DESKTOP-AM0HLGE"
  CUSTOMER_CODE:
    description: "Customer label for filtering"
    type: string
    required: true
    example: "lab"
  INDEX_PATTERN:
    description: "Elasticsearch index pattern"
    type: string
    required: true
    example: "wazuh-lab_*"
  START_TIME:
    description: "Query start time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now-24h"
    example: "2026-03-30 00:00:00.000"
  END_TIME:
    description: "Query end time (ISO 8601 or relative)"
    type: datetime
    required: false
    default: "now"
    example: "2026-03-30 23:59:59.999"

how_to_implement: >
  Requires PowerShell Script Block Logging enabled on endpoints.
  Enable via Group Policy: Computer Configuration → Administrative Templates
  → Windows Components → Windows PowerShell → Turn on PowerShell Script Block
  Logging.

known_false_positives: >
  Possible usage by internal red team or authorized penetration testing.
  Some PowerShell commands may have overlap with legitimate tools.
  Filter known authorized red team activity as needed.

references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://github.com/PowerShellMafia/PowerSploit
  - https://github.com/PowerShellEmpire/
  - https://github.com/S3cur3Th1sSh1t/PowerSharpPack

response:
  message: >
    Known malicious PowerShell string detected on $agent_name$ by
    $data_win_eventdata_user$.
    Script: $data_win_eventdata_scriptBlockText$.
    MITRE ATT&CK: T1059.001
  risk_score: 70
  severity: high
  risk_objects:
    - field: agent_name
      type: system
      score: 70
  threat_objects:
    - field: data_win_eventdata_scriptBlockText
      type: script_block

tags:
  analytic_story:
    - Malicious PowerShell
  asset_type: Endpoint
  mitre_attack_id:
    - T1059.001
  custom_tags:
    - powersploit
    - empire
    - mimikatz
    - kerberoast
    - bloodhound
    - offensive_toolkit
    - credential_theft
  product:
    - Wazuh
  security_domain: endpoint

graylog:
  query: data_win_system_eventID:"4104" AND (data_win_eventdata_scriptBlockText:/.*Invoke-Mimikatz.*/ OR data_win_eventdata_scriptBlockText:/.*Invoke-BloodHound.*/ OR data_win_eventdata_scriptBlockText:/.*Invoke-Kerberoast.*/ OR data_win_eventdata_scriptBlockText:/.*Invoke-DCSync.*/ OR data_win_eventdata_scriptBlockText:/.*Get-GPPPassword.*/ OR data_win_eventdata_scriptBlockText:/.*PowerSploit.*/ OR data_win_eventdata_scriptBlockText:/.*Invoke-PowerDump.*/ OR data_win_eventdata_scriptBlockText:/.*Invoke-WCMDump.*/ OR data_win_eventdata_scriptBlockText:/.*Invoke-NinjaCopy.*/ OR data_win_eventdata_scriptBlockText:/.*Invoke-TokenManipulation.*/ OR data_win_eventdata_scriptBlockText:/.*Get-TimedScreenshot.*/ OR data_win_eventdata_scriptBlockText:/.*Invoke-CredentialInjection.*/)